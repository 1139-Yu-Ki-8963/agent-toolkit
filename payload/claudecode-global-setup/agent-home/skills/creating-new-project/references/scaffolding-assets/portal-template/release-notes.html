<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>リリースノート — Project Portal</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="src/components.css" />
  <script type="module" src="src/common/header.js"></script>
  <style>
    /* ============ PR 行（トップレベル <details> アコーディオン）============ */
    .rn-pr {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .rn-pr[data-flow="flow-feature"]     { border-left: 4px solid #d97706; }
    .rn-pr[data-flow="flow-maintenance"] { border-left: 4px solid var(--success); }
    .rn-pr[data-flow="flow-docs"]        { border-left: 4px solid #7c3aed; }
    .rn-pr.is-done {
      background: var(--panel-2);
      box-shadow: none;
    }

    .rn-pr-sum {
      list-style: none; cursor: pointer;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 8px;
      min-height: 52px;
      touch-action: manipulation;
      flex-wrap: wrap;
    }
    .rn-pr-sum::-webkit-details-marker { display: none; }
    .rn-pr-caret {
      flex: none; font-size: 9px;
      color: var(--text-muted);
      transition: transform .15s;
    }
    .rn-pr[open] .rn-pr-caret { transform: rotate(90deg); }
    .rn-pr.is-done .rn-pr-caret { color: var(--text-muted); }

    .rn-tick {
      flex: none;
      color: var(--success);
      font-weight: 800; font-size: 14px;
    }

    .rn-flow-pill {
      flex: none;
      padding: 2px 9px; border-radius: 999px;
      font-size: 10.5px; font-weight: 800; white-space: nowrap;
    }
    .rn-flow-pill--feature     { background: #d97706; color: #ffffff; }
    .rn-flow-pill--maintenance { background: var(--success); color: #ffffff; }
    .rn-flow-pill--docs        { background: #7c3aed; color: #ffffff; }
    .rn-pr.is-done .rn-flow-pill { opacity: 0.75; }

    .rn-pr-num {
      flex: none;
      font-family: var(--mono);
      font-size: 12px; font-weight: 700;
      color: var(--accent); background: var(--panel);
      padding: 2px 8px; border-radius: 999px;
      border: 1px solid var(--accent-border);
      text-decoration: none;
    }
    .rn-pr-num:hover { background: var(--accent-soft); }
    .rn-pr.is-done .rn-pr-num { opacity: 0.75; }

    .rn-pr-title {
      flex: 1; min-width: 0;
      font-size: 14px; font-weight: 700;
      color: var(--text); line-height: 1.4;
      overflow-wrap: anywhere; word-break: break-word;
    }
    .rn-pr.is-done .rn-pr-title {
      font-weight: 500; color: var(--text-sub);
    }

    .rn-pr-body {
      padding: 4px 14px 14px;
      border-top: 1px dashed var(--border);
      margin: 0 4px;
    }

    /* ============ 中身フォルド（変更概要 / 変更内容 / 確認手順）============ */
    .rn-fold {
      margin: 8px 0 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .rn-fold-sum {
      list-style: none; cursor: pointer;
      padding: 10px 12px;
      font-size: 12.5px; font-weight: 800;
      color: var(--text);
      display: flex; align-items: center; gap: 8px;
      min-height: 44px;
      touch-action: manipulation;
    }
    .rn-fold-sum::-webkit-details-marker { display: none; }
    .rn-fold-sum::before {
      content: "▶"; flex: none; font-size: 9px;
      transition: transform .15s;
    }
    .rn-fold[open] .rn-fold-sum::before { transform: rotate(90deg); }
    .rn-fold-label { flex: 1; }

    .rn-fold[data-kind="summary"]    { border-color: var(--accent-border); }
    .rn-fold[data-kind="summary"] .rn-fold-sum {
      background: var(--accent-soft); color: var(--accent);
      border-bottom: 1px solid var(--accent-border);
    }
    .rn-fold[data-kind="summary"] .rn-fold-sum::before { color: var(--accent); }

    .rn-fold[data-kind="changes"]    { border-color: var(--border); }
    .rn-fold[data-kind="changes"] .rn-fold-sum {
      background: var(--panel-2); color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .rn-fold[data-kind="changes"] .rn-fold-sum::before { color: var(--text-muted); }

    .rn-fold[data-kind="verify"]     { border-color: #f9b6b6; border-width: 1.5px; }
    .rn-fold[data-kind="verify"] .rn-fold-sum {
      background: var(--danger-soft); color: var(--danger);
      border-bottom: 1px solid #f9b6b6;
    }
    .rn-fold[data-kind="verify"] .rn-fold-sum::before { color: var(--danger); }
    .rn-pr.is-done .rn-fold[data-kind="verify"] {
      border-color: var(--success); border-width: 1px;
    }
    .rn-pr.is-done .rn-fold[data-kind="verify"] .rn-fold-sum {
      background: var(--success-soft); color: var(--success);
      border-bottom-color: var(--success);
    }
    .rn-pr.is-done .rn-fold[data-kind="verify"] .rn-fold-sum::before { color: var(--success); }

    .rn-fold-body { padding: 10px 12px 12px; }

    /* ============ 概要: ラベル付き箇条書き ============ */
    .rn-dl {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 6px;
    }
    .rn-dl > li {
      display: flex; flex-direction: column; gap: 2px;
      padding: 4px 0;
      border-bottom: 1px dashed var(--border);
    }
    .rn-dl > li:last-child { border-bottom: none; }
    .rn-dl-label {
      font-size: 11px; font-weight: 800;
      color: var(--accent); letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .rn-dl-text {
      font-size: 13px; line-height: 1.6; color: var(--text);
      overflow-wrap: anywhere; word-break: break-word;
    }

    /* ============ 変更内容 ============ */
    .rn-changes { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
    .rn-changes li {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 12.5px; line-height: 1.55;
      padding: 4px 0;
      color: var(--text-sub);
      overflow-wrap: anywhere;
    }
    .badge {
      padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 800; white-space: nowrap;
      flex: none; margin-top: 2px;
    }
    .badge-feat { background: var(--success-soft); color: var(--success); }
    .badge-fix  { background: var(--danger-soft);  color: var(--danger); }
    .badge-docs { background: var(--accent-soft);  color: var(--accent); }
    .badge-test { background: var(--gold-soft);    color: var(--gold); }
    .badge-refactor, .badge-chore { background: var(--panel-2); color: var(--text-muted); border: 1px solid var(--border); }

    /* ============ Step ============ */
    .rn-step { padding-bottom: 8px; }
    .rn-step + .rn-step { border-top: 1px dashed var(--border); padding-top: 8px; }
    .rn-step-h {
      padding: 2px 4px 4px;
      font-size: 13px; font-weight: 700; color: var(--text);
      line-height: 1.45;
      display: flex; align-items: flex-start; gap: 6px; flex-wrap: wrap;
    }
    .rn-env {
      font-size: 10px; font-weight: 800;
      border-radius: 3px; padding: 1px 6px;
      flex: none; margin-top: 2px;
    }
    .rn-env--prod  { background: var(--danger-soft); color: var(--danger); }
    .rn-env--local { background: var(--panel-2); color: var(--text-muted); border: 1px solid var(--border); }

    .rn-screen-banner {
      display: flex; align-items: center; gap: 8px;
      margin: 4px 0 6px;
      padding: 8px 10px;
      background: linear-gradient(90deg, var(--accent-soft), #f8faff);
      border: 1px solid var(--accent-border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-sm);
      font-size: 12.5px;
    }
    .rn-screen-banner-label {
      font-weight: 800; color: var(--accent);
      font-size: 11px; letter-spacing: 0.04em;
      text-transform: uppercase; white-space: nowrap;
    }
    .rn-screen-banner-path {
      flex: 1; font-family: var(--mono);
      color: var(--text); font-weight: 600;
      overflow-wrap: anywhere; word-break: break-all;
    }
    .rn-screen-banner-link {
      flex: none;
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 10px; min-height: 32px;
      background: var(--accent); color: #ffffff;
      border-radius: var(--radius-sm);
      font-size: 11.5px; font-weight: 700;
      text-decoration: none; white-space: nowrap;
    }
    .rn-screen-banner-link:hover { background: #1e40af; }
    .rn-screen-banner-empty { flex: 1; color: var(--text-muted); font-size: 11.5px; }

    .rn-checkrow {
      display: flex; align-items: flex-start; gap: 12px;
      min-height: 48px;
      padding: 10px 8px;
      cursor: pointer; touch-action: manipulation;
      border-radius: var(--radius-sm);
      transition: background .12s;
      margin: 1px 0;
    }
    .rn-checkrow:hover, .rn-checkrow:focus-within { background: var(--accent-soft); }
    .rn-checkrow input[type="checkbox"] {
      width: 22px; height: 22px;
      margin-top: 2px; flex: none;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .rn-checkrow-text {
      flex: 1; font-size: 14px; line-height: 1.55;
      color: var(--text);
      overflow-wrap: anywhere; word-break: break-word;
    }
    .rn-checkrow.is-done { opacity: 0.55; }
    .rn-checkrow.is-done .rn-checkrow-text {
      color: var(--text-muted); text-decoration: line-through;
    }

    /* ============ メモ枠 ============ */
    .rn-notes {
      margin: 8px 0 0;
      padding: 10px 12px;
      background: var(--gold-soft);
      border: 1px solid var(--gold-border);
      border-left: 4px solid var(--gold);
      border-radius: var(--radius-sm);
    }
    .rn-notes-title {
      font-weight: 800; font-size: 11px;
      color: var(--gold); letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0 0 6px;
    }
    .rn-notes ul {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .rn-notes li {
      display: flex; flex-direction: column; gap: 2px;
      padding: 4px 0;
      border-bottom: 1px dashed rgba(161, 98, 7, 0.2);
    }
    .rn-notes li:last-child { border-bottom: none; }
    .rn-notes-label {
      font-size: 10.5px; font-weight: 800;
      color: var(--gold); letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .rn-notes-text {
      font-size: 12.5px; line-height: 1.6; color: var(--text);
    }

    /* ============ 完了済みセクションのトグル ============ */
    .rn-done-toggle {
      appearance: none; width: 100%;
      background: linear-gradient(135deg, var(--success-soft), #ffffff);
      border: 1px solid var(--success);
      color: var(--success);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-family: inherit;
      font-size: 13.5px; font-weight: 800;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      min-height: 52px;
      text-align: left;
    }
    .rn-done-toggle::before { content: "▶"; font-size: 10px; transition: transform .15s; }
    .rn-done-toggle[aria-expanded="true"]::before { transform: rotate(90deg); }
    .rn-done-body { display: none; padding-top: 12px; }
    .rn-done-body.is-open { display: block; }

    /* ============ ルート・所要時間・モックリンク ============ */
    .rn-route-pill {
      display: inline-block;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      margin-left: 6px;
      vertical-align: middle;
    }
    .rn-duration {
      display: inline-block;
      font-size: .7rem;
      color: var(--text-muted);
      margin-left: 6px;
      font-family: var(--mono);
    }

    @media (max-width: 380px) {
      .rn-pr-title { font-size: 13.5px; }
      .rn-screen-banner { flex-wrap: wrap; }
      .rn-screen-banner-path { width: 100%; flex: none; }
    }
    @media (max-width: 560px) {
      .rn-checkrow-text { font-size: 13.5px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .rn-done-toggle::before, .rn-fold-sum::before, .rn-pr-caret { transition: none; }
    }
  </style>
</head>
<body class="pp-body">
  <div class="pp-wrap">
    <header class="pp-hero">
      <a class="pp-hero-back" href="index.html"><span aria-hidden="true">←</span> PM ダッシュボード</a>
      <h1 class="pp-hero-title">リリースノート</h1>
      <p class="pp-hero-desc">最近 4 日間にマージした PR を一覧で確認できます。タイトルをタップで詳細が開きます。</p>
    </header>

    <section class="pp-section">
      <h2 class="pp-section-h">未確認</h2>
      <div id="rn-pending-mount"></div>
    </section>

    <section class="pp-section">
      <button type="button" class="rn-done-toggle" id="rn-done-toggle" aria-expanded="false" aria-controls="rn-done-mount">
        <span>完了済み</span>
      </button>
      <div class="rn-done-body" id="rn-done-mount" role="region" aria-label="完了済み PR"></div>
    </section>
  </div>

  <script type="module">
    import RELEASE_NOTES from "./data/release-notes.js";

    const CUTOFF_DAYS = 4;
    const DAY_MS = 86_400_000;

    function inWindow(dateStr) {
      const t = Date.parse(dateStr + "T00:00:00+09:00");
      return Number.isFinite(t) && (Date.now() - t) < CUTOFF_DAYS * DAY_MS;
    }
    function dayLabel(dateStr) {
      const t = Date.parse(dateStr + "T00:00:00+09:00");
      const diff = Math.round((Date.now() - t) / DAY_MS);
      if (diff <= 0) return "今日";
      if (diff === 1) return "昨日";
      return `${diff}日前`;
    }

    const FLOW_LABEL = { "flow-feature": "機能実装", "flow-maintenance": "保守", "flow-docs": "ドキュメント" };
    const FLOW_VARIANT = { "flow-feature": "feature", "flow-maintenance": "maintenance", "flow-docs": "docs" };
    function routeToFlow(route) {
      if (!route) return "";
      if (route.includes("feature")) return "flow-feature";
      if (route.includes("refactor") || route.includes("safety")) return "flow-maintenance";
      if (route.includes("docs")) return "flow-docs";
      return "flow-feature";
    }
    const TYPE_LABEL = { feat: "feat", fix: "fix", docs: "docs", test: "test", refactor: "refactor", chore: "chore" };
    const STORE_KEY = "project-portal-release-notes-checks";
    function loadChecks() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); } catch { return {}; } }
    function saveChecks(s) { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {} }
    const checks = loadChecks();
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    function el(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; }

    function inferScreen(step) {
      if (step.screen) return step.screen;
      const pattern = /\/[a-z][a-z0-9_/-]*/i;
      for (const c of (step.checks || [])) {
        const m = c.match(pattern);
        if (m) return m[0];
      }
      return null;
    }

    const visibleNotes = (Array.isArray(RELEASE_NOTES) ? RELEASE_NOTES : []).filter((n) => inWindow(n.date));

    function summarizeEntry(entry) {
      let total = 0, done = 0;
      (entry.verifySteps || []).forEach((step, si) => {
        if (step.label !== undefined) {
          total++;
          if (checks[`${entry.id}::${si}::0`]) done++;
        } else {
          (step.checks || []).forEach((_c, ci) => {
            total++;
            if (checks[`${entry.id}::${si}::${ci}`]) done++;
          });
        }
      });
      return { total, done, hasPending: total > 0 && done < total };
    }

    function makeFold({ kind, label, openByDefault, bodyBuilder }) {
      const det = el("details", "rn-fold");
      det.dataset.kind = kind;
      if (openByDefault) det.open = true;
      const sum = document.createElement("summary");
      sum.className = "rn-fold-sum";
      sum.innerHTML = `<span class="rn-fold-label">${esc(label)}</span>`;
      det.appendChild(sum);
      const body = el("div", "rn-fold-body");
      bodyBuilder(body);
      det.appendChild(body);
      return det;
    }

    function buildSummaryBody(body, summary) {
      const ul = el("ul", "rn-dl");
      for (const item of summary) {
        const li = el("li");
        li.appendChild(el("span", "rn-dl-label", esc(item.label) + ":"));
        li.appendChild(el("span", "rn-dl-text", esc(item.text)));
        ul.appendChild(li);
      }
      body.appendChild(ul);
    }

    function buildChangesBody(body, changes) {
      const ul = el("ul", "rn-changes");
      for (const c of changes) {
        const li = el("li");
        if (typeof c === "string") {
          li.appendChild(el("span", null, esc(c)));
        } else {
          li.appendChild(el("span", `badge badge-${c.type}`, esc(TYPE_LABEL[c.type] || c.type)));
          li.appendChild(el("span", null, esc(c.text)));
        }
        ul.appendChild(li);
      }
      body.appendChild(ul);
    }

    function buildVerifyBody(body, entry, doneMode) {
      (entry.verifySteps || []).forEach((step, si) => {
        // 新フォーマット: { label, paths[] }
        if (step.label !== undefined) {
          const key = `${entry.id}::${si}::0`;
          const isDone = !!checks[key];
          if (doneMode && !isDone) return;
          if (!doneMode && isDone) return;
          const stepWrap = el("div", "rn-step");
          const sh = el("div", "rn-step-h");
          sh.appendChild(el("span", null, `Step ${si + 1}`));
          stepWrap.appendChild(sh);
          (step.paths || []).forEach((path) => {
            const banner = el("div", "rn-screen-banner");
            banner.appendChild(el("span", "rn-screen-banner-label", "対象画面"));
            banner.appendChild(el("span", "rn-screen-banner-path", esc(path)));
            const a = document.createElement("a");
            a.className = "rn-screen-banner-link";
            a.href = path.startsWith("/project-portal") ? path : `/project-portal${path}`;
            a.target = "_blank"; a.rel = "noopener";
            a.innerHTML = "ローカルで開く <span aria-hidden=\"true\">↗</span>";
            banner.appendChild(a);
            stepWrap.appendChild(banner);
          });
          const lbl = el("label", "rn-checkrow");
          if (isDone) lbl.classList.add("is-done");
          const box = el("input"); box.type = "checkbox"; box.checked = isDone;
          box.addEventListener("change", () => { checks[key] = box.checked; saveChecks(checks); render(); });
          lbl.appendChild(box);
          lbl.appendChild(el("span", "rn-checkrow-text", esc(step.label)));
          stepWrap.appendChild(lbl);
          body.appendChild(stepWrap);
          return;
        }

        // 旧フォーマット: { title, checks[] }
        const rows = (step.checks || []).map((text, ci) => {
          const key = `${entry.id}::${si}::${ci}`;
          const isDone = !!checks[key];
          if (doneMode && !isDone) return null;
          if (!doneMode && isDone) return null;
          return { key, text, ci, isDone };
        }).filter(Boolean);
        if (!rows.length) return;

        const stepWrap = el("div", "rn-step");
        const sh = el("div", "rn-step-h");
        sh.appendChild(el("span", null, `Step ${si + 1}: ${esc(step.title)}`));
        if (step.env) {
          const ev = step.env === "production" ? "prod" : "local";
          sh.appendChild(el("span", `rn-env rn-env--${ev}`, esc(step.env)));
        }
        stepWrap.appendChild(sh);

        const screen = inferScreen(step);
        const banner = el("div", "rn-screen-banner");
        banner.appendChild(el("span", "rn-screen-banner-label", "対象画面"));
        if (screen) {
          banner.appendChild(el("span", "rn-screen-banner-path", esc(screen)));
          const a = document.createElement("a");
          a.className = "rn-screen-banner-link";
          a.target = "_blank"; a.rel = "noopener";
          if (step.env === "production") {
            a.href = screen;
            a.innerHTML = "本番で開く <span aria-hidden=\"true\">↗</span>";
          } else {
            a.href = screen.startsWith("/project-portal") ? screen : `/project-portal${screen}`;
            a.innerHTML = "ローカルで開く <span aria-hidden=\"true\">↗</span>";
          }
          banner.appendChild(a);
        } else {
          banner.appendChild(el("span", "rn-screen-banner-empty", "（画面指定なし）"));
        }
        stepWrap.appendChild(banner);

        rows.forEach((row) => {
          const label = el("label", "rn-checkrow");
          if (row.isDone) label.classList.add("is-done");
          const box = el("input"); box.type = "checkbox"; box.checked = row.isDone;
          box.addEventListener("change", () => {
            checks[row.key] = box.checked;
            saveChecks(checks);
            render();
          });
          label.appendChild(box);
          label.appendChild(el("span", "rn-checkrow-text", esc(row.text)));
          stepWrap.appendChild(label);
        });
        body.appendChild(stepWrap);
      });
    }

    function renderNotes(notes) {
      const items = Array.isArray(notes)
        ? notes
        : (typeof notes === "string" && notes.trim() ? [{ label: "メモ", text: notes }] : []);
      if (!items.length) return null;
      const wrap = el("div", "rn-notes");
      wrap.appendChild(el("h4", "rn-notes-title", "メモ"));
      const ul = document.createElement("ul");
      for (const item of items) {
        const li = el("li");
        li.appendChild(el("span", "rn-notes-label", esc(item.label) + ":"));
        li.appendChild(el("span", "rn-notes-text", esc(item.text)));
        ul.appendChild(li);
      }
      wrap.appendChild(ul);
      return wrap;
    }

    function normalizeSummary(summary) {
      if (Array.isArray(summary)) return summary;
      if (typeof summary === "string" && summary.trim()) return [{ label: "概要", text: summary }];
      return [];
    }

    function routeLabel(r) {
      const m = {
        "feature-with-full-planning": "フル計画",
        "feature-with-quick-delivery": "クイック",
        "config-with-review-and-verify": "設定・docs",
        "refactor-with-safety-guarantee": "リファクタ",
        "incident-with-emergency-path": "障害復旧"
      };
      return m[r] || r;
    }

    function renderPRItem(entry, doneMode) {
      const det = el("details", "rn-pr");
      det.dataset.id = entry.id;
      const effectiveFlow = entry.flow || routeToFlow(entry.route);
      det.dataset.flow = effectiveFlow;
      if (doneMode) det.classList.add("is-done");

      const sum = document.createElement("summary");
      sum.className = "rn-pr-sum";
      const variant = FLOW_VARIANT[effectiveFlow] || "feature";
      const flowPillHtml = entry.flow
        ? `<span class="rn-flow-pill rn-flow-pill--${variant}">${esc(FLOW_LABEL[entry.flow] || entry.flow)}</span>`
        : "";
      const prNum = String(entry.pr || "").replace(/^#/, "");
      const prText = entry.prUrl
        ? `<a class="rn-pr-num" href="${esc(entry.prUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">#${esc(prNum)}</a>`
        : `<span class="rn-pr-num">#${esc(prNum)}</span>`;
      const tick = doneMode ? `<span class="rn-tick" aria-label="完了">✓</span>` : "";
      const routeHtml = entry.route ? `<span class="rn-route-pill">${esc(routeLabel(entry.route))}</span>` : "";
      const durationHtml = entry.durationMin ? `<span class="rn-duration">${esc(entry.durationMin)}分</span>` : "";
      sum.innerHTML =
        `<span class="rn-pr-caret" aria-hidden="true">▶</span>` +
        tick +
        flowPillHtml +
        prText +
        routeHtml +
        durationHtml +
        `<span class="rn-pr-title">${esc(entry.title)}</span>`;
      det.appendChild(sum);

      const body = el("div", "rn-pr-body");
      const sumArr = normalizeSummary(entry.summary);
      if (sumArr.length) {
        body.appendChild(makeFold({
          kind: "summary", label: "変更概要", openByDefault: true,
          bodyBuilder: (b) => buildSummaryBody(b, sumArr),
        }));
      }
      if (entry.changes?.length) {
        body.appendChild(makeFold({
          kind: "changes", label: "変更内容", openByDefault: false,
          bodyBuilder: (b) => buildChangesBody(b, entry.changes),
        }));
      }
      if (entry.verifySteps?.length) {
        body.appendChild(makeFold({
          kind: "verify",
          label: doneMode ? "確認した手順" : "本番環境での確認手順",
          openByDefault: false,
          bodyBuilder: (b) => buildVerifyBody(b, entry, doneMode),
        }));
      }
      const notesEl = renderNotes(entry.notes);
      if (notesEl) body.appendChild(notesEl);

      det.appendChild(body);
      return det;
    }

    function groupByDate(entries) {
      const map = new Map();
      for (const e of entries) {
        if (!map.has(e.date)) map.set(e.date, []);
        map.get(e.date).push(e);
      }
      return [...map.entries()];
    }

    const pendingMount = document.getElementById("rn-pending-mount");
    const doneMount = document.getElementById("rn-done-mount");
    const doneToggle = document.getElementById("rn-done-toggle");

    function render() {
      const pendingEntries = [];
      const fullyDone = [];

      visibleNotes.forEach((entry) => {
        const s = summarizeEntry(entry);
        if (s.total === 0 || s.hasPending) pendingEntries.push(entry);
        else fullyDone.push(entry);
      });

      pendingMount.innerHTML = "";
      if (!pendingEntries.length) {
        pendingMount.appendChild(el("div", "pp-empty", "すべての PR で本番確認が完了しています"));
      } else {
        for (const [date, items] of groupByDate(pendingEntries)) {
          const day = el("section", "pp-day");
          const head = el("header", "pp-day-h");
          head.appendChild(el("span", "pp-day-rel", esc(dayLabel(date))));
          head.appendChild(el("span", "badge-date", esc(date)));
          day.appendChild(head);
          for (const entry of items) day.appendChild(renderPRItem(entry, false));
          pendingMount.appendChild(day);
        }
      }

      doneMount.innerHTML = "";
      if (!fullyDone.length) {
        doneMount.appendChild(el("div", "pp-empty", "まだ完了した PR はありません"));
      } else {
        for (const [date, items] of groupByDate(fullyDone)) {
          const day = el("section", "pp-day");
          const head = el("header", "pp-day-h");
          head.appendChild(el("span", "pp-day-rel", esc(dayLabel(date))));
          head.appendChild(el("span", "badge-date", esc(date)));
          day.appendChild(head);
          for (const entry of items) day.appendChild(renderPRItem(entry, true));
          doneMount.appendChild(day);
        }
      }
    }

    doneToggle.addEventListener("click", () => {
      const expanded = doneToggle.getAttribute("aria-expanded") === "true";
      doneToggle.setAttribute("aria-expanded", expanded ? "false" : "true");
      doneMount.classList.toggle("is-open", !expanded);
    });

    render();
  </script>
</body>
</html>
