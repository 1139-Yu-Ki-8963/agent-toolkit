<!-- generated-by: dev-flow-scaffolding-project v1 -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レビュー指摘履歴</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'media' }</script>
<style>
  .line-through-resolved { text-decoration: line-through; opacity: 0.6; }
</style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen p-6">

<header class="mb-6">
  <h1 class="text-2xl font-bold">レビュー指摘履歴</h1>
  <div class="mt-3 flex gap-2">
    <button data-filter="all"     class="filter-btn px-3 py-1 rounded text-sm bg-blue-600 text-white">全件</button>
    <button data-filter="fail"    class="filter-btn px-3 py-1 rounded text-sm bg-gray-200 dark:bg-gray-700">FAIL のみ</button>
    <button data-filter="critical" class="filter-btn px-3 py-1 rounded text-sm bg-gray-200 dark:bg-gray-700">CRITICAL のみ</button>
  </div>
</header>

<main id="cards" class="space-y-4"></main>

<script type="module">
import data from './sample-review-findings.js';

const ROUTE_LABELS = {
  'feature-with-full-planning':    'feature / full-planning',
  'refactor-with-safety-guarantee':'refactor / safety-guarantee',
};
const SEV_CLASS = {
  CRITICAL: 'bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200 border-red-300 dark:border-red-700',
  WARN:     'bg-yellow-100 dark:bg-yellow-900 text-yellow-800 dark:text-yellow-200 border-yellow-300 dark:border-yellow-700',
  INFO:     'bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 border-blue-300 dark:border-blue-700',
};

let activeFilter = 'all';

function hasCritical(entry) {
  return entry.gates.some(g => g.findings?.some(f => f.severity === 'CRITICAL'));
}
function hasFail(entry) {
  return entry.gates.some(g => g.result === 'FAIL');
}

function renderGate(gate) {
  const badge = gate.result === 'PASS'
    ? '<span class="px-2 py-0.5 rounded text-xs font-bold bg-green-200 dark:bg-green-800 text-green-900 dark:text-green-100">PASS</span>'
    : '<span class="px-2 py-0.5 rounded text-xs font-bold bg-red-200 dark:bg-red-800 text-red-900 dark:text-red-100">FAIL</span>';
  const retryHint = gate.retries ? `<span class="ml-1 text-xs text-gray-500">(retry: ${gate.retries})</span>` : '';
  const findings = (gate.findings || []).map(f => {
    const cls = SEV_CLASS[f.severity] || SEV_CLASS.INFO;
    const resolved = f.resolved
      ? '<span class="ml-1 text-green-600 dark:text-green-400">✓</span>'
      : '';
    const textCls = f.resolved ? 'line-through-resolved' : '';
    return `<li class="mt-1 px-2 py-1 rounded border text-xs ${cls}">
      <span class="font-semibold mr-1">[${f.severity}]</span><span class="${textCls}">${f.message}</span>${resolved}
    </li>`;
  }).join('');
  return `<div class="mt-2">
    <div class="flex items-center gap-1 text-sm font-mono">${badge}${retryHint} <span class="text-gray-500 dark:text-gray-400">${gate.name}</span></div>
    ${findings ? `<ul class="ml-2 mt-1">${findings}</ul>` : ''}
  </div>`;
}

function renderCard(entry) {
  const routeLabel = ROUTE_LABELS[entry.route] || entry.route;
  const gates = entry.gates.map(renderGate).join('');
  return `<article class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
    <div class="flex items-start justify-between flex-wrap gap-2">
      <div>
        <span class="text-xs text-gray-400 dark:text-gray-500 mr-2">#${entry.id}</span>
        <span class="text-xs text-gray-400 dark:text-gray-500">${entry.date}</span>
        <h2 class="text-base font-semibold mt-0.5">${entry.title}</h2>
      </div>
      <span class="px-2 py-0.5 rounded-full text-xs bg-purple-100 dark:bg-purple-900 text-purple-800 dark:text-purple-200">${routeLabel}</span>
    </div>
    <div class="mt-2 border-t dark:border-gray-700 pt-2">${gates}</div>
  </article>`;
}

function render() {
  let items = data;
  if (activeFilter === 'fail')     items = items.filter(hasFail);
  if (activeFilter === 'critical') items = items.filter(hasCritical);
  document.getElementById('cards').innerHTML = items.map(renderCard).join('') || '<p class="text-gray-400">該当なし</p>';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = b === btn
        ? 'filter-btn px-3 py-1 rounded text-sm bg-blue-600 text-white'
        : 'filter-btn px-3 py-1 rounded text-sm bg-gray-200 dark:bg-gray-700';
    });
    render();
  });
});

render();
</script>
</body>
</html>
