# .claude/rules/always/project-context/layers.yml
# プロジェクトの技術スタック（レイヤー）ごとのコマンド体系を定義する。
# レイヤーの数は可変。frontend/backend の 2 層が基本だが、追加・削除は自由。

layers:
  - name: frontend
    src: frontend/src
    lint: "frontend/node_modules/@biomejs/biome check frontend/src"
    test: "cd frontend && npx vitest run"
    coverage: "npx vitest run --coverage"
    type_check: null

  - name: backend
    src: backend/app
    lint: "backend/.venv/bin/ruff check backend/"
    test: "cd backend && .venv/bin/pytest tests/ -q"
    coverage: "pytest --cov"
    type_check: "backend/.venv/bin/mypy backend/app"

