<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skills 一覧 — agent-home</title>
  <link rel="stylesheet" href="../style.css" />
  <script type="module" src="../src/common/header.js"></script>
</head>
<body>
  <div class="cat-wrap">
    <div class="page-hero">
      <h1>Skills 一覧</h1>
      <p>~/agent-home/skills で管理しているスキル（SKILL.md）をカテゴリ別に一覧化したものです。各行を開くとトリガーと概要を表示します。<a href="../index.html">← フロー・ポータルへ戻る</a></p>
    </div>

    <div class="cat-bar">
      <a class="cat-back" href="../index.html">← ポータル TOP</a>
      <span class="cat-total" id="total"></span>
      <input class="cat-filter" id="filter" type="search" placeholder="スキル名・説明で絞り込み…" autocomplete="off" />
    </div>

    <div id="list"></div>
  </div>

  <script type="module">
    import { CATEGORIES } from "../data/skill-categories.js";

    // 以下の SKILLS 配列は node scripts/generate-catalog.mjs が生成する。
    // 手で編集しない。スキルの追加・削除は skills/ 実体側で行い、
    // カテゴリ割当は ../data/skill-categories.js を編集してから再生成する。
    // <!-- GEN:SKILLS -->
    const SKILLS = [
      { id: "adding-textlint-dictionary-terms", cat: "write", summary: "textlint置き換え辞書（prh.yml）への新規語彙登録", trigger: "「prh.yml登録」「辞書に登録」「置き換え語を追加」と言われた時、text-dictionary/rule.md の [TEXTLINT-BLOCK] 手順で辞書に該当エントリがない時", guide: true },
      { id: "creating-new-project", cat: "dev", summary: "新規プロジェクトセットアップ（Next.js / React+Vite+FastAPI）", trigger: "「新規プロジェクト」「プロジェクト作成」「アプリ新規作成」「セットアップ」と言われた時", guide: true },
      { id: "eliciting-plan-tacit-knowledge", cat: "meta", summary: "計画を弱モデルに初見読解させ、理解のズレから暗黙知を抽出して計画へ明文化する", trigger: "「暗黙知を炙り出して」「計画の前提を明文化して」「計画を初見読解で検証して」と言われた時、brain の計画立案後・ユーザー承認前の計画品質確認", guide: true },
      { id: "frontend-design", cat: "design", summary: "UI/画面デザインガイド", trigger: "コンポーネント実装、LP、デザイン刷新", guide: true },
      { id: "generating-explanation-html-slides", cat: "content", summary: "与えたトピックを横1枚（16:9）のスライド風解説HTMLにする。図解型と論証テーブル型を選択可能", trigger: "「解説スライドを作って」「説明用HTMLにして」「スライドHTML」「図解して1枚にまとめて」「論証テーブルで整理して」と言われた時", guide: true },
      { id: "grouping-commits", cat: "impl", sub: "pr", summary: "変更分析しグループ化・単一目的コミット作成", trigger: "「コミット分割」「変更グループ化」「まとめてコミット」と言われた時", guide: true },
      { id: "managing-agent-configs", cat: "manage", sub: "skill", summary: "エージェント構成管理", trigger: "スキル/ルール/ルーティン/エージェント/フック作成・レビュー・テスト", guide: true },
      { id: "managing-github-issues", cat: "impl", sub: "issue", summary: "GitHub issue の起票・選択着手・スコープ検証のモードハブ", trigger: "「issue作成」「起票」「issueにして」「issueを選んで実装」「issue一覧から着手」「スコープ検証」「issue範囲チェック」、issue-N ブランチで commit 前", guide: true },
      { id: "orchestrating-dev-flow", cat: "impl", sub: "pr", summary: "開発オーケストレーター", trigger: "「新機能追加」「バグ修正」「リファクタ」「ドキュメント編集」「インシデント対応」と言われた時", guide: true },
      { id: "parallel-dev-worktree", cat: "impl", sub: "pr", summary: "worktreeブランチ作成/管理/復旧", trigger: "wt1-wt3不在、MISSING/FAIL", guide: true },
      { id: "reviewing-against-rules", cat: "review", summary: "レビューの単一入口。適用 rule を解決し、専門家に照合を委任する", trigger: "「レビューして」と成果物・差分を指定された時、他スキルのレビュー工程（PR レビュー Phase 5・開発フローのレビューゲート）から呼ばれた時、HTML・コードの完成判定時", guide: true },
      { id: "reviewing-public-readiness", cat: "review", summary: "公開前機密漏洩スナップショット走査", trigger: "make public・[PUBLISH-*]注入", guide: true },
      { id: "reviewing-single-pr-with-inline-comments", cat: "review", summary: "PRレビュー・コメント・修正・マージ", trigger: "差分確認、LGTM、まとめてレビュー、routine PR", guide: true },
      { id: "subagent-investigation-checklist", cat: "meta", summary: "調査委任前チェックリスト作成", trigger: "「調査チェックリスト」「調査委任」と言われた時、investigator/report-reviewer への委任前", guide: true },
    ];
    // <!-- /GEN:SKILLS -->

    const root = document.getElementById("list");
    const totalEl = document.getElementById("total");
    const filterEl = document.getElementById("filter");
    totalEl.textContent = SKILLS.length + " スキル / " + CATEGORIES.length + " カテゴリ";

    function rowHtml(s) {
      return (
        '<details class="fr" data-key="' + (s.id + " " + s.summary + " " + s.trigger).toLowerCase() + '">' +
          '<summary>' +
            '<span class="expbtn">+</span>' +
            '<span class="fn">' + s.summary + '</span>' +
            '<span class="fsep">—</span>' +
            '<span class="fdesc">' + s.trigger + '</span>' +
          '</summary>' +
          '<div class="fdetail">' +
            '<div class="frow"><span class="frow-label">id</span><span class="frow-val"><code>' + s.id + '</code></span></div>' +
            '<div class="fmeta">~/agent-home/skills/' + s.id + '/SKILL.md' + (s.guide ? ' <a class="fguide" href="../../skills/' + s.id + '/references/' + s.id + '-guide.html" target="_blank" rel="noopener">ガイド ↗</a>' : '') + '</div>' +
            '<div class="frow"><span class="frow-label">概要</span><span class="frow-val">' + s.summary + '</span></div>' +
            '<div class="frow"><span class="frow-label">トリガー</span><span class="frow-val"><span class="tag tag-trigger">TRIGGER</span> ' + s.trigger + '</span></div>' +
          '</div>' +
        '</details>'
      );
    }

    function subWrap(label, tag, items) {
      return (
        '<div class="sub-wrap">' +
          '<div class="sub-divider"><span class="tag ' + tag + '">' + label + '</span><span class="sub-count">' + items.length + '</span></div>' +
          items.map(rowHtml).join("") +
        '</div>'
      );
    }

    // カテゴリに subs があれば小カテゴリに分割、なければフラット描画
    function rowsHtml(cat, items) {
      const subs = cat.subs;
      if (!subs) return items.map(rowHtml).join("");
      let html = "";
      subs.forEach((g) => {
        const members = items.filter((s) => s.sub === g.key);
        if (members.length) html += subWrap(g.label, g.tag, members);
      });
      const rest = items.filter((s) => !subs.some((g) => g.key === s.sub));
      if (rest.length) html += subWrap("その他", "tag-lib", rest);
      return html;
    }

    function render() {
      root.innerHTML = "";
      CATEGORIES.forEach((c, i) => {
        const items = SKILLS.filter((s) => s.cat === c.id);
        if (items.length === 0) return;
        const sec = document.createElement("details");
        sec.className = "cat-block";
        sec.open = true;
        sec.innerHTML =
          '<summary class="cat-card">' +
            '<span class="cat-fold"></span>' +
            '<div class="cat-num-block"><span class="cat-number">' + String(i + 1).padStart(2, "0") + '</span></div>' +
            '<div class="cat-body"><div class="cat-name">' + c.name + '</div><div class="cat-desc">' + c.desc + '</div></div>' +
            '<span class="cat-count">' + items.length + ' skills</span>' +
          '</summary>' +
          '<div class="file-rows">' + rowsHtml(c, items) + '</div>';
        root.appendChild(sec);
      });
    }

    function applyFilter() {
      const q = filterEl.value.trim().toLowerCase();
      let shown = 0;
      root.querySelectorAll("details.cat-block").forEach((sec) => {
        let secShown = 0;
        sec.querySelectorAll("details.fr").forEach((d) => {
          const hit = !q || d.dataset.key.includes(q);
          d.style.display = hit ? "" : "none";
          if (hit) { secShown++; shown++; }
        });
        // サブグループの見出しは、配下に表示行が無ければ隠す
        sec.querySelectorAll(".sub-wrap").forEach((w) => {
          const anyVisible = [...w.querySelectorAll("details.fr")].some((d) => d.style.display !== "none");
          w.style.display = anyVisible ? "" : "none";
        });
        sec.style.display = secShown > 0 ? "" : "none";
        if (q && secShown > 0) sec.open = true; // 絞り込み中はヒットしたカテゴリを開く
      });
      totalEl.textContent = q
        ? shown + " 件ヒット / " + SKILLS.length + " スキル"
        : SKILLS.length + " スキル / " + CATEGORIES.length + " カテゴリ";
    }

    let t;
    filterEl.addEventListener("input", () => { clearTimeout(t); t = setTimeout(applyFilter, 120); });
    render();
  </script>
</body>
</html>
