<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Routines 一覧 — agent-home</title>
  <link rel="stylesheet" href="../style.css" />
  <script type="module" src="../src/common/header.js"></script>
</head>
<body>
  <div class="cat-wrap">
    <div class="page-hero">
      <h1>Routines 一覧</h1>
      <p>~/agent-home/routines/ で管理している定期実行ルーティンを一覧化したものです。実行履歴・詳細は <a href="../../routines/index.html">ルーティン詳細ページ</a> を参照してください。<a href="../index.html#/">← フロー・ポータルへ戻る</a></p>
    </div>

    <div class="cat-bar">
      <a class="cat-back" href="../index.html#/">← ポータル TOP</a>
      <span class="cat-total" id="total"></span>
      <input class="cat-filter" id="filter" type="search" placeholder="ルーティン名・概要で絞り込み…" autocomplete="off" />
    </div>

    <div id="list"></div>
  </div>

  <script>
    // ルーティン定義（id, summary, path）
    const ROUTINES = [
      { id: "DBパフォーマンス改善", flowId: "db-performance-review-daily", summary: "DB スキーマ・インデックス・キャッシュ・クエリパターンを静的に分析し、改善箇所を1本の最適化 PR にまとめる。", path: "~/agent-home/routines/DBパフォーマンス改善/ルーティン設計書.md" },
      { id: "DB日次バックアップ", flowId: "db-backup-daily", summary: "本番 Supabase DB のスキーマとデータを毎日自動でダンプし、GitHub の専用ブランチに push して履歴管理する。", path: "~/agent-home/routines/DB日次バックアップ/ルーティン設計書.md" },
      { id: "PR レビュー統合", flowId: "pr-review-daily", summary: "PR 生成系ルーティンが作った PR を、人間の介入なしにレビュー・自動修正・自動マージまで完結させる。", path: "~/agent-home/routines/PR レビュー統合/ルーティン設計書.md" },
      { id: "linter自己進化", flowId: "code-quality-guardian", summary: "ペンディング状態の linter ルール候補から選び、既存違反の全修正・ルール追加・PR 作成・自動マージまでを1サイクルで完結させる。", path: "~/agent-home/routines/linter自己進化/ルーティン設計書.md" },
      { id: "カバレッジ自動改善", flowId: "coverage-improvement-daily", summary: "静的テストのカバレッジ100%を目標とし、未到達ファイルがある限り毎朝改善 PR を作成・マージする。", path: "~/agent-home/routines/カバレッジ自動改善/ルーティン設計書.md" },
      { id: "コード衛生メトリクス", flowId: "code-hygiene-metrics", summary: "lint では検出できない構造的品質劣化を定点観測し、PR を出さずログのみに記録する。", path: "~/agent-home/routines/コード衛生メトリクス/ルーティン設計書.md" },
      { id: "シークレット漏洩監視", flowId: "secret-leak-watch-daily", summary: "コードベースと git 履歴を毎日スキャンし、API キー・トークン等の機密情報の混入を検出して issue を起票する。", path: "~/agent-home/routines/シークレット漏洩監視/ルーティン設計書.md" },
      { id: "デッドコード検出", flowId: "dead-code-detection-daily", summary: "未呼び出し API・デッドコード・型エラー等を静的解析し、安全に修正可能な問題を実際にコード修正して PR を出す。", path: "~/agent-home/routines/デッドコード検出/ルーティン設計書.md" },
      { id: "ドキュメント健全性チェック", flowId: "doc-health-check", summary: "docs 配下のドキュメント資産の腐敗（リンク切れ・孤立ファイル・文章品質劣化）を定点検出し、修正可能なリンク切れは PR で自動修正する。", path: "~/agent-home/routines/ドキュメント健全性チェック/ルーティン設計書.md" },
      { id: "パッケージ脆弱性パッチ", flowId: "dependency-update-daily", summary: "npm と pip の依存関係について CVE 脆弱性と陳腐化を週次で検査し、安全に更新できるものを1本の PR にまとめて起票する。", path: "~/agent-home/routines/パッケージ脆弱性パッチ/ルーティン設計書.md" },
      { id: "ルーティン統計レポート", flowId: "routine-stats-daily", summary: "全ルーティンの実行ログを集約し、1日数回 GitHub Issue を更新してユーザーに報告する。", path: "~/agent-home/routines/ルーティン統計レポート/ルーティン設計書.md" },
      { id: "ログ清掃", flowId: "log-rotate", summary: "logs 配下に堆積する *.jsonl / *.log を、7日超で gzip 圧縮し、30日超で削除する。", path: "~/agent-home/routines/ログ清掃/ルーティン設計書.md" },
      { id: "仕様同期", flowId: "spec-sync-daily", summary: "コードと設計書の双方向整合を毎日検査し、乖離があれば1本の PR にまとめて補完する。", path: "~/agent-home/routines/仕様同期/ルーティン設計書.md" },
    ];

    const root = document.getElementById("list");
    const totalEl = document.getElementById("total");
    const filterEl = document.getElementById("filter");
    totalEl.textContent = ROUTINES.length + " ルーティン";

    function rowHtml(r) {
      return (
        '<details class="fr" data-key="' + (r.id + " " + r.summary).toLowerCase() + '">' +
          '<summary>' +
            '<span class="expbtn">+</span>' +
            '<span class="fn">' + r.id + '</span>' +
            '<span class="fsep">—</span>' +
            '<span class="fdesc">' + r.summary + '</span>' +
          '</summary>' +
          '<div class="fdetail">' +
            '<div class="fmeta">' + r.path + '</div>' +
            '<div class="frow"><span class="frow-label">概要</span><span class="frow-val">' + r.summary + '</span></div>' +
            '<div class="frow"><span class="frow-label">詳細</span><span class="frow-val"><a href="../index.html#/flow/' + r.flowId + '">実行フローを見る →</a></span></div>' +
          '</div>' +
        '</details>'
      );
    }

    function render() {
      root.innerHTML = '<div class="file-rows">' + ROUTINES.map(rowHtml).join("") + '</div>';
    }

    function applyFilter() {
      const q = filterEl.value.trim().toLowerCase();
      let shown = 0;
      root.querySelectorAll("details.fr").forEach((d) => {
        const hit = !q || d.dataset.key.includes(q);
        d.style.display = hit ? "" : "none";
        if (hit) shown++;
      });
      totalEl.textContent = q
        ? shown + " 件ヒット / " + ROUTINES.length + " ルーティン"
        : ROUTINES.length + " ルーティン";
    }

    let t;
    filterEl.addEventListener("input", () => { clearTimeout(t); t = setTimeout(applyFilter, 120); });
    render();
  </script>
</body>
</html>
