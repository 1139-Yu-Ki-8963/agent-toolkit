<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>スキル一覧 — agent-toolkit</title>
  <link rel="stylesheet" href="../style.css" />
  <script type="module" src="../src/common/header.js"></script>
</head>
<body>
  <div class="cat-wrap">
    <div class="page-hero">
      <h1>スキル一覧</h1>
      <p>本リポジトリ <code>skills/</code> で同梱しているスキル（SKILL.md）をカテゴリ別に一覧化したものです。各行を開くとトリガーと概要を表示します。<a href="../index.html#/">← ポータルへ戻る</a></p>
    </div>

    <div class="cat-bar">
      <a class="cat-back" href="../index.html#/">← ポータル TOP</a>
      <span class="cat-total" id="total"></span>
      <input class="cat-filter" id="filter" type="search" placeholder="スキル名・説明で絞り込み…" autocomplete="off" />
    </div>

    <div id="list"></div>
  </div>

  <script type="module">
    import { CATEGORIES } from "../data/skill-categories.js";

    // 以下の SKILLS 配列は node skills/managing-agent-configs/scripts/manage-portal.mjs generate が生成する。
    // 手で編集しない。スキルの追加・削除は skills/ 実体側で行い、
    // カテゴリ割当は ../data/skill-categories.js を編集してから再生成する。
    // <!-- GEN:SKILLS -->
    const SKILLS = [
      { id: "generating-screen-list-for-reverse-docs", cat: "dev", summary: "レガシー画面検出→画面一覧HTML生成。", trigger: "画面一覧作成。", guide: true },
      { id: "managing-agent-configs", cat: "manage", sub: "skill", summary: "エージェント構成管理ハブ。", trigger: "スキル/ルール/ルーティン/エージェント/フック作成・レビュー・テスト。", guide: true },
      { id: "rebuilding-code-from-docs", cat: "dev", summary: "設計書だけからコード再生成し元コードと突合、欠落発見。", trigger: "往復検証、品質検証。", guide: true },
      { id: "rebuilding-screen-unit-from-docs", cat: "dev", summary: "設計書だけから1ファイルを再生成し元と突合、欠落発見（stage1・単体観点）。", trigger: "ファイル単位の往復検証、from-zeroの設計書品質ブートストラップ。", guide: true },
      { id: "syncing-reverse-env", cat: "dev", summary: "リバース元/設計書2環境同期・検証・基準コミット確立。", trigger: "setup/sync/teardown・baseline操作。", guide: true },
    ];
    // <!-- /GEN:SKILLS -->

    const root = document.getElementById("list");
    const totalEl = document.getElementById("total");
    const filterEl = document.getElementById("filter");
    totalEl.textContent = SKILLS.length + " スキル / " + CATEGORIES.length + " カテゴリ";

    function rowHtml(s) {
      return (
        '<details class="fr" data-key="' + (s.id + " " + s.summary + " " + s.trigger).toLowerCase() + '">' +
          '<summary>' +
            '<span class="expbtn">+</span>' +
            '<span class="fn">' + s.id + '</span>' +
            '<span class="fsep">—</span>' +
            '<span class="fdesc">' + s.summary + '</span>' +
          '</summary>' +
          '<div class="fdetail">' +
            '<div class="fmeta">~/agent-home/skills/' + s.id + '/SKILL.md' + (s.guide ? ' <a class="fguide" href="../../skills/' + s.id + '/references/' + s.id + '-guide.html" target="_blank" rel="noopener">ガイド ↗</a>' : '') + '</div>' +
            '<div class="frow"><span class="frow-label">概要</span><span class="frow-val">' + s.summary + '</span></div>' +
            '<div class="frow"><span class="frow-label">トリガー</span><span class="frow-val"><span class="tag tag-trigger">TRIGGER</span> ' + s.trigger + '</span></div>' +
          '</div>' +
        '</details>'
      );
    }

    function subWrap(label, tag, items) {
      return (
        '<div class="sub-wrap">' +
          '<div class="sub-divider"><span class="tag ' + tag + '">' + label + '</span><span class="sub-count">' + items.length + '</span></div>' +
          items.map(rowHtml).join("") +
        '</div>'
      );
    }

    function rowsHtml(cat, items) {
      const subs = cat.subs;
      if (!subs) return items.map(rowHtml).join("");
      let html = "";
      subs.forEach((g) => {
        const members = items.filter((s) => s.sub === g.key);
        if (members.length) html += subWrap(g.label, g.tag, members);
      });
      const rest = items.filter((s) => !subs.some((g) => g.key === s.sub));
      if (rest.length) html += subWrap("その他", "tag-lib", rest);
      return html;
    }

    function render() {
      root.innerHTML = "";
      CATEGORIES.forEach((c, i) => {
        const items = SKILLS.filter((s) => s.cat === c.id);
        if (items.length === 0) return;
        const sec = document.createElement("details");
        sec.className = "cat-block";
        sec.open = true;
        sec.innerHTML =
          '<summary class="cat-card">' +
            '<span class="cat-fold"></span>' +
            '<div class="cat-num-block"><span class="cat-number">' + String(i + 1).padStart(2, "0") + '</span></div>' +
            '<div class="cat-body"><div class="cat-name">' + c.name + '</div><div class="cat-desc">' + c.desc + '</div></div>' +
            '<span class="cat-count">' + items.length + ' skills</span>' +
          '</summary>' +
          '<div class="file-rows">' + rowsHtml(c, items) + '</div>';
        root.appendChild(sec);
      });
    }

    function applyFilter() {
      const q = filterEl.value.trim().toLowerCase();
      let shown = 0;
      root.querySelectorAll("details.cat-block").forEach((sec) => {
        let secShown = 0;
        sec.querySelectorAll("details.fr").forEach((d) => {
          const hit = !q || d.dataset.key.includes(q);
          d.style.display = hit ? "" : "none";
          if (hit) { secShown++; shown++; }
        });
        sec.querySelectorAll(".sub-wrap").forEach((w) => {
          const anyVisible = [...w.querySelectorAll("details.fr")].some((d) => d.style.display !== "none");
          w.style.display = anyVisible ? "" : "none";
        });
        sec.style.display = secShown > 0 ? "" : "none";
        if (q && secShown > 0) sec.open = true;
      });
      totalEl.textContent = q
        ? shown + " 件ヒット / " + SKILLS.length + " スキル"
        : SKILLS.length + " スキル / " + CATEGORIES.length + " カテゴリ";
    }

    let t;
    filterEl.addEventListener("input", () => { clearTimeout(t); t = setTimeout(applyFilter, 120); });
    render();
  </script>
</body>
</html>
