# unlocking-reverse-target-screens の可変値設定（プロジェクト固有マニフェスト）
# 値の階層: 普遍のルール＝SKILL.md（プロジェクト固有値を含まない） /
#           プロジェクト単位＝本ファイル projects.<system> / 画面単位＝呼び出し引数（screen_id等）
# 未確定キー（<FILL:...>）が残ったまま前提ゲートを通過してはならない。
# 雛形は assets/manifest-template.yml を参照。

operating_rules:                          # 全プロジェクト共通・固定（projectsでの上書き不可）
  forbid_unresolved_keys: true            # <FILL:...> が残っていれば前提ゲートでERROR
  forbid_other_agent_server_touch: true   # 稼働中の他エージェントのdevサーバー・環境に触れない
  require_deterministic_pass: true        # 合格判定は決定的コマンド出力（例: git tag -l）で行う

shared_config_ref:
  syncing_env_config: "../syncing-reverse-env/config.yml"   # playwright_exec等の実行系設定を参照。重複定義しない

projects: {}
