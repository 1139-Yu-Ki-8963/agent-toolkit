<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ER図 — 設計ポータル</title>
<!--
  detail-pages T6 ER図専用テンプレート — 設計スキル群
  生成: shared/scripts/detail-pages/build-detail-page.sh
  プレースホルダ置換は build-detail-page.sh の render_template() が行う。
  手作業によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。

  埋め込みJSON(script#page-data)のentities[]/relations[]から、ページ読込時にJavaScriptが
  Canvas 2D 上へグラフを描画する。クラスタカード俯瞰(状態0)→ドメインズームイン(状態1)→
  テーブルフォーカス(状態2)の3段階探索を、1枚のCanvas上でのカメラのパン・ズームアニメーション
  として実現するインタラクティブER図(SVG/DOMノードではなくCanvas 2D描画)。
  クラスタ化はFK接続グラフの連結成分を決定的アルゴリズムで算出し、巨大成分は
  出次数上位3ノードのハブ分割で分解する(乱数・物理シミュレーション不使用)。
  ドメイン(クラスタ)ごとの色分けは、算出したクラスタのインデックスからカラーパレット配列を
  引いて自動導出する(固定辞書は使わない)。選択中テーブルは右上の詳細パネルにカラム定義
  (PK/FK/UQ/NULLバッジ)・リレーション一覧を表示し、テーブル定義コピー機能を持つ。

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/portal-template.html からの複製である。
  同テンプレートの当該部分を変更した場合は本ファイルも同時更新すること
  （T1一覧テンプレート群・T2〜T5テンプレートにも同種の複製あり。include化は別件）。

  プレースホルダ(build-detail-page.shが注入。実際のマーカー記法は
  scripts/detail-pages/build-detail-page.sh 冒頭コメントを定義とする。本コメントでは
  二重置換事故を避けるため意図的に波括弧を外して記載する):
    TITLE (ページ見出しマーカー)         : page-data.json の title
    DESCRIPTION (ページ概要マーカー)     : page-data.json の description
    GENERATED_AT (生成日時マーカー)      : page-data.json の generatedAt
    PAGE_DATA_JSON (page-data埋め込みマーカー) : page-data.json の内容全体(本ファイル物理末尾のscriptタグへ注入)
-->
<style>
:root,
[data-theme="light"] {
  /* Windows フォント上書き防止 */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-synthesis: none;
  --bg: #FFFFFF;
  --panel: #FFFFFF;
  --panel-2: #F6F8FA;
  --border: #D1D9E0;
  --border-strong: #AFB8C1;
  --text: #1B1F26;
  --text-sub: #4A4F58;
  --text-muted: #767B85;
  --accent: #0969DA;
  --accent-2: #218BFF;
  --accent-soft: #DDF4FF;
  --accent-border: #54AEFF;
  --gold: #BC4C00;
  --gold-soft: #FFF1E5;
  --gold-border: #D18A5A;
  --success: #1A7F37;
  --success-soft: #DAFBE1;
  --warn: #BC4C00;
  --danger: #CF222E;
  --danger-soft: #FFEBE9;
  --highlight: #D97B1A;
  --highlight-soft: rgba(217,123,26,0.12);
  --highlight-border: rgba(217,123,26,0.5);
  --nav-tag: #7B8BBF;
  --nav-tag-soft: #ECEEF6;
  --self-tag: #6B9B6B;
  --self-tag-soft: #E8F0E8;
  --code-bg: #1B1F26;
  --code-fg: #E8E5DC;
  --cat-list: #2563eb;
  --cat-common: #059669;
  --cat-project: #7C3AED;
  --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
  --mono: "SFMono-Regular","Menlo","Cascadia Code","Consolas",monospace;
  --shadow-sm: 0 1px 3px rgba(27,31,38,.07), 0 2px 6px rgba(27,31,38,.05);
  --shadow-md: 0 2px 8px rgba(27,31,38,.09), 0 8px 24px rgba(27,31,38,.07);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
    --border: #30363D; --border-strong: #484F58;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
    --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
    --success: #3FB950; --success-soft: #0D2818;
    --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
    --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5);
    --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15);
    --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15);
    --code-bg: #0E1116; --code-fg: #E8E5DC;
    --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
  }
}
[data-theme="dark"] {
  --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
  --border: #30363D; --border-strong: #484F58;
  --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
  --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
  --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
  --success: #3FB950; --success-soft: #0D2818;
  --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
  --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5);
  --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15);
  --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15);
  --code-bg: #0E1116; --code-fg: #E8E5DC;
  --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.dp-page { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; overflow: hidden; }

.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); }
.brand:hover { text-decoration: none; }
.brand-icon { display: inline-flex; align-items: center; }
.brand-title { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: var(--text-muted, #6c757d); }
.header-meta { font-size: 12px; color: var(--text-muted, #6c757d); display: flex; align-items: center; gap: 8px; }
.top-actions { display: flex; align-items: center; gap: 8px; }
.top-actions button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }

.dp-main { max-width: 1280px; width: 100%; min-width: 0; margin: 0 auto; padding: 24px 24px 64px; overflow-y: auto; min-height: 0; }

.doc-crumbs { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.doc-crumbs a { color: var(--text-sub); cursor: pointer; }
.doc-crumbs a:hover { color: var(--accent); }

.dp-hero {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  padding: 4px 2px 14px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap;
}
.dp-hero h1 { font-size: 23px; margin: 0; }
.dp-hero p { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 0; }

.sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-sub);
  display: flex; align-items: center; gap: 8px; margin: 26px 0 12px;
}
.sec-label:first-of-type { margin-top: 6px; }
.sec-label::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }

.note-box {
  font-size: 12px; color: var(--text-sub); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; margin: 14px 0 0;
}

.footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
  display: flex; gap: 20px; justify-content: center;
}

/* --- ツールバー --- */
.er-toolbar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 14px; padding: 10px 4px;
}
.er-search { position: relative; display: flex; align-items: center; gap: 6px; width: 240px;
  border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--panel); padding: 6px 10px; }
.er-search svg { flex: none; color: var(--text-muted); }
.er-search input {
  border: none; outline: none; background: transparent; color: var(--text); font-size: 13px;
  font-family: inherit; width: 100%;
}
.er-search-results {
  position: absolute; top: calc(100% + 4px); left: 0; width: 100%; max-height: 220px; overflow-y: auto;
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md); display: none; z-index: 20;
}
.er-search-results.is-open { display: block; }
.er-search-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
.er-search-item:hover { background: var(--accent-soft); }
.er-search-swatch { width: 8px; height: 8px; border-radius: 2px; flex: none; }
.er-search-label { color: var(--text); flex: none; }
.er-search-key { color: var(--text-muted); font-family: var(--mono); font-size: 10.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.er-back-btn {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--accent); cursor: pointer; padding: 6px 12px; font-size: 12.5px; font-family: inherit;
}
.er-back-btn:hover { border-color: var(--accent-border); }

.er-breadcrumb { font-size: 12.5px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; min-width: 100px; }
.er-crumb-link { cursor: pointer; padding: 1px 4px; border-radius: 3px; }
.er-crumb-link:hover { background: var(--accent-soft); color: var(--accent); }
.er-crumb-current { color: var(--text); font-weight: 700; padding: 1px 4px; }

.er-stats { font-size: 12px; color: var(--text-sub); background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px; white-space: nowrap; margin-left: auto; }

.er-toolbar-actions { display: flex; gap: 8px; }
.er-toolbar-actions button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 7px 14px; font-size: 12.5px; font-family: inherit;
}
.er-toolbar-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }

/* --- Canvas ステージ --- */
.er-stage {
  position: relative; overflow: hidden; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--panel); height: min(80vh, 840px); min-height: 480px;
}
.er-canvas-el { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
.er-canvas-el.dragging { cursor: grabbing; }

.er-empty-note {
  position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--text-muted);
}
.er-empty-note[hidden] { display: none; }

/* --- 詳細パネル --- */
.er-detail-panel {
  position: absolute; top: 12px; right: 12px; width: 320px; max-height: calc(100% - 24px);
  overflow-y: auto; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-md); font-size: 11.5px; display: none; z-index: 5;
}
.er-detail-panel.is-open { display: block; }
.er-detail-head { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.er-detail-head h3 { margin: 0; font-size: 13px; }
.er-detail-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; line-height: 1; }
.er-detail-close:hover { color: var(--accent); }
.er-detail-body { padding: 10px 12px; }
.er-detail-cluster { font-size: 10.5px; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.er-detail-swatch { width: 7px; height: 7px; border-radius: 1px; flex: none; }

.er-copy-btn {
  background: var(--accent-soft); border: 1px solid var(--accent-border); color: var(--accent);
  border-radius: var(--radius-sm); padding: 6px 10px; font-size: 11px; cursor: pointer; font-family: inherit;
  display: block; width: 100%; text-align: center; margin: 4px 0 8px;
}
.er-copy-btn:hover { background: var(--accent); color: #fff; }

.er-col-count { font-size: 10.5px; color: var(--text-muted); margin: 4px 0; }
.er-col-row { display: flex; align-items: center; gap: 4px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.er-col-row:last-child { border-bottom: none; }
.er-col-name { font-family: var(--mono); font-size: 10.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.er-col-type { font-family: var(--mono); font-size: 9.5px; color: var(--text-muted); white-space: nowrap; }
.er-col-badges { display: flex; gap: 2px; flex: none; }
.er-badge { font-size: 8.5px; font-weight: 700; padding: 1px 4px; border-radius: 3px; }
.er-badge-pk { background: var(--gold-soft); color: var(--gold); border: 1px solid var(--gold-border); }
.er-badge-fk { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent-border); }
.er-badge-uq { background: var(--panel-2); color: var(--text-sub); border: 1px solid var(--border); }
.er-badge-null { background: var(--panel-2); color: var(--text-muted); border: 1px solid var(--border); }

.er-rel-section { margin-top: 10px; }
.er-rel-section h4 { font-size: 10.5px; color: var(--text-muted); margin: 0 0 4px; font-weight: 700; }
.er-rel-row { font-size: 10.5px; padding: 3px 4px; cursor: pointer; border-radius: 4px; display: flex; gap: 4px; align-items: baseline; }
.er-rel-row:hover { background: var(--accent-soft); }
.er-rel-dir { color: var(--accent); flex: none; }
.er-rel-target { color: var(--text); }
.er-rel-card { color: var(--text-muted); }
.er-empty-list { font-size: 11px; color: var(--text-muted); padding: 4px 0; }

@media (max-width: 760px) {
  .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
  .dp-main { padding: 14px; }
}
@media (max-width: 560px) {
  body { font-size: 14px; }
  .dp-hero h1 { font-size: 20px; }
  .dp-main { padding: 12px; }
  .er-search { width: 100%; }
  .er-stats { margin-left: 0; }
  .er-detail-panel { width: calc(100% - 24px); top: auto; bottom: 12px; max-height: 50%; }
}

.hidden { display: none !important; }

.er-legend {
  position: absolute; bottom: 12px; left: 12px;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius-sm); box-shadow: var(--shadow-sm);
  padding: 10px 14px; font-size: 11px; z-index: 4;
}
.er-legend-title { margin: 0 0 8px; font-size: 11px; font-weight: 700; color: var(--text-sub); }
.er-legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; color: var(--text-sub); }
.er-legend-sym { width: 48px; height: 20px; flex: none; }
.er-legend-toggle {
  position: absolute; bottom: 12px; left: 12px;
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 5px 10px; font-size: 11px; font-family: inherit;
  z-index: 5;
}
.er-legend-toggle:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
.er-legend.is-hidden { display: none; }
.er-zoom-btns { display: flex; gap: 2px; }
.er-zoom-btns button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 6px 10px; font-size: 15px; font-family: inherit;
  line-height: 1; min-width: 32px;
}
.er-zoom-btns button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
</style>
</head>
<body>
<div class="dp-page">
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zM13 9V3.5L18.5 9H13z"/></svg></span>
      <span class="brand-title">サンプルプロジェクト</span>
      <span class="brand-sub">設計ポータル</span>
    </a>
    <div class="header-meta">
      <span class="pm-updated">更新: 2026-07-22T00:00:00Z</span>
    </div>
    <div class="top-actions">
      <button id="theme-toggle" title="テーマ切替">ライト</button>
    </div>
  </header>

  <main class="dp-main">
    <div class="doc-crumbs"><a href="index.html">← ポータル TOP へ戻る</a></div>
    <div class="dp-hero">
      <div>
        <h1>ER図</h1>
        <p>テーブル一覧と外部キー定義から生成したエンティティ関連図(サンプル: ECサイト想定・60テーブル規模)</p>
      </div>
    </div>

    <div class="er-toolbar" id="er-toolbar">
      <div class="er-search">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="er-search-input" placeholder="テーブル名で検索...">
        <div class="er-search-results" id="er-search-results"></div>
      </div>
      <button type="button" class="er-back-btn" id="er-back-btn" hidden>← 戻る</button>
      <div class="er-breadcrumb" id="er-breadcrumb"></div>
      <div class="er-stats" id="er-stats"></div>
      <div class="er-toolbar-actions">
        <div class="er-zoom-btns">
          <button type="button" id="er-btn-zoomout" title="縮小">&minus;</button>
          <button type="button" id="er-btn-zoomin" title="拡大">+</button>
        </div>
        <button type="button" id="er-btn-overview">全体</button>
        <button type="button" id="er-btn-fit">フィット</button>
        <button type="button" id="er-btn-export">PNG保存</button>
      </div>
    </div>

    <div class="er-stage" id="er-stage">
      <canvas id="er-canvas-el"></canvas>
      <div class="er-empty-note" id="er-empty-note" hidden>テーブルがありません</div>
      <div class="er-detail-panel" id="er-detail-panel">
        <div class="er-detail-head">
          <h3 id="er-detail-title"></h3>
          <button type="button" class="er-detail-close" id="er-detail-close" aria-label="閉じる">&times;</button>
        </div>
        <div class="er-detail-body" id="er-detail-body"></div>
      </div>
      <div class="er-legend" id="er-legend">
        <div class="er-legend-title">凡例</div>

    function bfsDistances(start) {
      var dist = {}; dist[start] = 0;

        var cur = q.shift();

    components.forEach(function(comp) {

        var sortedByOutdeg = comp.slice().sort(byOutdegDescKeyAsc);
        var hubKeys = sortedByOutdeg.slice(0, 3).sort(keyAsc);
        var hubSet = {}; hubKeys.forEach(function(h) { hubSet[h] = true; });

  }

  var clusterDefById = {};
  clusterDefs.forEach(function(c) { clusterDefById[c.id] = c; });
  function clusterColorOf(key) {

      if (col.fk && candidates.indexOf(col.name) !== -1) {

    if (!e.fkCol) {
      for (var j = 0; j < toEntity.columns.length; j++) {
        if (toEntity.columns[j].fk) {

  function clusterMemberNamesTruncated(cl, maxW) {

    var line = '';
    for (var i = 0; i < cl.members.length; i++) {

    var sel = selectedNode();
    var active = sel && (e.from === sel || e.to === sel);
    var dim = queryTerm && !active;
    ctx.globalAlpha = dim ? a * .08 : a;
    ctx.strokeStyle = active ? T.accent : T.border;
    var lw = (active ? 1.8 : .8) / cam.z;
    ctx.lineWidth = lw;

    if (e.from === e.to) {
      var sx = e.from.x + NW / 2, sy = e.from.y;
      var loopW = 28 / cam.z, loopH = 36 / cam.z;
      ctx.beginPath();
      ctx.moveTo(sx, sy - 6 / cam.z);
      ctx.bezierCurveTo(sx + loopW, sy - loopH, sx + loopW, sy + loopH, sx, sy + 6 / cam.z);
      ctx.stroke();
      var arSz = 5 / cam.z;
      ctx.beginPath();
      ctx.moveTo(sx, sy + 6 / cam.z);
      ctx.lineTo(sx + arSz, sy + 6 / cam.z - arSz);
      ctx.moveTo(sx, sy + 6 / cam.z);
      ctx.lineTo(sx - arSz * 0.4, sy + 6 / cam.z - arSz);
      ctx.stroke();
      if (e.cardinality && cam.z > 0.35) {
        ctx.fillStyle = active ? T.accent : T.textMuted;
        ctx.font = (9 / cam.z) + 'px ' + T.fontBody;
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(e.cardinality, sx + loopW + 4 / cam.z, sy);
      }
      ctx.globalAlpha = 1;
      return;
    }

    var fx = e.from.x, fy = e.from.y, tx = e.to.x, ty = e.to.y;
    var dx = tx - fx, dy = ty - fy;
    var len = Math.sqrt(dx * dx + dy * dy);
    if (len < 1) { ctx.globalAlpha = 1; return; }
    var nx = dx / len, ny = dy / len;

    var fp = clipLineToRect(fx, fy, NW / 2 + 2, NH / 2 + 2, dx, dy);
    var tp = clipLineToRect(tx, ty, NW / 2 + 2, NH / 2 + 2, -dx, -dy);

    ctx.beginPath();
    ctx.moveTo(fp.x, fp.y);
    ctx.lineTo(tp.x, tp.y);
    ctx.stroke();

    var card = e.cardinality || '';
    var perpX = -ny, perpY = nx;
    var symSz = 9 / cam.z;

    if (cam.z > 0.25) {
      if (card === '1:N' || card === '1:n') {
        drawOneMark(fp.x, fp.y, nx, ny, perpX, perpY, symSz);
        drawCrowsFoot(tp.x, tp.y, -nx, -ny, perpX, perpY, symSz);
      } else if (card === '1:1') {
        drawOneMark(fp.x, fp.y, nx, ny, perpX, perpY, symSz);
        drawOneMark(tp.x, tp.y, -nx, -ny, perpX, perpY, symSz);
      }
    }

    if (card && cam.z > 0.35) {
      var midX = (fp.x + tp.x) / 2;
      var midY = (fp.y + tp.y) / 2;
      ctx.fillStyle = active ? T.accent : T.textMuted;
      ctx.font = '600 ' + (9 / cam.z) + 'px ' + T.fontBody;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(card, midX + perpX * 10 / cam.z, midY + perpY * 10 / cam.z);
    }

    if (e.fkCol && cam.z > 0.55) {
      var fkLabelX = fp.x + (tp.x - fp.x) * 0.75;
      var fkLabelY = fp.y + (tp.y - fp.y) * 0.75;
      ctx.fillStyle = active ? T.accent : T.textMuted;
      ctx.font = (8 / cam.z) + 'px ' + T.mono;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(e.fkCol, fkLabelX - perpX * 10 / cam.z, fkLabelY - perpY * 10 / cam.z);
    }

    ctx.globalAlpha = 1;
  }

  function toggleEmptyNote(show) {
    var noteEl = document.getElementById('er-empty-note');
    if (show) noteEl.removeAttribute('hidden'); else noteEl.setAttribute('hidden', 'hidden');
  }

  function updateStatsText() {
    document.getElementById('er-stats').textContent = 'テーブル ' + entities.length + '件 / リレーション ' + graph.relations.length + '件';
  }

  function render() {
    ctx.save();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var T = themeColors();
    ctx.fillStyle = T.panel;
    ctx.fillRect(0, 0, W, H);

    if (entities.length === 0 || clusterDefs.length === 0) {
      ctx.restore();
      toggleEmptyNote(true);
      updateStatsText();
      return;
    }
    toggleEmptyNote(false);

    ctx.translate(W / 2, H / 2); ctx.scale(cam.z, cam.z); ctx.translate(-cam.x, -cam.y);
    if (state.mode === 'clusters') {
      drawCrossClusterEdges(T);
      clusterDefs.forEach(function(cl) { drawClusterCard(cl, T); });
    } else {
      allEdges.forEach(function(e) { drawEdge(e, T); });
      allNodes.forEach(function(n) { drawNode(n, T); });
    }
    ctx.restore();
    updateStatsText();
  }

  function upAnim() {
    if (!anim) return;
    var t = Math.min(1, (performance.now() - aStart) / ADUR);
    var e = ease(t);
    allNodes.forEach(function(n) {
      var tgt = anim[n.key];
      if (!tgt) return;
      n.x = n.sx + (tgt.tx - n.sx) * e;
      n.y = n.sy + (tgt.ty - n.sy) * e;
      n.a = n.sa + (tgt.ta - n.sa) * e;
    });
    cam.x = cam.sx + (cam.tx - cam.sx) * e;
    cam.y = cam.sy + (cam.ty - cam.sy) * e;
    cam.z = cam.sz + (cam.tz - cam.sz) * e;
    if (t >= 1) anim = null;
  }

  function startAnim(targets, camTx, camTy, camTz) {
    anim = targets;
    allNodes.forEach(function(n) { if (!anim[n.key]) anim[n.key] = { tx: n.x, ty: n.y, ta: .04 }; });
    allNodes.forEach(function(n) { n.sx = n.x; n.sy = n.y; n.sa = n.a; });
    aStart = performance.now();
    cam.sx = cam.x; cam.sy = cam.y; cam.sz = cam.z;
    cam.tx = camTx; cam.ty = camTy; cam.tz = camTz;
  }

  function computeFitZoom(worldW, worldH) {
    var z = Math.min(W / Math.max(1, worldW), H / Math.max(1, worldH), 1.6);
    return Math.max(.15, z);
  }

  function fitClustersZoom() {
    if (!clusterDefs.length) return .6;
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    clusterDefs.forEach(function(c) {
      minX = Math.min(minX, c.x - c.w / 2); maxX = Math.max(maxX, c.x + c.w / 2);
      minY = Math.min(minY, c.y - c.h / 2); maxY = Math.max(maxY, c.y + c.h / 2);
    });
    return computeFitZoom(maxX - minX + 80, maxY - minY + 80);
  }

  // --- 状態遷移 ---
  function renderBreadcrumb(parts) {
    var wrap = document.getElementById('er-breadcrumb');
    wrap.innerHTML = '';
    var home = el('span', { class: parts.length ? 'er-crumb-link' : 'er-crumb-current' }, '全体');
    if (parts.length) home.addEventListener('click', enterOverview);
    wrap.appendChild(home);
    parts.forEach(function(p, i) {
      wrap.appendChild(document.createTextNode(' › '));
      var isLast = i === parts.length - 1;
      var span = el('span', { class: isLast ? 'er-crumb-current' : 'er-crumb-link' }, p.label);
      if (!isLast && p.action) span.addEventListener('click', p.action);
      wrap.appendChild(span);
    });
  }

  function updateBackButton() {
    document.getElementById('er-back-btn').hidden = state.mode === 'clusters';
  }

  function hideDetail() {
    document.getElementById('er-detail-panel').classList.remove('is-open');
  }

  function enterOverview() {
    state.mode = 'clusters'; state.focusClusterId = null; state.selectedKey = null;
    hideDetail();
    allNodes.forEach(function(n) { n.a = 1; n.ta = 1; });
    clusterDefs.forEach(layoutClusterMembers);
    anim = null;
    cam.x = 0; cam.y = 0; cam.z = fitClustersZoom();
    renderBreadcrumb([]);
    updateBackButton();
  }

  function enterExpand(clusterId) {
    var cl = clusterDefById[clusterId];
    if (!cl) return;
    state.mode = 'expand'; state.focusClusterId = clusterId; state.selectedKey = null;
    hideDetail();
    var n = cl.members.length;
    var radius = 160 + n * 28;
    var targets = {};
    cl.members.forEach(function(k, i) {
      var ang = Math.PI * 2 * i / Math.max(1, n) - Math.PI / 2;
      targets[k] = { tx: Math.cos(ang) * radius, ty: Math.sin(ang) * radius, ta: 1 };
    });
    startAnim(targets, 0, 0, computeFitZoom(radius * 2 + 280, radius * 2 + 240));
    renderBreadcrumb([{ label: clusterLabel(clusterId), action: null }]);
    updateBackButton();
  }

  function enterTable(key) {
    var n = nodeByKey[key];
    if (!n) return;
    state.mode = 'table'; state.selectedKey = key;
    var relKeys = [], seen = {};
    graph.relations.forEach(function(r) {
      var other = r.from === key ? r.to : (r.to === key ? r.from : null);
      if (other && !seen[other]) { seen[other] = true; relKeys.push(other); }
    });
    relKeys.sort(keyAsc);
    var radius = Math.max(260, relKeys.length * 38);
    var targets = {};
    targets[key] = { tx: 0, ty: 0, ta: 1 };
    relKeys.forEach(function(k, i) {
      var ang = Math.PI * 2 * i / Math.max(1, relKeys.length) - Math.PI / 2;
      targets[k] = { tx: Math.cos(ang) * radius, ty: Math.sin(ang) * radius, ta: 1 };
    });
    startAnim(targets, 0, 0, computeFitZoom(radius * 2 + 300, radius * 2 + 260));
    var cid = clusterIdOf(key);
    renderBreadcrumb([
      { label: clusterLabel(cid), action: function() { enterExpand(cid); } },
      { label: n.label, action: null }
    ]);
    updateBackButton();
    showDetail(n);
  }

  function goBack() {
    if (state.mode === 'table') {
      enterExpand(clusterIdOf(state.selectedKey));
    } else if (state.mode === 'expand') {
      enterOverview();
    }
  }

  function fitView() {
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    if (state.mode === 'clusters') {
      clusterDefs.forEach(function(c) {
        minX = Math.min(minX, c.x - c.w / 2); maxX = Math.max(maxX, c.x + c.w / 2);
        minY = Math.min(minY, c.y - c.h / 2); maxY = Math.max(maxY, c.y + c.h / 2);
      });
    } else {
      allNodes.forEach(function(n) {
        if (n.a > .1) { minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x); minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y); }
      });
    }
    if (minX === Infinity) return;
    anim = null;
    cam.x = (minX + maxX) / 2; cam.y = (minY + maxY) / 2;
    cam.z = computeFitZoom(maxX - minX + 220, maxY - minY + 180);
  }

  // --- 詳細パネル ---
  function showDetail(n) {
    var panel = document.getElementById('er-detail-panel');
    document.getElementById('er-detail-title').textContent = n.label;
    var body = document.getElementById('er-detail-body');
    body.innerHTML = '';

    var cid = clusterIdOf(n.key);
    var head = el('div', { class: 'er-detail-cluster' }, [
      el('span', { class: 'er-detail-swatch', style: 'background:' + clusterColorOf(n.key) }),
      document.createTextNode(n.key + '（' + clusterLabel(cid) + '）')
    ]);
    body.appendChild(head);

    var copyBtn = el('button', { type: 'button', class: 'er-copy-btn' }, 'テーブル定義をコピー');
    copyBtn.addEventListener('click', function() { copyDDL(n.key, copyBtn); });
    body.appendChild(copyBtn);

    var cols = n.cols || [];
    body.appendChild(el('div', { class: 'er-col-count' }, cols.length + ' カラム'));
    if (cols.length === 0) {
      body.appendChild(el('div', { class: 'er-empty-list' }, 'カラム情報なし'));
    } else {
      cols.forEach(function(c) {
        var badges = el('span', { class: 'er-col-badges' });
        if (c.pk) badges.appendChild(el('span', { class: 'er-badge er-badge-pk' }, 'PK'));
        if (c.fk) badges.appendChild(el('span', { class: 'er-badge er-badge-fk' }, 'FK'));
        if (c.unique) badges.appendChild(el('span', { class: 'er-badge er-badge-uq' }, 'UQ'));
        if (c.nullable) badges.appendChild(el('span', { class: 'er-badge er-badge-null' }, 'NULL'));
        body.appendChild(el('div', { class: 'er-col-row' }, [
          el('span', { class: 'er-col-name', title: c.name }, c.name),
          el('span', { class: 'er-col-type' }, c.type || ''),
          badges
        ]));
      });
    }

    var rel = el('div', { class: 'er-rel-section' });
    var relRelations = graph.relations.filter(function(r) { return r.from === n.key || r.to === n.key; });
    rel.appendChild(el('h4', null, 'リレーション（' + relRelations.length + '）'));
    if (relRelations.length === 0) {
      rel.appendChild(el('div', { class: 'er-empty-list' }, 'なし'));
    } else {
      relRelations.forEach(function(r) {
        var otherKey = r.from === n.key ? r.to : r.from;
        var dir = r.from === n.key ? '→' : '←';
        var oe = entitiesByKey[otherKey];
        var row = el('div', { class: 'er-rel-row' }, [
          el('span', { class: 'er-rel-dir' }, dir),
          el('span', { class: 'er-rel-target' }, oe ? oe.label : otherKey),
          el('span', { class: 'er-rel-card' }, r.cardinality ? '（' + r.cardinality + '）' : '')
        ]);
        row.addEventListener('click', function() { if (nodeByKey[otherKey]) enterTable(otherKey); });
        rel.appendChild(row);
      });
    }
    body.appendChild(rel);

    panel.classList.add('is-open');
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  window.copyDDL = function(key, btn) {
    var n = nodeByKey[key];
    if (!n) return;
    var cols = n.cols || [];
    var sql = 'CREATE TABLE ' + n.key + ' (\n';
    if (cols.length === 0) {
      sql += '  -- カラム情報なし\n';
    } else {
      cols.forEach(function(c, i) {
        sql += '  ' + c.name + ' ' + (c.type || '');
        if (c.pk) sql += ' PRIMARY KEY';
        if (c.unique) sql += ' UNIQUE';
        if (!c.nullable && !c.pk) sql += ' NOT NULL';
        if (i < cols.length - 1) sql += ',';
        sql += '\n';
      });
    }
    sql += ');';
    function done() {
      if (!btn) return;
      var original = btn.textContent;
      btn.textContent = 'コピーしました';
      setTimeout(function() { btn.textContent = original; }, 1200);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(sql).then(done, function() { fallbackCopy(sql); done(); });
    } else {
      fallbackCopy(sql);
      done();
    }
  };

  document.getElementById('er-detail-close').addEventListener('click', goBack);

  // --- 座標変換・当たり判定 ---
  function s2w(clientX, clientY) {
    var rect = cv.getBoundingClientRect();
    var sx = clientX - rect.left, sy = clientY - rect.top;
    return { x: (sx - W / 2) / cam.z + cam.x, y: (sy - H / 2) / cam.z + cam.y };
  }
  function hitCluster(wx, wy) {
    for (var i = 0; i < clusterDefs.length; i++) {
      var c = clusterDefs[i];
      if (wx >= c.x - c.w / 2 && wx <= c.x + c.w / 2 && wy >= c.y - c.h / 2 && wy <= c.y + c.h / 2) return c;
    }
    return null;
  }
  function hitNode(wx, wy) {
    for (var i = allNodes.length - 1; i >= 0; i--) {
      var n = allNodes[i];
      if (n.a < .05) continue;
      if (wx >= n.x - NW / 2 && wx <= n.x + NW / 2 && wy >= n.y - NH / 2 && wy <= n.y + NH / 2) return n;
    }
    return null;
  }

  // --- イベント ---
  cv.addEventListener('wheel', function(ev) {
    ev.preventDefault();
    cam.z = Math.max(.15, Math.min(3, cam.z * (ev.deltaY > 0 ? .9 : 1.1)));
  }, { passive: false });

  cv.addEventListener('mousemove', function(ev) {
    if (drag) return;
    var w = s2w(ev.clientX, ev.clientY);
    var hit = false;
    if (state.mode === 'clusters') {
      hit = !!hitCluster(w.x, w.y);
    } else {
      hit = !!hitNode(w.x, w.y);
    }
    cv.style.cursor = hit ? 'pointer' : 'grab';
  });

  cv.addEventListener('mousedown', function(ev) {
    var w = s2w(ev.clientX, ev.clientY);
    if (state.mode === 'clusters') {
      var c = hitCluster(w.x, w.y);
      if (c) { enterExpand(c.id); return; }
    } else {
      var n = hitNode(w.x, w.y);
      if (n) { enterTable(n.key); return; }
    }
    drag = { sx: ev.clientX, sy: ev.clientY, cx: cam.x, cy: cam.y };
    cv.classList.add('dragging');
  });
  window.addEventListener('mousemove', function(ev) {
    if (!drag) return;
    cam.x = drag.cx - (ev.clientX - drag.sx) / cam.z;
    cam.y = drag.cy - (ev.clientY - drag.sy) / cam.z;
  });
  window.addEventListener('mouseup', function() { drag = null; cv.classList.remove('dragging'); cv.style.cursor = 'grab'; });

  var touch0 = null;
  cv.addEventListener('touchstart', function(ev) {
    if (ev.touches.length === 1) {
      var t = ev.touches[0];
      touch0 = { sx: t.clientX, sy: t.clientY, cx: cam.x, cy: cam.y };
    }
  }, { passive: true });
  cv.addEventListener('touchmove', function(ev) {
    if (touch0 && ev.touches.length === 1) {
      var t = ev.touches[0];
      cam.x = touch0.cx - (t.clientX - touch0.sx) / cam.z;
      cam.y = touch0.cy - (t.clientY - touch0.sy) / cam.z;
    }
  }, { passive: true });
  cv.addEventListener('touchend', function(ev) {
    if (touch0 && ev.changedTouches.length === 1) {
      var t = ev.changedTouches[0];
      if (Math.abs(t.clientX - touch0.sx) < 10 && Math.abs(t.clientY - touch0.sy) < 10) {
        var w = s2w(t.clientX, t.clientY);
        if (state.mode === 'clusters') {
          var c = hitCluster(w.x, w.y);
          if (c) { enterExpand(c.id); touch0 = null; return; }
        } else {
          var n = hitNode(w.x, w.y);
          if (n) { enterTable(n.key); touch0 = null; return; }
        }
      }
    }
    touch0 = null;
  });

  document.addEventListener('keydown', function(ev) { if (ev.key === 'Escape') goBack(); });

  document.getElementById('er-back-btn').addEventListener('click', goBack);
  document.getElementById('er-btn-overview').addEventListener('click', enterOverview);
  document.getElementById('er-btn-fit').addEventListener('click', fitView);
  document.getElementById('er-btn-zoomin').addEventListener('click', function() {
    cam.z = Math.min(3, cam.z * 1.25);
  });
  document.getElementById('er-btn-zoomout').addEventListener('click', function() {
    cam.z = Math.max(0.15, cam.z * 0.8);
  });

  document.getElementById('er-btn-export').addEventListener('click', function() {
    var tempCv = document.createElement('canvas');
    var exportScale = 2;
    tempCv.width = W * exportScale;
    tempCv.height = H * exportScale;
    var tempCtx = tempCv.getContext('2d');
    var origCtx = ctx;
    var origDpr = dpr;
    ctx = tempCtx;
    dpr = exportScale;
    render();
    ctx = origCtx;
    dpr = origDpr;
    var link = document.createElement('a');
    link.download = 'er-diagram.png';
    link.href = tempCv.toDataURL('image/png');
    link.click();
  });

  var legendEl = document.getElementById('er-legend');
  var legendToggle = document.getElementById('er-legend-toggle');
  legendToggle.addEventListener('click', function() {
    legendEl.classList.remove('is-hidden');
    legendToggle.style.display = 'none';
  });
  var legendClose = document.createElement('button');
  legendClose.type = 'button';
  legendClose.style.cssText = 'position:absolute;top:6px;right:6px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;';
  legendClose.setAttribute('aria-label', '閉じる');
  legendClose.innerHTML = '&times;';
  legendEl.style.position = 'relative';
  legendEl.insertBefore(legendClose, legendEl.firstChild);
  legendClose.addEventListener('click', function() {
    legendEl.classList.add('is-hidden');
    legendToggle.style.display = '';
  });

  var searchInput = document.getElementById('er-search-input');
  var searchResults = document.getElementById('er-search-results');
  searchInput.addEventListener('input', function() {
    queryTerm = normalize(searchInput.value);
    searchResults.innerHTML = '';
    if (!queryTerm) { searchResults.classList.remove('is-open'); return; }
    var matches = entities.filter(function(e) {
      return normalize(e.key).indexOf(queryTerm) !== -1 || normalize(e.label || e.key).indexOf(queryTerm) !== -1;
    }).slice(0, 10);
    if (!matches.length) { searchResults.classList.remove('is-open'); return; }
    matches.forEach(function(e) {
      var item = el('div', { class: 'er-search-item' }, [
        el('span', { class: 'er-search-swatch', style: 'background:' + clusterColorOf(e.key) }),
        el('span', { class: 'er-search-label' }, e.label || e.key),
        el('span', { class: 'er-search-key' }, e.key)
      ]);
      item.addEventListener('click', function() {
        enterTable(e.key);
        searchInput.value = ''; queryTerm = '';
        searchResults.classList.remove('is-open');
      });
      searchResults.appendChild(item);
    });
    searchResults.classList.add('is-open');
  });
  searchInput.addEventListener('blur', function() { setTimeout(function() { searchResults.classList.remove('is-open'); }, 200); });

  // --- 起動 ---
  resize();
  window.addEventListener('resize', resize);
  enterOverview();
  function loop() { upAnim(); render(); requestAnimationFrame(loop); }
  loop();

  // --- 未解決節(unresolved[]) ---
  var unresolvedMount = document.getElementById('unresolved-mount');
  var unresolved = data.unresolved || [];
  if (unresolved.length > 0) {
    unresolvedMount.appendChild(el('div', { class: 'sec-label' }, '未解決'));
    var box = el('div', { class: 'note-box' });
    unresolved.forEach(function(u) {
      var line = (u.label || '') + '（' + (u.reason || '') + '）';
      box.appendChild(el('div', null, line));
    });
    unresolvedMount.appendChild(box);
  }

  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var r = document.documentElement;
    var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
    themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
    try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
  });
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch(e) {}
})();
</script>
