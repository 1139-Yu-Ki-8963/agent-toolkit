<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>リリースノート — 設計ポータル</title>
<style>
:root,
[data-theme="light"] {
  /* Windows フォント上書き防止 */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-synthesis: none;
  --bg: #FFFFFF;
  --panel: #FFFFFF;
  --panel-2: #F6F8FA;
  --border: #D1D9E0;
  --border-strong: #AFB8C1;
  --text: #1B1F26;
  --text-sub: #4A4F58;
  --text-muted: #767B85;
  --accent: #0969DA;
  --accent-2: #218BFF;
  --accent-soft: #DDF4FF;
  --accent-border: #54AEFF;
  --gold: #BC4C00;
  --gold-soft: #FFF1E5;
  --gold-border: #D18A5A;
  --success: #1A7F37;
  --success-soft: #DAFBE1;
  --warn: #BC4C00;
  --danger: #CF222E;
  --danger-soft: #FFEBE9;
  --highlight: #D97B1A;
  --highlight-soft: rgba(217,123,26,0.12);
  --highlight-border: rgba(217,123,26,0.5);
  --nav-tag: #7B8BBF;
  --nav-tag-soft: #ECEEF6;
  --self-tag: #6B9B6B;
  --self-tag-soft: #E8F0E8;
  --code-bg: #1B1F26;
  --code-fg: #E8E5DC;
  --cat-list: #2563eb;
  --cat-common: #059669;
  --cat-project: #7C3AED;
  --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
  --mono: "SFMono-Regular","Menlo","Cascadia Code","Consolas",monospace;
  --shadow-sm: 0 1px 3px rgba(27,31,38,.07), 0 2px 6px rgba(27,31,38,.05);
  --shadow-md: 0 2px 8px rgba(27,31,38,.09), 0 8px 24px rgba(27,31,38,.07);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
    --border: #30363D; --border-strong: #484F58;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
    --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
    --success: #3FB950; --success-soft: #0D2818;
    --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
    --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5);
    --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15);
    --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15);
    --code-bg: #0E1116; --code-fg: #E8E5DC;
    --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
  }
}
[data-theme="dark"] {
  --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
  --border: #30363D; --border-strong: #484F58;
  --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
  --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
  --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
  --success: #3FB950; --success-soft: #0D2818;
  --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
  --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5);
  --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15);
  --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15);
  --code-bg: #0E1116; --code-fg: #E8E5DC;
  --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.dp-page { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; overflow: hidden; }

.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); }
.brand:hover { text-decoration: none; }
.brand-icon { display: inline-flex; align-items: center; }
.brand-title { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: var(--text-muted, #6c757d); }
.top-actions { display: flex; align-items: center; gap: 8px; }
.top-actions button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
.header-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }

.dp-main { max-width: 1000px; width: 100%; min-width: 0; margin: 0 auto; padding: 24px 24px 64px; overflow-y: auto; min-height: 0; }

.doc-crumbs { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.doc-crumbs a { color: var(--text-sub); cursor: pointer; }
.doc-crumbs a:hover { color: var(--accent); }

.dp-hero {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  padding: 4px 2px 14px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap;
}
.dp-hero h1 { font-size: 23px; margin: 0; }
.dp-hero p { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 0; }
.dp-updated {
  font-size: 12px; color: var(--text-sub); background: var(--accent-soft);
  border: 1px solid var(--accent-border); border-radius: 999px; padding: 3px 12px; white-space: nowrap;
}

.sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-sub);
  display: flex; align-items: center; gap: 8px; margin: 6px 0 12px;
}
.sec-label::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }

/* ============ PR 行（トップレベル <details> アコーディオン）============ */
.release-list { display: flex; flex-direction: column; gap: 10px; }
.rn-pr {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.rn-pr[data-flow="feature"]     { border-left: 4px solid #d97706; }
.rn-pr[data-flow="maintenance"] { border-left: 4px solid var(--success); }
.rn-pr[data-flow="docs"]        { border-left: 4px solid #7c3aed; }
.rn-pr.is-done { background: var(--panel-2); box-shadow: none; }

.rn-pr-sum {
  list-style: none; cursor: pointer;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.rn-pr-sum::-webkit-details-marker { display: none; }
.rn-pr-caret { flex: none; font-size: 9px; color: var(--text-muted); transition: transform .15s; }
.rn-pr[open] .rn-pr-caret { transform: rotate(90deg); }

.rn-tick { flex: none; color: var(--success); font-weight: 800; font-size: 14px; }

.rn-flow-pill {
  flex: none; padding: 2px 9px; border-radius: 999px;
  font-size: 10.5px; font-weight: 800; white-space: nowrap; color: #fff;
}
.rn-flow-pill--feature     { background: #d97706; }
.rn-flow-pill--maintenance { background: var(--success); }
.rn-flow-pill--docs        { background: #7c3aed; }
.rn-pr.is-done .rn-flow-pill { opacity: 0.75; }

.rn-pr-num {
  flex: none; font-family: var(--mono); font-size: 12px; font-weight: 700;
  color: var(--accent); background: var(--panel);
  padding: 2px 8px; border-radius: 999px; border: 1px solid var(--accent-border);
  text-decoration: none;
}
.rn-pr-num:hover { background: var(--accent-soft); }
.rn-pr.is-done .rn-pr-num { opacity: 0.75; }

.rn-pr-date { flex: none; font-size: 11.5px; color: var(--text-muted); }

.rn-pr-title { flex: 1; min-width: 0; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; overflow-wrap: break-word; }
.rn-pr.is-done .rn-pr-title { font-weight: 500; color: var(--text-sub); }

.rn-pr-body { padding: 4px 14px 14px; border-top: 1px dashed var(--border); margin: 0 4px; }

/* ============ 中身フォルド（変更概要 / 変更内容 / 確認手順）============ */
.rn-fold { margin: 8px 0 0; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.rn-fold-sum {
  list-style: none; cursor: pointer; padding: 10px 12px;
  font-size: 12.5px; font-weight: 800; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.rn-fold-sum::-webkit-details-marker { display: none; }
.rn-fold-sum::before { content: "▶"; flex: none; font-size: 9px; transition: transform .15s; }
.rn-fold[open] .rn-fold-sum::before { transform: rotate(90deg); }
.rn-fold-label { flex: 1; }

.rn-fold[data-kind="summary"] { border-color: var(--accent-border); }
.rn-fold[data-kind="summary"] .rn-fold-sum { background: var(--accent-soft); color: var(--accent); border-bottom: 1px solid var(--accent-border); }
.rn-fold[data-kind="summary"] .rn-fold-sum::before { color: var(--accent); }

.rn-fold[data-kind="changes"] { border-color: var(--border); }
.rn-fold[data-kind="changes"] .rn-fold-sum { background: var(--panel-2); color: var(--text); border-bottom: 1px solid var(--border); }
.rn-fold[data-kind="changes"] .rn-fold-sum::before { color: var(--text-muted); }

.rn-fold[data-kind="verify"] { border-color: var(--danger); border-width: 1.5px; }
.rn-fold[data-kind="verify"] .rn-fold-sum { background: var(--danger-soft); color: var(--danger); border-bottom: 1px solid var(--danger); }
.rn-fold[data-kind="verify"] .rn-fold-sum::before { color: var(--danger); }
.rn-pr.is-done .rn-fold[data-kind="verify"] { border-color: var(--success); border-width: 1px; }
.rn-pr.is-done .rn-fold[data-kind="verify"] .rn-fold-sum { background: var(--success-soft); color: var(--success); border-bottom-color: var(--success); }
.rn-pr.is-done .rn-fold[data-kind="verify"] .rn-fold-sum::before { color: var(--success); }

.rn-fold-body { padding: 10px 12px 12px; }

/* ============ 変更概要: ラベル付き箇条書き ============ */
.rn-dl { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
.rn-dl > li { display: flex; flex-direction: column; gap: 2px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
.rn-dl > li:last-child { border-bottom: none; }
.rn-dl-label { font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: 0.04em; }
.rn-dl-text { font-size: 13px; line-height: 1.6; color: var(--text); overflow-wrap: break-word; }

/* ============ 変更内容: 種別バッジ付き ============ */
.rn-changes { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
.rn-changes li { display: flex; align-items: flex-start; gap: 8px; font-size: 12.5px; line-height: 1.55; padding: 4px 0; color: var(--text-sub); overflow-wrap: break-word; }
.badge { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 800; white-space: nowrap; flex: none; margin-top: 2px; }
.badge-feat { background: var(--success-soft); color: var(--success); }
.badge-fix  { background: var(--danger-soft);  color: var(--danger); }
.badge-docs { background: var(--accent-soft);  color: var(--accent); }
.badge-test { background: var(--gold-soft);    color: var(--gold); }
.badge-refactor, .badge-chore { background: var(--panel-2); color: var(--text-muted); border: 1px solid var(--border); }

/* ============ 確認手順: チェックボックス付き ============ */
.rn-step { padding-bottom: 8px; }
.rn-step + .rn-step { border-top: 1px dashed var(--border); padding-top: 8px; }
.rn-step-h { padding: 2px 4px 6px; font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.45; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.rn-env { font-size: 10px; font-weight: 800; border-radius: 3px; padding: 1px 6px; flex: none; }
.rn-env--staging { background: var(--accent-soft); color: var(--accent); }
.rn-env--production { background: var(--danger-soft); color: var(--danger); }
.rn-env--local { background: var(--panel-2); color: var(--text-muted); border: 1px solid var(--border); }

.rn-checkrow {
  display: flex; align-items: flex-start; gap: 12px; padding: 8px 6px; cursor: pointer;
  border-radius: var(--radius-sm); transition: background .12s; margin: 1px 0;
}
.rn-checkrow:hover, .rn-checkrow:focus-within { background: var(--accent-soft); }
.rn-checkrow input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; flex: none; accent-color: var(--accent); cursor: pointer; }
.rn-checkrow-text { flex: 1; font-size: 13px; line-height: 1.55; color: var(--text); overflow-wrap: break-word; }
.rn-checkrow.is-done { opacity: 0.6; }
.rn-checkrow.is-done .rn-checkrow-text { color: var(--text-muted); text-decoration: line-through; }

.empty-note {
  font-size: 12.5px; color: var(--text-muted); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px;
}

.note-box {
  font-size: 12px; color: var(--text-sub); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; margin: 14px 0 0;
}

.footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
  display: flex; gap: 20px; justify-content: center;
}

@media (max-width: 760px) {
  .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
  .dp-main { padding: 14px; }
}
@media (max-width: 560px) {
  body { font-size: 14px; }
  .dp-hero h1 { font-size: 20px; }
  .dp-main { padding: 12px; }
  .rn-pr-title { font-size: 13.5px; }
}

.hidden { display: none !important; }
</style>
</head>

<div class="dp-page">
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zM13 9V3.5L18.5 9H13z"/></svg></span>

<script>
(function() {
  var data = JSON.parse(document.getElementById('page-data').textContent);
  var STORE_KEY_PREFIX = 'rn-';

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      if (k === 'html') node.innerHTML = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  function loadChecked(key) {
    try { return localStorage.getItem(key) === '1'; } catch (e) { return false; }
  }
  function saveChecked(key, value) {
    try { localStorage.setItem(key, value ? '1' : '0'); } catch (e) {}
  }

  var FLOW_LABEL = { feature: '機能追加', maintenance: '保守', docs: 'ドキュメント' };
  var TYPE_LABEL = { feat: 'feat', fix: 'fix', docs: 'docs', test: 'test', refactor: 'refactor', chore: 'chore' };

  function makeFold(kind, label, openByDefault, bodyBuilder) {
    var det = el('details', { class: 'rn-fold', 'data-kind': kind });
    if (openByDefault) det.setAttribute('open', '');
    var sum = el('summary', { class: 'rn-fold-sum' }, el('span', { class: 'rn-fold-label' }, label));
    det.appendChild(sum);
    var body = el('div', { class: 'rn-fold-body' });
    bodyBuilder(body);
    det.appendChild(body);
    return det;
  }

  function buildSummaryBody(body, summary) {
    var ul = el('ul', { class: 'rn-dl' });
    (summary || []).forEach(function(item) {
      var li = el('li', null, [
        el('span', { class: 'rn-dl-label' }, (item.label || '') + '：'),
        el('span', { class: 'rn-dl-text' }, item.text || '')
      ]);
      ul.appendChild(li);
    });
    body.appendChild(ul);
  }

  function buildChangesBody(body, changes) {
    var ul = el('ul', { class: 'rn-changes' });
    (changes || []).forEach(function(c) {
      var badgeClass = ['feat', 'fix', 'docs', 'test', 'refactor', 'chore'].indexOf(c.type) !== -1 ? c.type : 'chore';
      var li = el('li', null, [
        el('span', { class: 'badge badge-' + badgeClass }, TYPE_LABEL[c.type] || c.type || ''),
        el('span', null, c.text || '')
      ]);
      ul.appendChild(li);
    });
    body.appendChild(ul);
  }

  // 確認手順チェック状態から完了カウントを集計する
  function countChecks(release) {
    var total = 0, done = 0;
    (release.verifySteps || []).forEach(function(step, si) {
      (step.checks || []).forEach(function(_c, ci) {
        total++;
        var key = STORE_KEY_PREFIX + release.id + '-' + si + '-' + ci;
        if (loadChecked(key)) done++;
      });
    });
    return { total: total, done: done };
  }

  function buildVerifyBody(body, release, onChange) {
    (release.verifySteps || []).forEach(function(step, si) {
      var stepWrap = el('div', { class: 'rn-step' });
      var sh = el('div', { class: 'rn-step-h' }, [el('span', null, 'Step ' + (si + 1) + ': ' + (step.title || ''))]);
      if (step.env) {
        sh.appendChild(el('span', { class: 'rn-env rn-env--' + step.env }, step.env));
      }
      stepWrap.appendChild(sh);
      (step.checks || []).forEach(function(text, ci) {
        var key = STORE_KEY_PREFIX + release.id + '-' + si + '-' + ci;
        var isDone = loadChecked(key);
        var label = el('label', { class: 'rn-checkrow' + (isDone ? ' is-done' : '') });
        var box = el('input', { type: 'checkbox' });
        if (isDone) box.checked = true;
        box.addEventListener('change', function() {
          saveChecked(key, box.checked);
          onChange();
        });
        label.appendChild(box);
        label.appendChild(el('span', { class: 'rn-checkrow-text' }, text));
        stepWrap.appendChild(label);
      });
      body.appendChild(stepWrap);
    });
  }

  function renderRelease(release) {
    var counts = countChecks(release);
    var isDone = counts.total > 0 && counts.done === counts.total;

    var det = el('details', { class: 'rn-pr' + (isDone ? ' is-done' : ''), 'data-flow': release.flow || 'feature' });

    var sum = el('summary', { class: 'rn-pr-sum' });
    sum.appendChild(el('span', { class: 'rn-pr-caret' }, '▶'));
    if (isDone) sum.appendChild(el('span', { class: 'rn-tick' }, '✓'));
    sum.appendChild(el('span', { class: 'rn-flow-pill rn-flow-pill--' + (release.flow || 'feature') }, FLOW_LABEL[release.flow] || release.flow || ''));
    if (release.prUrl) {
      var a = el('a', { class: 'rn-pr-num', href: release.prUrl, target: '_blank', rel: 'noopener' }, '#' + release.pr);
      a.addEventListener('click', function(ev) { ev.stopPropagation(); });
      sum.appendChild(a);
    } else {
      sum.appendChild(el('span', { class: 'rn-pr-num' }, '#' + release.pr));
    }
    sum.appendChild(el('span', { class: 'rn-pr-date' }, release.date || ''));
    sum.appendChild(el('span', { class: 'rn-pr-title' }, release.title || ''));
    det.appendChild(sum);

    var body = el('div', { class: 'rn-pr-body' });
    if ((release.summary || []).length) {
      body.appendChild(makeFold('summary', '変更概要', true, function(b) { buildSummaryBody(b, release.summary); }));
    }
    if ((release.changes || []).length) {
      body.appendChild(makeFold('changes', '変更内容', false, function(b) { buildChangesBody(b, release.changes); }));
    }
    if ((release.verifySteps || []).length) {
      body.appendChild(makeFold('verify', '確認手順（' + counts.done + '/' + counts.total + '）', false, function(b) {
        buildVerifyBody(b, release, render);
      }));
    }
    det.appendChild(body);
    return det;
  }

  var releaseMount = document.getElementById('release-mount');
  var releases = data.releases || [];

  function render() {
    // 開いている <details> の id を保持し、再描画後も展開状態を維持する
    var openIds = [];
    releaseMount.querySelectorAll('.rn-pr[open]').forEach(function(d) { openIds.push(d.dataset.id); });

    releaseMount.innerHTML = '';
    if (releases.length === 0) {
      releaseMount.appendChild(el('div', { class: 'empty-note' }, 'なし'));
      return;
    }
    releases.forEach(function(release) {
      var node = renderRelease(release);
      node.dataset.id = release.id;
      if (openIds.indexOf(release.id) !== -1) node.setAttribute('open', '');
      releaseMount.appendChild(node);
    });
  }

  render();

  // --- 未解決節(unresolved[]) ---
  var unresolvedMount = document.getElementById('unresolved-mount');
  var unresolved = data.unresolved || [];
  if (unresolved.length > 0) {
    unresolvedMount.appendChild(el('div', { class: 'sec-label' }, '未解決'));
    var box = el('div', { class: 'note-box' });
    unresolved.forEach(function(u) {
      var line = (u.label || '') + '（' + (u.reason || '') + '）';
      box.appendChild(el('div', null, line));
    });
    unresolvedMount.appendChild(box);
  }

  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var r = document.documentElement;
    var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
    themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
    try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
  });
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
