        { "screenId": "screen-order-list", "screenName": "注文一覧", "key": "csv出力操作", "category": "操作シナリオ", "content": "経理担当者によるCSV出力操作を確認する", "precondition": "経理権限でログイン済み", "steps": "検索条件を確定する→CSV出力ボタンを押す", "expected": "CSVファイルのダウンロードリンクが提示される", "priority": "高" },
        { "screenId": "screen-order-list", "screenName": "注文一覧", "key": "注文詳細への遷移と復帰", "category": "操作シナリオ", "content": "詳細画面への遷移と一覧への復帰を確認する", "precondition": "注文一覧に1件以上表示中", "steps": "一覧行をクリックする→注文詳細を確認する→一覧へ戻る", "expected": "直前の検索条件を維持した一覧が再表示される", "priority": "中" },
        { "screenId": "screen-order-list", "screenName": "注文一覧", "key": "不正な期間指定時のエラー表示", "category": "操作シナリオ", "content": "期間指定が不正な場合のエラー表示を確認する", "precondition": "注文一覧画面表示中", "steps": "開始日を終了日より後に設定する→検索実行ボタンを押す", "expected": "範囲エラーメッセージが表示される", "priority": "中" },

        { "screenId": "screen-sales-dashboard", "screenName": "売上ダッシュボード", "key": "月次集計の確認", "category": "操作シナリオ", "content": "月次集計単位での売上確認操作を確認する", "precondition": "売上ダッシュボード画面表示中", "steps": "開始日・終了日・集計単位「月次」を指定する→期間適用ボタンを押す", "expected": "指定期間の月次売上推移とカテゴリ別内訳が表示される", "priority": "高" },
        { "screenId": "screen-sales-dashboard", "screenName": "売上ダッシュボード", "key": "手動再集計の実行", "category": "操作シナリオ", "content": "直近データを反映する再集計操作を確認する", "precondition": "集計結果表示中", "steps": "再集計ボタンを押す", "expected": "直近の注文データを反映した最新の集計結果が表示される", "priority": "中" },
        { "screenId": "screen-sales-dashboard", "screenName": "売上ダッシュボード", "key": "カテゴリ別内訳からのドリルダウン", "category": "操作シナリオ", "content": "カテゴリ別内訳からの注文一覧への遷移を確認する", "precondition": "カテゴリ別内訳が表示済み", "steps": "カテゴリ別内訳テーブルの行をクリックする", "expected": "選択カテゴリと集計期間を引き継ぎ注文一覧画面へ遷移する", "priority": "中" },
        { "screenId": "screen-sales-dashboard", "screenName": "売上ダッシュボード", "key": "不正な期間指定時の挙動確認", "category": "操作シナリオ", "content": "不正な期間指定時のエラー表示挙動を確認する", "precondition": "売上ダッシュボード画面表示中", "steps": "開始日を終了日より後に設定する", "expected": "期間適用ボタンが無効化されエラーが表示される", "priority": "中" }
      ]
    }
  }
}
</script>

<script>
(function () {
  var DATA = JSON.parse(document.getElementById('test-case-manifest').textContent);
  var TAB_IDS = ['unit', 'integration', 'scenario'];
  var state = { tab: 'unit', query: '', priorities: new Set() };

  function escHtml(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  function priorityClass(p) {
    return p === '高' ? 'high' : (p === '中' ? 'medium' : 'low');
  }

  function screenOrder(items) {
    var order = [];
    items.forEach(function (it) {
      if (order.indexOf(it.screenName) === -1) order.push(it.screenName);
    });
    return order;
  }

  function priorityCounts(items) {
    var c = { '高': 0, '中': 0, '低': 0 };
    items.forEach(function (it) { c[it.priority] = (c[it.priority] || 0) + 1; });
    return c;
  }

  function buildPanelHtml(tabId) {
    var items = DATA.tabs[tabId].items;
    if (!items.length) return '<div class="empty-note">テスト項目がありません。</div>';
    var screens = screenOrder(items);
    var byScreen = {};
    items.forEach(function (it) {
      (byScreen[it.screenName] = byScreen[it.screenName] || []).push(it);
    });
    var html = '';
    screens.forEach(function (name) {
      var rows = byScreen[name];
      html += '<section class="module-group" data-screen-section>';
      html += '<h3>' + escHtml(name) + '<span class="screen-count">' + rows.length + '件</span></h3>';
      html += '<div class="table-wrap"><table class="case-table"><thead><tr>' +
        '<th data-col="key">キー</th><th data-col="category">分類</th><th>テスト内容</th>' +
        '<th>前提条件</th><th>操作手順</th><th>期待結果</th><th data-col="priority">優先度</th>' +
        '</tr></thead><tbody>';
      rows.forEach(function (it) {
        html += '<tr data-priority="' + escHtml(it.priority) + '" data-screen="' + escHtml(name) + '">' +
          '<td class="cell-main">' + escHtml(it.key) + '</td>' +
          '<td>' + escHtml(it.category) + '</td>' +
          '<td>' + escHtml(it.content) + '</td>' +
          '<td>' + escHtml(it.precondition) + '</td>' +
          '<td>' + escHtml(it.steps) + '</td>' +
          '<td>' + escHtml(it.expected) + '</td>' +
          '<td class="pri-cell"><span class="badge ' + priorityClass(it.priority) + '">' + escHtml(it.priority) + '</span></td>' +
          '</tr>';
      });
      html += '</tbody></table></div></section>';
    });
    return html;
  }

  TAB_IDS.forEach(function (tabId) {
    document.getElementById('panel-' + tabId).innerHTML = buildPanelHtml(tabId);
  });

  function updateSummary(tabId) {
    var items = DATA.tabs[tabId].items;
    var screens = screenOrder(items);
    var counts = priorityCounts(items);
    document.getElementById('tile-total').textContent = items.length;
    document.getElementById('tile-screens').textContent = screens.length;
    document.getElementById('tile-high').textContent = counts['高'] || 0;
    document.getElementById('tile-medium').textContent = counts['中'] || 0;
    document.getElementById('tile-low').textContent = counts['低'] || 0;
  }

  var hitCountEl = document.getElementById('hit-count');

  function applyFilter() {
    var panel = document.querySelector('.tab-panel.active');
    if (!panel) return;
    var rows = Array.prototype.slice.call(panel.querySelectorAll('tbody tr'));
    var q = state.query.trim().toLowerCase();
    var visibleCount = 0;
    rows.forEach(function (tr) {
      var priority = tr.getAttribute('data-priority') || '';
      var matchesQuery = !q || tr.getAttribute('data-screen').toLowerCase().indexOf(q) !== -1 ||
        tr.textContent.toLowerCase().indexOf(q) !== -1;
      var matchesPriority = state.priorities.size === 0 || state.priorities.has(priority);
      var visible = matchesQuery && matchesPriority;
      tr.style.display = visible ? '' : 'none';
      if (visible) visibleCount++;
    });
    Array.prototype.slice.call(panel.querySelectorAll('[data-screen-section]')).forEach(function (sec) {
      var anyVisible = Array.prototype.some.call(sec.querySelectorAll('tbody tr'), function (tr) {
        return tr.style.display !== 'none';
      });
      sec.style.display = anyVisible ? '' : 'none';
    });
    hitCountEl.textContent = visibleCount + ' / ' + rows.length + ' 件';
  }

  function switchTab(tabId) {
    state.tab = tabId;
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.setAttribute('aria-selected', String(btn.getAttribute('data-tab') === tabId));
    });
    document.querySelectorAll('.tab-panel').forEach(function (panel) {
      panel.classList.toggle('active', panel.getAttribute('data-tab-panel') === tabId);
    });
    updateSummary(tabId);
    applyFilter();
  }

  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () { switchTab(btn.getAttribute('data-tab')); });
  });

  var searchInput = document.getElementById('case-search');
  searchInput.addEventListener('input', function () {
    state.query = searchInput.value;
    applyFilter();
  });

  var chipBar = document.getElementById('priority-chips');
  var chipClearBtn = document.createElement('button');
  chipClearBtn.type = 'button';
  chipClearBtn.className = 'chip chip-clear';
  chipClearBtn.textContent = 'クリア';
  ['高', '中', '低'].forEach(function (p) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip';
    b.setAttribute('aria-pressed', 'false');
    b.textContent = p;
    b.addEventListener('click', function () {
      var pressed = b.getAttribute('aria-pressed') === 'true';
      if (pressed) { state.priorities.delete(p); } else { state.priorities.add(p); }
      b.setAttribute('aria-pressed', String(!pressed));
      chipClearBtn.style.display = state.priorities.size > 0 ? '' : 'none';
      applyFilter();
    });
    chipBar.appendChild(b);
  });
  chipClearBtn.addEventListener('click', function () {
    state.priorities.clear();
    Array.prototype.slice.call(chipBar.querySelectorAll('.chip[aria-pressed]')).forEach(function (b) {
      b.setAttribute('aria-pressed', 'false');
    });
    chipClearBtn.style.display = 'none';
    applyFilter();
  });
  chipBar.appendChild(chipClearBtn);

  updateSummary('unit');
  applyFilter();

  var themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      var r = document.documentElement;
      var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', next);
      themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
      try { localStorage.setItem('rd-portal-theme', next); } catch (e) {}
    });
  }
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      if (themeBtn) themeBtn.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch (e) {}
})();
</script>

</body>
</html>
