<!DOCTYPE html>
<!--
  テストケース一覧.HTML

  全画面のテスト仕様書md（単体テスト仕様書・結合テスト仕様書・操作シナリオ仕様書）を
  横断集約し、単体テスト・結合テスト・操作シナリオの3タブで表示するページ。
  加えて、観点表md（単体テスト観点表・結合テスト観点表の「観点表」節のみ）から
  導出した観点網羅カバー率パネルを表示する。

  データソース:
    - shared/samples/画面/<screenId>/テスト項目書/*.md（test-case-manifest）
    - shared/samples/画面/<screenId>/詳細設計/*テスト観点表.md の「観点表」節のみ
      （手動観点表・往復検証観点表は対象外。viewpoint-manifest）
  トークンブロック・テーマ切替は shared/samples/一覧/テスト観点表/テスト観点表.html から
  CSS/テーマ・topbar・page-hero パターンを流用している。同ファイルの当該部分を変更した
  場合は本ファイルも同時更新すること。

  制約:
    - 外部リソース(CDN・フォント・画像)は一切使わない。単一ファイル自己完結
    - <script id="test-case-manifest"> の中身は各画面のテスト仕様書mdの内容と一致させる
    - <script id="viewpoint-manifest"> の中身は各画面の観点表mdの「観点表」節（単体・結合）の
      内容と一致させる。手動観点表・往復検証観点表の行は含めない
    - 操作シナリオ（scenario）の観点キーは往復検証観点表を参照するため、本カバー率の
      分母には含まれない。カバー率は単体・結合の観点網羅のみを示す指標である
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テストケース一覧</title>
<style>

    --gold-soft: #FFF1E5;

    --success: #1A7F37;
    --success-soft: #DAFBE1;
    --warn: #BC4C00;
    --danger: #CF222E;
    --danger-soft: #FFEBE9;
    --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;

      --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
      --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
      --success: #3FB950; --success-soft: #0D2818;
      --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
    }
  }
  [data-theme="dark"] {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
    --border: #30363D; --border-strong: #484F58;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
    --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
    --success: #3FB950; --success-soft: #0D2818;

  html { height: 100vh; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 24px 0;
    font-family: var(--font-body);
    line-height: 1.7; color: var(--text); background: var(--bg);
    max-width: 1280px; margin-inline: auto;
    height: 100%; overflow: hidden; display: flex; flex-direction: column;
  }
  a { color: var(--accent); }

  .table-area { flex: 1; min-height: 0; overflow-y: auto; padding-bottom: 24px; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .topbar {
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 24px; padding: 12px 0;
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); text-decoration: none; }
  .brand:hover { text-decoration: none; }
  .brand-icon { display: inline-flex; align-items: center; }
  .brand-title { font-weight: 700; font-size: 16px; }
  .brand-sub { font-size: 11px; color: var(--text-muted); }
  .header-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .top-actions { display: flex; align-items: center; gap: 8px; }
  .top-actions button {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
  }
  .top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }

  .page-hero { padding: 16px 0 8px; flex-shrink: 0; }
  .back-link { font-size: 0.85rem; margin: 0 0 8px; }
  .back-link a { color: var(--text-sub); text-decoration: none; border-bottom: 1px dotted var(--text-muted); }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .page-hero h1 { font-size: 1.5rem; margin: 0; }

  .summary-tiles { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0 0; }
  .tile {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 16px; font-size: 0.8rem; color: var(--text-sub);
  }
  .tile strong { font-size: 1.15rem; color: var(--text); margin-right: 4px; }

  .coverage-panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; margin: 12px 0 0; flex-shrink: 0;
    display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
  }
  .coverage-stat { display: flex; align-items: baseline; gap: 6px; }
  .coverage-label { font-size: 0.78rem; color: var(--text-muted); }
  .coverage-value { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .uncovered-toggle {
    font-size: 0.82rem; color: var(--danger); cursor: pointer; user-select: none;
    background: var(--danger-soft); border-radius: var(--radius-sm); padding: 4px 10px;
  }
  .uncovered-toggle:hover { text-decoration: underline; }
  .uncovered-list {
    flex-basis: 100%; font-size: 0.82rem; color: var(--danger);
    background: var(--danger-soft); border-radius: var(--radius-sm); padding: 8px 12px;
  }
  .uncovered-list ul { margin: 0; padding-left: 18px; }
  .coverage-note { flex-basis: 100%; font-size: 0.74rem; color: var(--text-muted); }

  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin: 18px 0 0; flex-shrink: 0; }
  .tab-btn {
    background: none; border: none; padding: 9px 20px; font-size: 0.92rem; font-weight: 700;
    color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -2px; font-family: inherit;
  }
  .tab-btn:hover { color: var(--text-sub); }
  .tab-btn[aria-selected="true"] { color: var(--accent); border-bottom-color: var(--accent); }

  .toolbar-area { flex-shrink: 0; padding: 10px 0; }
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 220px; padding: 8px 12px; font-size: 0.92rem;
    border: 1px solid var(--border); border-radius: 6px; background: var(--panel); color: var(--text);
    font-family: inherit;
  }
  .toolbar input[type="search"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .hit-count { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }

  .screen-count { font-size: 0.76rem; font-weight: 400; color: var(--text-muted); }

  table.case-table { width: 100%; min-width: 860px; border-collapse: collapse; font-size: 0.85rem; }
  table.case-table th {
    text-align: left; font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
    background: var(--panel-2); padding: 7px 10px; border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border); white-space: nowrap;
    position: sticky; top: 0; z-index: 1;

  table.case-table td {
    padding: 8px 10px; border-top: 1px solid var(--border); vertical-align: top;

  @media (max-width: 760px) {
    body { padding: 0 12px; }
    .toolbar input[type="search"] { width: 100%; }

    { "screenId": "screen-home", "type": "integration", "key": "逸脱-通知並び順準拠確認", "viewpoint": "通知一覧の並び順が発生日時の新しい順という共通ルールに準拠している" },

    { "screenId": "screen-member-edit", "type": "unit", "key": "モード-退会済み閲覧", "viewpoint": "会員状態が退会のとき連絡先入力欄を読み取り専用にする" },
    { "screenId": "screen-member-edit", "type": "unit", "key": "削除活性-条件判定", "viewpoint": "会員状態が退会かつ出荷待ち注文が0件のとき true になる" },
    { "screenId": "screen-member-edit", "type": "unit", "key": "保存活性-必須充足判定", "viewpoint": "必須項目がすべて入力済みかつバリデーションエラーが0件のとき true になる" },
    { "screenId": "screen-member-edit", "type": "unit", "key": "入力検証-メール形式", "viewpoint": "形式不正の場合インラインエラーを即時表示する" },
    { "screenId": "screen-member-edit", "type": "unit", "key": "入力検証-必須項目空欄", "viewpoint": "氏名・メールアドレス・電話番号のいずれかが空欄の場合、保存時にエラーとなる" },
    { "screenId": "screen-member-edit", "type": "unit", "key": "遷移-保存後会員詳細", "viewpoint": "保存操作完了後、replace で更新後の会員情報を伴い会員詳細へ遷移する" },
    { "screenId": "screen-member-edit", "type": "unit", "key": "遷移-削除後会員一覧", "viewpoint": "削除操作完了後、push で会員一覧へ遷移する" },
    { "screenId": "screen-member-edit", "type": "integration", "key": "一覧-編集遷移引継", "viewpoint": "会員一覧の編集操作から選択した会員番号を引き継いで編集画面が表示される" },
    { "screenId": "screen-member-edit", "type": "integration", "key": "権限-責任者のみ削除表示", "viewpoint": "会員管理責任者にのみ削除ボタンが表示される" },
    { "screenId": "screen-member-edit", "type": "integration", "key": "退会確認-ダイアログ経由更新", "viewpoint": "会員状態を退会に変更する操作は確認ダイアログでの承認を経て確定する" },
    { "screenId": "screen-member-edit", "type": "integration", "key": "保存api-会員詳細反映", "viewpoint": "保存ボタン押下で会員情報更新APIが呼ばれ、成功時に会員詳細へ遷移する" },
    { "screenId": "screen-member-edit", "type": "integration", "key": "下書き-離脱後復元", "viewpoint": "入力中に離脱してもローカルストレージの下書きが再訪時に復元される" },
    { "screenId": "screen-member-edit", "type": "integration", "key": "逸脱-削除権限方針要確認", "viewpoint": "削除権限を会員管理責任者に限定する方針が運用部門の最終合意未取得のまま実装として残っている" },

    { "screenId": "screen-order-detail", "type": "unit", "key": "遷移可否-次ステータス算出", "viewpoint": "order.status を起点に遷移可能な次ステータス一覧を算出する" },
    { "screenId": "screen-order-detail", "type": "unit", "key": "編集可否-ステータス判定", "viewpoint": "order.status が下書きまたは確定のとき true になる" },
    { "screenId": "screen-order-detail", "type": "unit", "key": "入力検証-備考文字数上限", "viewpoint": "更新備考が200文字を超える場合、形式エラーとする" },
    { "screenId": "screen-order-detail", "type": "unit", "key": "入力検証-遷移不可選択", "viewpoint": "現在のステータスから遷移不可な区分を選択した場合エラーとする" },

    { "screenId": "screen-order-detail", "type": "unit", "key": "遷移-一覧へback", "viewpoint": "一覧へ戻るボタン押下時、back 方式で直前の検索条件を維持し遷移する" },
    { "screenId": "screen-order-detail", "type": "unit", "key": "競合検出-再取得トリガー", "viewpoint": "ステータス更新APIが409を返した場合、競合エラー表示後に最新状態を再取得する" },
    { "screenId": "screen-order-detail", "type": "integration", "key": "一覧-詳細引継", "viewpoint": "注文一覧の行クリックから受注番号を引き継いで詳細画面が表示される" },
    { "screenId": "screen-order-detail", "type": "integration", "key": "権限-出荷担当者更新可", "viewpoint": "出荷担当者・受注担当者ともにステータス更新実行ボタンが表示される" },
    { "screenId": "screen-order-detail", "type": "integration", "key": "確定操作-確認ダイアログ経由", "viewpoint": "ステータス更新は確認ダイアログでの承認を経てAPIが呼ばれる" },
    { "screenId": "screen-order-detail", "type": "integration", "key": "更新api-履歴反映", "viewpoint": "ステータス更新API成功時に statusHistory へ新しい履歴が追記され新しい順で表示される" },
    { "screenId": "screen-order-detail", "type": "integration", "key": "詳細-一覧反映", "viewpoint": "ステータス更新完了後、一覧へ戻る操作で更新結果が反映された一覧が再表示される" },
    { "screenId": "screen-order-detail", "type": "integration", "key": "件数上限-スクロール表示", "viewpoint": "商品明細が100件を超える場合、明細テーブル内でスクロール表示になる" },
    { "screenId": "screen-order-detail", "type": "integration", "key": "逸脱-キャンセル理由未確定", "viewpoint": "キャンセルへの更新時に備考入力を必須化すべきという要確認事項が実装に反映されていない" },

    { "screenId": "screen-order-list", "type": "unit", "key": "出力可否-権限判定", "viewpoint": "経理権限を持たない利用者にはCSV出力ボタンを非表示にする" },
    { "screenId": "screen-order-list", "type": "unit", "key": "検索条件-差分マージ", "viewpoint": "渡した項目のみ現在の検索条件へマージし、ページ番号を1に戻す" },
    { "screenId": "screen-order-list", "type": "unit", "key": "件数集計-合計算出", "viewpoint": "orders の件数を正しく集計する" },
    { "screenId": "screen-order-list", "type": "unit", "key": "入力検証-期間逆転", "viewpoint": "開始日が終了日より後の場合、範囲エラーとする" },
    { "screenId": "screen-order-list", "type": "unit", "key": "キャンセル判定-該当行検出", "viewpoint": "orders の中にキャンセル状態が含まれるか判定する" },
    { "screenId": "screen-order-list", "type": "unit", "key": "遷移-詳細画面push", "viewpoint": "一覧行クリックで受注番号を伴い push で注文詳細へ遷移する" },
    { "screenId": "screen-order-list", "type": "unit", "key": "url復元-検索条件書き戻し", "viewpoint": "status・dateFrom・dateTo の URL パラメータを検索条件ストアへ書き戻す" },
    { "screenId": "screen-order-list", "type": "integration", "key": "一覧-詳細遷移引継", "viewpoint": "一覧行クリックで受注番号を伴い push で注文詳細画面へ遷移する" },
    { "screenId": "screen-order-list", "type": "integration", "key": "権限-経理担当のみ出力可", "viewpoint": "経理担当者にのみCSV出力ボタンが表示される" },
    { "screenId": "screen-order-list", "type": "integration", "key": "検索api-一覧即時反映", "viewpoint": "検索実行時に注文検索APIが呼ばれ結果が一覧テーブルへ即時反映される" },
    { "screenId": "screen-order-list", "type": "integration", "key": "詳細-一覧復帰条件維持", "viewpoint": "注文詳細から一覧へ戻る操作で検索条件・スクロール位置を維持したまま復帰する" },
    { "screenId": "screen-order-list", "type": "integration", "key": "出力上限-案内メッセージ", "viewpoint": "検索結果が5,000件を超える場合、絞り込みを促す案内が表示される" },
    { "screenId": "screen-order-list", "type": "integration", "key": "逸脱-csv上限根拠未確定", "viewpoint": "CSV出力上限5,000件の業務要件妥当性が経理部門未確認のまま実装されている" },

    { "screenId": "screen-sales-dashboard", "type": "unit", "key": "客単価-算出ロジック", "viewpoint": "合計売上金額を注文件数で除算して算出する" },
    { "screenId": "screen-sales-dashboard", "type": "unit", "key": "期間妥当性-判定", "viewpoint": "開始日が終了日より前であるかを判定する" },
    { "screenId": "screen-sales-dashboard", "type": "unit", "key": "入力検証-期間逆転即時エラー", "viewpoint": "開始日が終了日より後の場合、即座にエラー表示し期間適用ボタンを無効化する" },
    { "screenId": "screen-sales-dashboard", "type": "unit", "key": "入力検証-期間上限366日", "viewpoint": "指定期間が366日を超える場合、期間適用ボタンを無効化する" },
    { "screenId": "screen-sales-dashboard", "type": "unit", "key": "url復元-期間集計単位書き戻し", "viewpoint": "from・to・granularity の URL パラメータを periodRange・granularity へ書き戻す" },
    { "screenId": "screen-sales-dashboard", "type": "unit", "key": "遷移-ドリルダウンpush", "viewpoint": "カテゴリ別内訳行クリックで集計期間・カテゴリを伴い push で注文一覧へ遷移する" },
    { "screenId": "screen-sales-dashboard", "type": "unit", "key": "再集計活性-連打抑止", "viewpoint": "再集計処理実行中は再集計ボタンを無効化する" },
    { "screenId": "screen-sales-dashboard", "type": "integration", "key": "期間適用-サマリ即時反映", "viewpoint": "期間適用ボタン押下で売上集計取得APIが呼ばれサマリ・グラフ・内訳が更新される" },
    { "screenId": "screen-sales-dashboard", "type": "integration", "key": "ドリルダウン-注文一覧引継", "viewpoint": "カテゴリ別内訳のドリルダウン操作で集計期間・カテゴリを引き継ぎ注文一覧へ遷移する" },
    { "screenId": "screen-sales-dashboard", "type": "integration", "key": "再集計-最新反映", "viewpoint": "再集計ボタン押下で直近の注文データを反映した最新の集計結果が表示される" },
    { "screenId": "screen-sales-dashboard", "type": "integration", "key": "集計単位切替-グラフ再描画", "viewpoint": "集計単位選択欄の変更で granularity が更新され推移グラフが再描画される" },
    { "screenId": "screen-sales-dashboard", "type": "integration", "key": "データ点上限-月次12件", "viewpoint": "集計単位が月次の場合、推移グラフのデータ点が最大12件に絞り込まれる" },
    { "screenId": "screen-sales-dashboard", "type": "integration", "key": "逸脱-データ点上限要確認", "viewpoint": "月次データ点上限12件が経営層の表示期間拡張要望を反映せず実装のまま残っている" }
  ]
}
</script>

<script>
(function () {
  var DATA = JSON.parse(document.getElementById('test-case-manifest').textContent);
  var VIEWPOINTS = JSON.parse(document.getElementById('viewpoint-manifest').textContent).viewpoints;
  var TAB_IDS = ['unit', 'integration', 'scenario'];
  var state = { tab: 'unit', query: '' };

  var allViewpointKeys = VIEWPOINTS.map(function (v) { return v.key; });
  var coveredKeys = new Set();
  TAB_IDS.forEach(function (tabId) {
    DATA.tabs[tabId].items.forEach(function (tc) {
      if (tc.viewpointKey && tc.viewpointKey !== '-' && allViewpointKeys.indexOf(tc.viewpointKey) !== -1) {
        coveredKeys.add(tc.viewpointKey);
      }
    });
  });
  var uncoveredViewpoints = VIEWPOINTS.filter(function (v) { return !coveredKeys.has(v.key); });
  var coverageRate = allViewpointKeys.length > 0 ? coveredKeys.size / allViewpointKeys.length : 0;

  var allScreenIds = new Set();
  VIEWPOINTS.forEach(function (v) { allScreenIds.add(v.screenId); });
  TAB_IDS.forEach(function (tabId) {
    DATA.tabs[tabId].items.forEach(function (tc) { allScreenIds.add(tc.screenId); });
  });
  var testedScreenIds = new Set();
  TAB_IDS.forEach(function (tabId) {
    DATA.tabs[tabId].items.forEach(function (tc) { testedScreenIds.add(tc.screenId); });
  });

  document.getElementById('vp-coverage').textContent =
    coveredKeys.size + ' / ' + allViewpointKeys.length + '（' + Math.round(coverageRate * 100) + '%）';
  document.getElementById('screen-coverage').textContent =
    testedScreenIds.size + ' / ' + allScreenIds.size + ' 画面';
  document.getElementById('uncovered-count').textContent = uncoveredViewpoints.length;

  var uncoveredListEl = document.getElementById('uncovered-list');
  uncoveredListEl.innerHTML = uncoveredViewpoints.length
    ? '<ul>' + uncoveredViewpoints.map(function (v) {
        return '<li>[' + escHtml(v.screenId) + '] ' + escHtml(v.key) + '（' + escHtml(v.type) + '）: ' + escHtml(v.viewpoint) + '</li>';
      }).join('') + '</ul>'
    : '<div class="empty-note">未カバーの観点はありません。</div>';

  document.getElementById('uncovered-toggle').addEventListener('click', function () {
    var visible = uncoveredListEl.style.display !== 'none';
    uncoveredListEl.style.display = visible ? 'none' : 'block';
  });

  function escHtml(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  function screenOrder(items) {
    var order = [];
    items.forEach(function (it) {
      if (order.indexOf(it.screenName) === -1) order.push(it.screenName);
    });
    return order;
  }

  var TAB_COLUMNS = {
    unit: [
      { field: 'key', label: 'キー', cls: 'cell-main' },
      { field: 'viewpointKey', label: '対応観点キー', cls: 'cell-viewpoint-key' },
      { field: 'input', label: '入力値' },
      { field: 'expected', label: '期待結果（アサーション）' }
    ],
    integration: [
      { field: 'key', label: 'キー', cls: 'cell-main' },
      { field: 'viewpointKey', label: '対応観点キー', cls: 'cell-viewpoint-key' },
      { field: 'steps', label: '操作手順' },
      { field: 'input', label: '入力値' },
      { field: 'expected', label: '期待結果（アサーション）' }
    ],
    scenario: [
      { field: 'key', label: 'シナリオ名', cls: 'cell-main' },
      { field: 'viewpointKey', label: '対応往復検証観点キー', cls: 'cell-viewpoint-key' },
      { field: 'precondition', label: '前提条件' },
      { field: 'expected', label: '期待結果' }
    ]
  };

  function buildPanelHtml(tabId) {
    var items = DATA.tabs[tabId].items;
    if (!items.length) return '<div class="empty-note">テスト項目がありません。</div>';
    var columns = TAB_COLUMNS[tabId];
    var screens = screenOrder(items);
    var byScreen = {};
    items.forEach(function (it) {
      (byScreen[it.screenName] = byScreen[it.screenName] || []).push(it);
    });
    var html = '';
    screens.forEach(function (name) {
      var rows = byScreen[name];
      html += '<section class="module-group" data-screen-section>';
      html += '<h3>' + escHtml(name) + '<span class="screen-count">' + rows.length + '件</span></h3>';
      html += '<div class="table-wrap"><table class="case-table"><thead><tr>' +
        columns.map(function (col) { return '<th>' + escHtml(col.label) + '</th>'; }).join('') +
        '</tr></thead><tbody>';
      rows.forEach(function (it) {
        html += '<tr data-screen="' + escHtml(name) + '">' +
          columns.map(function (col) {
            var value = it[col.field] || '';
            var cls = col.cls || '';
            if (col.field === 'viewpointKey' && value && !coveredKeys.has(value) && allViewpointKeys.indexOf(value) !== -1) {
              cls += ' uncovered-ref';
            }
            return '<td' + (cls ? ' class="' + cls + '"' : '') + '>' + escHtml(value) + '</td>';
          }).join('') +
          '</tr>';
      });
      html += '</tbody></table></div></section>';
    });
    return html;
  }

  TAB_IDS.forEach(function (tabId) {
    document.getElementById('panel-' + tabId).innerHTML = buildPanelHtml(tabId);
  });

  function updateSummary(tabId) {
    var items = DATA.tabs[tabId].items;
    var screens = screenOrder(items);
    document.getElementById('tile-total').textContent = items.length;
    document.getElementById('tile-screens').textContent = screens.length;
  }

  var hitCountEl = document.getElementById('hit-count');

  function applyFilter() {
    var panel = document.querySelector('.tab-panel.active');
    if (!panel) return;
    var rows = Array.prototype.slice.call(panel.querySelectorAll('tbody tr'));
    var q = state.query.trim().toLowerCase();
    var visibleCount = 0;
    rows.forEach(function (tr) {
      var visible = !q || tr.getAttribute('data-screen').toLowerCase().indexOf(q) !== -1 ||
        tr.textContent.toLowerCase().indexOf(q) !== -1;
      tr.style.display = visible ? '' : 'none';
      if (visible) visibleCount++;
    });
    Array.prototype.slice.call(panel.querySelectorAll('[data-screen-section]')).forEach(function (sec) {
      var anyVisible = Array.prototype.some.call(sec.querySelectorAll('tbody tr'), function (tr) {
        return tr.style.display !== 'none';
      });
      sec.style.display = anyVisible ? '' : 'none';
    });
    hitCountEl.textContent = visibleCount + ' / ' + rows.length + ' 件';
  }

  function switchTab(tabId) {
    state.tab = tabId;
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.setAttribute('aria-selected', String(btn.getAttribute('data-tab') === tabId));
    });
    document.querySelectorAll('.tab-panel').forEach(function (panel) {
      panel.classList.toggle('active', panel.getAttribute('data-tab-panel') === tabId);
    });
    updateSummary(tabId);
    applyFilter();
  }

  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () { switchTab(btn.getAttribute('data-tab')); });
  });

  var searchInput = document.getElementById('case-search');
  searchInput.addEventListener('input', function () {
    state.query = searchInput.value;
    applyFilter();
  });

  updateSummary('unit');
  applyFilter();

  var themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      var r = document.documentElement;
      var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', next);
      themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
      try { localStorage.setItem('rd-portal-theme', next); } catch (e) {}
    });
  }
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      if (themeBtn) themeBtn.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch (e) {}
})();
</script>

</body>
</html>
