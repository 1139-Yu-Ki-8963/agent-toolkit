<!--
  detail-pages T4 図解型テンプレート — リバース設計スキル群(画面遷移図/ER図で共用)
  生成: shared/scripts/detail-pages/build-detail-page.sh
  プレースホルダ置換は build-detail-page.sh の render_template() が行う。
  手作業によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。

  埋め込みJSON(script#page-data)のnodes[]/edges[](画面遷移)またはentities[]/relations[]
  (ER)から、ページ読込時にJavaScriptがDOMを構築する。図(表示)とJSONは常に単一情報源。
    - pageKind=transition: ワイヤーフレーム+遷移先テーブルのsplit-view形式。画面選択UI
      (ドロップダウン+前後ボタン)で画面ごとのビューを切り替える。エッジは共通ナビ判定
      (出現率30%以上)により画面固有/共通ナビ/自己ループの3層に分類する。出次数がしきい値
      (MAX_EDGES_PER_VIEW)超のノードは中央ナビゲーション画面として別セクションに、
      入出次数0のノードは未接続画面一覧として別セクションに折りたたみ表示する。
    - pageKind=er        : グリッド配置のSVG描画(変更なし)

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/portal-template.html からの複製である。
  同テンプレートの当該部分を変更した場合は本ファイルも同時更新すること
  （T1一覧テンプレート群・T3テンプレートにも同種の複製あり。include化は別件）。

  プレースホルダ(build-detail-page.shが注入。実際のマーカー記法は
  scripts/detail-pages/build-detail-page.sh 冒頭コメントを正本とする。本コメントでは
  二重置換事故を避けるため意図的に波括弧を外して記載する):
    TITLE (ページ見出しマーカー)         : page-data.json の title
    DESCRIPTION (ページ概要マーカー)     : page-data.json の description
    GENERATED_AT (生成日時マーカー)      : page-data.json の generatedAt
    PAGE_DATA_JSON (page-data埋め込みマーカー) : page-data.json の内容全体(本ファイル物理末尾のscriptタグへ注入)
-->

<script>
(function() {
  var data = JSON.parse(document.getElementById('page-data').textContent);
  var kind = data.pageKind === 'er' ? 'er' : 'transition';

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      if (k === 'html') node.innerHTML = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  var SVGNS = 'http://www.w3.org/2000/svg';
  function svgEl(tag, attrs) {
    var node = document.createElementNS(SVGNS, tag);
    if (attrs) Object.keys(attrs).forEach(function(k) { node.setAttribute(k, attrs[k]); });
    return node;
  }

  // --- 凡例(legend[]) ---
  var legendMount = document.getElementById('legend-mount');
  var legend = data.legend || [];
  if (legend.length === 0) {
    legendMount.appendChild(el('div', { class: 'diagram-empty' }, '凡例なし'));
  } else {
    legend.forEach(function(l) {
      legendMount.appendChild(el('div', { class: 'legend-item' }, [
        el('span', { class: 'legend-symbol' }, l.symbol || ''),
        el('span', null, l.meaning || '')
      ]));
    });
  }

  // --- ノード/エッジの取り出し(pageKindで分岐) ---
  var keyField = kind === 'transition' ? 'unitKey' : 'key';
  var nodesRaw = kind === 'transition' ? (data.nodes || []) : (data.entities || []);
  var edgesRaw = kind === 'transition' ? (data.edges || []) : (data.relations || []);
  var keys = nodesRaw.map(function(n) { return n[keyField]; });

  if (kind === 'er') {
  // --- ER: 既存のSVGグリッド配置 + 補足表描画(変更なし) ---
  var svg = document.getElementById('diagram-svg');
  var diagramWrap = svg.parentNode;

  if (keys.length === 0) {
    diagramWrap.replaceChild(el('div', { class: 'diagram-empty' }, '図示できるノードがありません'), svg);
  } else {
    // --- 箱サイズ(ラベル長から決定的に算出) ---
    var BOX_H = 44, MIN_W = 120, MAX_W = 220;
    var boxW = {};
    nodesRaw.forEach(function(n) {
      var label = n.label || n[keyField] || '';
      boxW[n[keyField]] = Math.max(MIN_W, Math.min(MAX_W, label.length * 9 + 28));
    });

    var COL_GAP = 260, ROW_GAP = 90, MARGIN = 40;
    var pos = {};

    if (kind === 'transition') {
      // 層状配置: 入次数0のノードを起点(level=0)とし、辺をたどってlevelを更新する
      var indeg = {}; keys.forEach(function(k) { indeg[k] = 0; });
      var adj = {}; keys.forEach(function(k) { adj[k] = []; });
      edgesRaw.forEach(function(e) {
        if (adj[e.from] !== undefined && indeg[e.to] !== undefined) {
          adj[e.from].push(e.to);
          indeg[e.to]++;
        }
      });
      var level = {};
      var queue = keys.filter(function(k) { return indeg[k] === 0; });
      var visited = {};
      queue.forEach(function(k) { level[k] = 0; visited[k] = true; });
      var qi = 0;
      while (qi < queue.length) {
        var cur = queue[qi++];
        (adj[cur] || []).forEach(function(n) {
          var newLevel = level[cur] + 1;
          if (level[n] === undefined || newLevel > level[n]) level[n] = newLevel;
          if (!visited[n]) { visited[n] = true; queue.push(n); }
        });
      }
      // 入次数0起点から到達できない孤立ノード(孤立サイクル等)はlevel 0扱いとする
      keys.forEach(function(k) { if (level[k] === undefined) level[k] = 0; });

      var byLevel = {};
      keys.forEach(function(k) {
        var lv = level[k];
        byLevel[lv] = byLevel[lv] || [];
        byLevel[lv].push(k);
      });
      Object.keys(byLevel).forEach(function(lv) {
        byLevel[lv].forEach(function(k, idx) {
          pos[k] = {
            cx: MARGIN + Number(lv) * COL_GAP + boxW[k] / 2,
            cy: MARGIN + idx * ROW_GAP + BOX_H / 2
          };
        });
      });
    } else {
      // グリッド配置
      var cols = Math.max(1, Math.ceil(Math.sqrt(keys.length)));
      keys.forEach(function(k, idx) {
        var col = idx % cols, row = Math.floor(idx / cols);
        pos[k] = {
          cx: MARGIN + col * COL_GAP + boxW[k] / 2,
          cy: MARGIN + row * ROW_GAP + BOX_H / 2
        };
      });
    }

    var maxX = 0, maxY = 0;
    keys.forEach(function(k) {
      var p = pos[k];
      maxX = Math.max(maxX, p.cx + boxW[k] / 2);
      maxY = Math.max(maxY, p.cy + BOX_H / 2);
    });
    var svgW = Math.max(600, maxX + MARGIN);
    var svgH = Math.max(220, maxY + MARGIN);
    svg.setAttribute('width', svgW);
    svg.setAttribute('height', svgH);
    svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

    // --- 矢印マーカー(遷移のみ) ---
    if (kind === 'transition') {
      var defs = svgEl('defs');
      var marker = svgEl('marker', {
        id: 'diagram-arrowhead', viewBox: '0 0 10 10', refX: '9', refY: '5',
        markerWidth: '7', markerHeight: '7', orient: 'auto-start-reverse'
      });
      marker.appendChild(svgEl('path', { d: 'M 0 0 L 10 5 L 0 10 z', class: 'diagram-arrow' }));
      defs.appendChild(marker);
      svg.appendChild(defs);
    }

    // 中心cx/cy・半幅hw/半高hhの矩形の境界上で、方向(dx,dy)にある点を返す
    function rectBorderPoint(cx, cy, hw, hh, dx, dy) {
      if (dx === 0 && dy === 0) return { x: cx, y: cy };
      var scaleX = dx !== 0 ? hw / Math.abs(dx) : Infinity;
      var scaleY = dy !== 0 ? hh / Math.abs(dy) : Infinity;
      var scale = Math.min(scaleX, scaleY);
      return { x: cx + dx * scale, y: cy + dy * scale };
    }

    // --- エッジ/リレーション描画(from/toの矩形境界を結ぶ線 + ラベル) ---
    var edgeGroup = svgEl('g', { class: 'diagram-edges' });
    edgesRaw.forEach(function(e) {
      var a = pos[e.from], b = pos[e.to];
      if (!a || !b) { return; } // 未解決参照(ノード不在)は描画をスキップする
      var dx = b.cx - a.cx, dy = b.cy - a.cy;
      var start = rectBorderPoint(a.cx, a.cy, boxW[e.from] / 2, BOX_H / 2, dx, dy);
      var end = rectBorderPoint(b.cx, b.cy, boxW[e.to] / 2, BOX_H / 2, -dx, -dy);
      var line = svgEl('line', { x1: start.x, y1: start.y, x2: end.x, y2: end.y, class: 'diagram-edge' });
      if (kind === 'transition') line.setAttribute('marker-end', 'url(#diagram-arrowhead)');
      edgeGroup.appendChild(line);

      var labelText = kind === 'transition' ? (e.trigger || '') : (e.cardinality || '');
      if (labelText) {
        var mx = (start.x + end.x) / 2, my = (start.y + end.y) / 2;
        var labelG = svgEl('g', { class: 'diagram-edge-label', transform: 'translate(' + mx + ',' + my + ')' });
        var textNode = svgEl('text', { 'text-anchor': 'middle', dy: '-4' });
        textNode.textContent = labelText;
        labelG.appendChild(textNode);
        edgeGroup.appendChild(labelG);
      }
    });
    svg.appendChild(edgeGroup);

    // --- ノード/エンティティ描画(角丸矩形 + ラベル) ---
    var nodeGroup = svgEl('g', { class: 'diagram-nodes' });
    nodesRaw.forEach(function(n) {
      var k = n[keyField];
      var p = pos[k];
      var w = boxW[k];
      var g = svgEl('g', {
        class: 'diagram-node',
        transform: 'translate(' + (p.cx - w / 2) + ',' + (p.cy - BOX_H / 2) + ')'
      });
      g.appendChild(svgEl('rect', { width: w, height: BOX_H, rx: 8, ry: 8, class: 'diagram-node-rect' }));
      var text = svgEl('text', {
        x: w / 2, y: BOX_H / 2, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
        class: 'diagram-node-text'
      });
      text.textContent = n.label || k || '';
      g.appendChild(text);
      nodeGroup.appendChild(g);
    });
    svg.appendChild(nodeGroup);
  }

  // --- 補足表(edges[]/relations[]の詳細) ---
  var theadRow;
  if (kind === 'transition') {
    theadRow = el('tr', null, [
      el('th', null, '起点'), el('th', null, '終点'), el('th', null, 'トリガー'),
      el('th', null, '出所'), el('th', null, 'confidence')
    ]);
  } else {
    theadRow = el('tr', null, [
      el('th', null, 'from'), el('th', null, 'to'),
      el('th', null, 'カーディナリティ'), el('th', null, '出所')
    ]);
  }
  document.getElementById('detail-table-head').appendChild(theadRow);

  var tbody = document.getElementById('detail-table-body');
  if (edgesRaw.length === 0) {
    tbody.appendChild(el('tr', null, el('td', { colspan: kind === 'transition' ? '5' : '4' }, 'なし')));
  } else {
    edgesRaw.forEach(function(e) {
      var tr;
      if (kind === 'transition') {
        tr = el('tr', null, [
          el('td', null, e.from || ''),
          el('td', null, e.to || ''),
          el('td', null, e.trigger || ''),
          el('td', null, el('code', null, e.sourceRef || '')),
          el('td', null, e.confidence || '')
        ]);
      } else {
        tr = el('tr', null, [
          el('td', null, e.from || ''),
          el('td', null, e.to || ''),
          el('td', null, e.cardinality || ''),
          el('td', null, el('code', null, e.sourceRef || ''))
        ]);
      }
      tbody.appendChild(tr);
    });
  }

  } else {
  // --- transition: split-view(ワイヤーフレーム+遷移先テーブル) ---
  document.getElementById('er-sections').classList.add('hidden');
  var mount = document.getElementById('transition-mount');
  mount.classList.remove('hidden');

  var MAX_EDGES_PER_VIEW = 10;
  var COMMON_NAV_RATE = 0.3;
  var TRIGGER_KIND_LABEL = 'リンク遷移';

  var nodeByKey = {};
  nodesRaw.forEach(function(n) { nodeByKey[n[keyField]] = n; });

  // 未解決参照(ノード不在)は集計・描画から除外する(ERパスと同じフェイルセーフ)
  var edgesResolved = edgesRaw.filter(function(e) {
    return nodeByKey[e.from] !== undefined && nodeByKey[e.to] !== undefined;
  });

  function groupName(key) {
    var idx = (key || '').indexOf('/');
    return idx >= 0 ? key.substring(0, idx) : (key || '');
  }
  function nodeLabel(key) {
    var n = nodeByKey[key];
    return (n && n.label) || key || '';
  }

  // --- 共通ナビゲーション判定(出現率 >= 30%) ---
  var fromSet = {};
  edgesResolved.forEach(function(e) { fromSet[e.from] = true; });
  var totalFromScreens = Object.keys(fromSet).length;
  var toFromSet = {};
  edgesResolved.forEach(function(e) {
    toFromSet[e.to] = toFromSet[e.to] || {};
    toFromSet[e.to][e.from] = true;
  });
  var commonNavSet = {};
  keys.forEach(function(k) {
    var distinctFrom = toFromSet[k] ? Object.keys(toFromSet[k]).length : 0;
    var rate = distinctFrom / Math.max(1, totalFromScreens);
    if (rate >= COMMON_NAV_RATE) commonNavSet[k] = true;
  });

  function classify(e) {
    if (e.from === e.to) return 'self';
    if (commonNavSet[e.to]) return 'common';
    return 'specific';
  }
  var CLASS_ORDER = { common: 0, specific: 1, self: 2 };
  var CLASS_TAG_LABEL = { common: '共通', specific: '固有', self: '自己ループ' };
  var CLASS_TAG_CLASS = { common: 'tag-nav', specific: 'tag-specific', self: 'tag-self' };
  var CLASS_ROW_BADGE = { common: 'common', specific: 'specific', self: 'self' };

  // --- ノード分類(中央ナビゲーション画面/未接続画面/通常画面) ---
  var outEdges = {}, outDegree = {}, inDegree = {};
  keys.forEach(function(k) { outEdges[k] = []; outDegree[k] = 0; inDegree[k] = 0; });
  edgesResolved.forEach(function(e) {
    outEdges[e.from].push(e);
    outDegree[e.from]++;
    inDegree[e.to]++;
  });

  var hubNodes = [], isolatedNodes = [], normalNodes = [];
  keys.forEach(function(k) {
    if (outDegree[k] > MAX_EDGES_PER_VIEW) hubNodes.push(k);
    else if (outDegree[k] + inDegree[k] === 0) isolatedNodes.push(k);
    else normalNodes.push(k);
  });

  // --- 画面ごとのソート済みエッジ(共通->固有->自己ループ)+通し番号 ---
  var sortedOutEdges = {};
  keys.forEach(function(k) {
    var list = outEdges[k].slice().sort(function(a, b) {
      return CLASS_ORDER[classify(a)] - CLASS_ORDER[classify(b)];
    });
    list.forEach(function(e, idx) { e.__badge = idx + 1; e.__cls = classify(e); });
    sortedOutEdges[k] = list;
  });

  // --- split-view(1画面分)構築 ---
  function buildSplitView(key) {
    var node = nodeByKey[key];
    var edges = sortedOutEdges[key] || [];
    var commonEdges = edges.filter(function(e) { return e.__cls === 'common'; });
    var specificEdges = edges.filter(function(e) { return e.__cls === 'specific'; });
    var selfEdges = edges.filter(function(e) { return e.__cls === 'self'; });

    var wfBody = el('div', { class: 'wf-body' });
    if (edges.length === 0) {
      wfBody.appendChild(el('div', { class: 'diagram-empty' }, '遷移先なし'));
    } else {
      if (commonEdges.length > 0) {
        wfBody.appendChild(el('div', { class: 'wf-section-label' }, 'ヘッダー共通リンク'));
        var wfNav = el('div', { class: 'wf-nav' });
        commonEdges.forEach(function(e) {
          wfNav.appendChild(el('div', { class: 'wf-nav-item' }, [
            (e.trigger || nodeLabel(e.to)),
            el('span', { class: 'badge' }, String(e.__badge))
          ]));
        });
        wfBody.appendChild(wfNav);
      }
      if (specificEdges.length > 0) {
        var wfProfile = el('div', { class: 'wf-profile' });
        wfProfile.appendChild(el('div', { class: 'wf-section-label' }, '固有リンク'));
        specificEdges.forEach(function(e) {
          wfProfile.appendChild(el('div', { class: 'wf-link' }, [
            (e.trigger || nodeLabel(e.to)),
            el('span', { class: 'badge' }, String(e.__badge))
          ]));
        });
        wfProfile.appendChild(el('div', { class: 'wf-placeholder' }));
        wfBody.appendChild(wfProfile);
      }
      if (selfEdges.length > 0) {
        var wfLinkRow = el('div', { class: 'wf-link-row' });
        selfEdges.forEach(function(e) {
          wfLinkRow.appendChild(el('div', { class: 'wf-self-link' }, [
            (e.trigger || nodeLabel(e.to)),
            el('span', { class: 'badge' }, String(e.__badge))
          ]));
        });
        wfBody.appendChild(wfLinkRow);
      }
    }

    var wireframePanel = el('div', { class: 'wireframe-panel' }, [
      el('div', { class: 'wf-titlebar' }, [
        el('span', null, node.label || key),
        el('span', { class: 'wf-page-id' }, key)
      ]),
      wfBody
    ]);

    var tbody2 = el('tbody');
    if (edges.length === 0) {
      tbody2.appendChild(el('tr', null, el('td', { colspan: '6' }, 'なし')));
    } else {
      edges.forEach(function(e) {
        tbody2.appendChild(el('tr', null, [
          el('td', null, el('span', { class: 'row-badge ' + CLASS_ROW_BADGE[e.__cls] }, String(e.__badge))),
          el('td', null, e.trigger || nodeLabel(e.to)),
          el('td', null, [nodeLabel(e.to), el('br'), el('code', { class: 'src' }, e.to || '')]),
          el('td', null, el('span', { class: 'tag ' + CLASS_TAG_CLASS[e.__cls] }, CLASS_TAG_LABEL[e.__cls])),
          el('td', null, TRIGGER_KIND_LABEL),
          el('td', null, el('code', { class: 'src' }, e.sourceRef || ''))
        ]));
      });
    }

    var tablePanel = el('div', { class: 'table-panel' }, [
      el('div', { class: 'table-panel-header' }, ['遷移先一覧', el('span', { class: 'count' }, edges.length + '件')]),
      el('div', { class: 'legend-row' }, [
        el('div', { class: 'legend-item' }, [el('div', { class: 'legend-swatch page-specific' }), '画面固有（' + specificEdges.length + '件）']),
        el('div', { class: 'legend-item' }, [el('div', { class: 'legend-swatch common-nav' }), '共通ナビ（' + commonEdges.length + '件）']),
        el('div', { class: 'legend-item' }, [el('div', { class: 'legend-swatch self-loop' }), '自己ループ（' + selfEdges.length + '件）'])
      ]),
      el('table', { class: 'trans-table' }, [
        el('thead', null, el('tr', null, [
          el('th'), el('th', null, 'UIの要素'), el('th', null, '遷移先'),
          el('th', null, '種別'), el('th', null, 'トリガー'), el('th', null, '出所')
        ])),
        tbody2
      ])
    ]);

    return el('div', { class: 'split-view' }, [wireframePanel, tablePanel]);
  }

  // --- ドロップダウン(画面選択UI)構築(グループ = unitKeyの最初のスラッシュまで) ---
  var groupOf = {};
  normalNodes.forEach(function(k) { groupOf[k] = groupName(k); });
  var groupMap = {};
  normalNodes.forEach(function(k) {
    var g = groupOf[k];
    groupMap[g] = groupMap[g] || [];
    groupMap[g].push(k);
  });
  var groupNames = Object.keys(groupMap).sort();

  var select = el('select', { id: 'view-select' });
  select.appendChild(el('option', { value: '__overview__' }, '概要: グループ間の遷移数'));
  groupNames.forEach(function(g) {
    var optgroup = el('optgroup', { label: g + '（' + groupMap[g].length + '図）' });
    groupMap[g].forEach(function(k) {
      optgroup.appendChild(el('option', { value: k }, nodeLabel(k) + ' からの遷移 [' + outDegree[k] + '件]'));
    });
    select.appendChild(optgroup);
  });

  var prevBtn = el('button', { class: 'nav-btn', id: 'view-prev', type: 'button' }, '← 前');
  var nextBtn = el('button', { class: 'nav-btn', id: 'view-next', type: 'button' }, '次 →');
  var viewNav = el('div', { class: 'view-nav' }, [select, prevBtn, nextBtn]);
  var viewContent = el('div', { id: 'view-content' });

  function buildOverviewView() {
    var wrap = el('div');
    if (edgesResolved.length === 0) {
      wrap.appendChild(el('div', { class: 'diagram-empty' }, '遷移がありません'));
      return wrap;
    }
    var allGroups = {};
    keys.forEach(function(k) { allGroups[groupName(k)] = true; });
    var gList = Object.keys(allGroups).sort();
    var matrix = {};
    gList.forEach(function(g1) { matrix[g1] = {}; gList.forEach(function(g2) { matrix[g1][g2] = 0; }); });
    edgesResolved.forEach(function(e) {
      var g1 = groupName(e.from), g2 = groupName(e.to);
      matrix[g1][g2]++;
    });
    var theadRow2 = el('tr', null, [el('th', null, '元＼先')].concat(gList.map(function(g) { return el('th', null, g); })));
    var tbody3 = el('tbody');
    gList.forEach(function(g1) {
      tbody3.appendChild(el('tr', null, [el('td', null, g1)].concat(gList.map(function(g2) {
        return el('td', null, String(matrix[g1][g2]));
      }))));
    });
    wrap.appendChild(el('table', { class: 'data-table overview-table' }, [el('thead', null, theadRow2), tbody3]));
    return wrap;
  }

  function renderView(key) {
    viewContent.innerHTML = '';
    if (!key || key === '__overview__' || !nodeByKey[key]) {
      viewContent.appendChild(buildOverviewView());
    } else {
      viewContent.appendChild(buildSplitView(key));
    }
  }

  select.addEventListener('change', function() { renderView(select.value); });
  prevBtn.addEventListener('click', function() {
    if (select.selectedIndex > 0) {
      select.selectedIndex -= 1;
      renderView(select.value);
    }
  });
  nextBtn.addEventListener('click', function() {
    if (select.selectedIndex < select.options.length - 1) {
      select.selectedIndex += 1;
      renderView(select.value);
    }
  });

  mount.appendChild(el('div', { class: 'sec-label' }, '画面遷移'));
  mount.appendChild(viewNav);
  mount.appendChild(viewContent);
  renderView('__overview__');

  // --- 中央ナビゲーション画面セクション ---
  mount.appendChild(el('div', { class: 'sec-label' }, '中央ナビゲーション画面（' + hubNodes.length + '件）'));
  if (hubNodes.length === 0) {
    mount.appendChild(el('div', { class: 'note-box' }, 'なし'));
  } else {
    hubNodes.forEach(function(k) {
      var edges = sortedOutEdges[k] || [];
      var tbody4 = el('tbody');
      if (edges.length === 0) {
        tbody4.appendChild(el('tr', null, el('td', { colspan: '3' }, 'なし')));
      } else {
        edges.forEach(function(e) {
          tbody4.appendChild(el('tr', null, [
            el('td', null, el('code', null, e.to || '')),
            el('td', null, nodeLabel(e.to)),
            el('td', null, e.trigger || '')
          ]));
        });
      }
      mount.appendChild(el('details', { class: 'iso-group' }, [
        el('summary', null, nodeLabel(k) + '（' + edges.length + '件の遷移先）'),
        el('table', { class: 'data-table' }, [
          el('thead', null, el('tr', null, [el('th', null, '遷移先'), el('th', null, 'ラベル'), el('th', null, 'トリガー')])),
          tbody4
        ])
      ]));
    });
  }

  // --- 未接続画面一覧セクション ---
  mount.appendChild(el('div', { class: 'sec-label' }, '未接続画面一覧（' + isolatedNodes.length + '件）'));
  mount.appendChild(el('div', { class: 'note-box' }, '遷移が静的に検出されなかった画面の一覧'));
  if (isolatedNodes.length === 0) {
    mount.appendChild(el('div', { class: 'diagram-empty' }, 'なし'));
  } else {
    var isoGroupMap = {};
    isolatedNodes.forEach(function(k) {
      var g = groupName(k);
      isoGroupMap[g] = isoGroupMap[g] || [];
      isoGroupMap[g].push(k);
    });
    Object.keys(isoGroupMap).sort().forEach(function(g) {
      var list = isoGroupMap[g];
      var tbody5 = el('tbody');
      list.forEach(function(k) {
        tbody5.appendChild(el('tr', null, [el('td', null, el('code', null, k)), el('td', null, nodeLabel(k))]));
      });
      mount.appendChild(el('details', { class: 'iso-group' }, [
        el('summary', null, g + '（' + list.length + '件）'),
        el('table', { class: 'data-table' }, [
          el('thead', null, el('tr', null, [el('th', null, 'unitKey'), el('th', null, 'ラベル')])),
          tbody5
        ])
      ]));
    });
  }
  }

  // --- 未解決節(unresolved[]) ---
  var unresolvedMount = document.getElementById('unresolved-mount');
  var unresolved = data.unresolved || [];
  if (unresolved.length > 0) {
    unresolvedMount.appendChild(el('div', { class: 'sec-label' }, '未解決'));
    var box = el('div', { class: 'note-box' });
    unresolved.forEach(function(u) {
      var line = (u.label || '') + '（' + (u.reason || '') + '）';
      box.appendChild(el('div', null, line));
    });
    unresolvedMount.appendChild(box);
  }

  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var r = document.documentElement;
    var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
    themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
    try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
  });
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
