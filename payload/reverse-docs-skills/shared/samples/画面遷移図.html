<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>画面遷移図 — リバース設計ポータル</title>
<!--
  detail-pages T4 図解型テンプレート — リバース設計スキル群(画面遷移図/ER図で共用)
  生成: shared/scripts/detail-pages/build-detail-page.sh
  プレースホルダ置換は build-detail-page.sh の render_template() が行う。
  手作業によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。

  埋め込みJSON(script#page-data)のnodes[]/edges[](画面遷移)またはentities[]/relations[]
  (ER)から、ページ読込時にJavaScriptがDOMを構築する。図(表示)とJSONは常に単一情報源。
    - pageKind=transition: ワイヤーフレーム+遷移先テーブルのsplit-view形式。画面選択UI
      (ドロップダウン+前後ボタン)で画面ごとのビューを切り替える。エッジは共通ナビ判定
      (出現率30%以上)により画面固有/共通ナビ/自己ループの3層に分類する。出次数がしきい値
      (MAX_EDGES_PER_VIEW)超のノードは中央ナビゲーション画面として別セクションに、
      入出次数0のノードは未接続画面一覧として別セクションに折りたたみ表示する。
    - pageKind=er        : グリッド配置のSVG描画(変更なし)

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/portal-template.html からの複製である。
  同テンプレートの当該部分を変更した場合は本ファイルも同時更新すること
  （T1一覧テンプレート群・T3テンプレートにも同種の複製あり。include化は別件）。

  プレースホルダ(build-detail-page.shが注入。実際のマーカー記法は
  scripts/detail-pages/build-detail-page.sh 冒頭コメントを正本とする。本コメントでは
  二重置換事故を避けるため意図的に波括弧を外して記載する):
    TITLE (ページ見出しマーカー)         : page-data.json の title
    DESCRIPTION (ページ概要マーカー)     : page-data.json の description
    GENERATED_AT (生成日時マーカー)      : page-data.json の generatedAt
    PAGE_DATA_JSON (page-data埋め込みマーカー) : page-data.json の内容全体(本ファイル物理末尾のscriptタグへ注入)
-->
<style>
:root,
[data-theme="light"] {
  /* Windows フォント上書き防止 */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-synthesis: none;
  --bg: #FFFFFF;
  --panel: #FFFFFF;
  --panel-2: #F0EDE3;
  --border: #DAD5C5;
  --border-strong: #BFB9A6;
  --text: #1B1F26;
  --text-sub: #4A4F58;
  --text-muted: #767B85;
  --accent: #3F4F8E;
  --accent-2: #5A6BAE;
  --accent-soft: #E6E9F3;
  --accent-border: #BAC2DC;
  --gold: #9B7A1F;
  --gold-soft: #F5EFD9;
  --gold-border: #DDC68A;
  --success: #3F4F8E;
  --success-soft: #E6E9F3;
  --warn: #9B7A1F;
  --danger: #9B3F2D;
  --danger-soft: #F5E2DC;
  --code-bg: #1B1F26;
  --code-fg: #E8E5DC;
  --cat-list: #2563eb;
  --cat-common: #059669;
  --cat-project: #7C3AED;
  --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
  --mono: "SFMono-Regular","Menlo","Cascadia Code","Consolas",monospace;
  --shadow-sm: 0 1px 3px rgba(27,31,38,.07), 0 2px 6px rgba(27,31,38,.05);
  --shadow-md: 0 2px 8px rgba(27,31,38,.09), 0 8px 24px rgba(27,31,38,.07);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #232730;
    --border: #353944; --border-strong: #4A4F5C;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #8FA3DB; --accent-2: #A8B8E5; --accent-soft: #2A2E47; --accent-border: #4C5680;
    --gold: #D4B45D; --gold-soft: #3D3520; --gold-border: #7A6633;
    --success: #8FA3DB; --success-soft: #2A2E47;
    --warn: #D4B45D; --danger: #D4836E; --danger-soft: #3F2620;
    --code-bg: #0E1116; --code-fg: #E8E5DC;
    --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
  }
}
[data-theme="dark"] {
  --bg: #15171C; --panel: #1C1F26; --panel-2: #232730;
  --border: #353944; --border-strong: #4A4F5C;
  --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
  --accent: #8FA3DB; --accent-2: #A8B8E5; --accent-soft: #2A2E47; --accent-border: #4C5680;
  --gold: #D4B45D; --gold-soft: #3D3520; --gold-border: #7A6633;
  --success: #8FA3DB; --success-soft: #2A2E47;
  --warn: #D4B45D; --danger: #D4836E; --danger-soft: #3F2620;
  --code-bg: #0E1116; --code-fg: #E8E5DC;
  --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.dp-page { display: grid; grid-template-rows: auto 1fr auto; min-height: 100vh; }

.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); }
.brand:hover { text-decoration: none; }
.brand-icon { display: inline-flex; align-items: center; }
.brand-title { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: var(--text-muted, #6c757d); }
.top-actions { display: flex; align-items: center; gap: 8px; }
.top-actions button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
.header-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }

/* グリッドアイテムが内容幅で親を押し広げないための対策(portal-template.htmlと同一措置) */
.dp-main { max-width: 1280px; width: 100%; min-width: 0; margin: 0 auto; padding: 24px 24px 64px; }

.doc-crumbs { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.doc-crumbs a { color: var(--text-sub); cursor: pointer; }
.doc-crumbs a:hover { color: var(--accent); }

.dp-hero {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  padding: 4px 2px 14px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap;
}
.dp-hero h1 { font-size: 23px; margin: 0; }
.dp-hero p { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 0; }
.dp-updated {
  font-size: 12px; color: var(--text-sub); background: var(--accent-soft);
  border: 1px solid var(--accent-border); border-radius: 999px; padding: 3px 12px; white-space: nowrap;
}

.sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-sub);
  display: flex; align-items: center; gap: 8px; margin: 26px 0 12px;
}
.sec-label:first-of-type { margin-top: 6px; }
.sec-label::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }

/* 凡例 */
.legend-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 4px; min-width: 0; }
.legend-item {
  display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-sub);
  background: var(--panel); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px;
}
.legend-symbol { font-weight: 700; color: var(--accent); }

/* SVG図。図本体だけを横スクロールさせ、ページ本体は横スクロールさせない */
.diagram-wrap {
  overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--panel); padding: 16px;
}
svg#diagram-svg { display: block; min-width: 100%; }
.diagram-node-rect { fill: var(--accent-soft); stroke: var(--accent-border); stroke-width: 1.5; }
.diagram-node-text { fill: var(--text); font-size: 12px; font-family: inherit; }
.diagram-edge { stroke: var(--text-muted); stroke-width: 1.4; fill: none; }
.diagram-arrow { fill: var(--text-muted); }
.diagram-edge-label text { fill: var(--text-sub); font-size: 11px; font-family: inherit; }
.diagram-empty { font-size: 13px; color: var(--text-muted); padding: 12px 4px; }

/* 補足表。表本体だけを横スクロールさせ、ページ本体は横スクロールさせない */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table.data-table {
  width: 100%; min-width: 480px; border-collapse: collapse; font-size: 13px;
  background: var(--panel); border: 1px solid var(--border);
}
table.data-table th {
  text-align: left; font-size: 11.5px; font-weight: 700; color: var(--text-sub);
  background: var(--panel-2); padding: 8px 12px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
table.data-table tr:last-child td { border-bottom: none; }
table.data-table code {
  background: var(--panel-2); padding: 1px 6px; border-radius: 4px;
  font-family: var(--mono); font-size: 11.5px; color: var(--text-sub);
  border: 1px solid var(--border);
}

.note-box {
  font-size: 12px; color: var(--text-sub); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; margin: 14px 0 0;
}

.footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
  display: flex; gap: 20px; justify-content: center;
}

@media (max-width: 760px) {
  .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
  .dp-main { padding: 14px; }
}
@media (max-width: 560px) {
  body { font-size: 14px; }
  .dp-hero h1 { font-size: 20px; }
  .dp-main { padding: 12px; }
}

.hidden { display: none !important; }

/* split-view (transition) */
.split-view { display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }
.wireframe-panel { position: sticky; top: 24px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
@media (max-width: 800px) {
  .split-view { grid-template-columns: 1fr; }
  .wireframe-panel { position: static; }
}

/* ワイヤーフレーム構成パーツ */
.wf-titlebar { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
.wf-page-id { font-size: 11px; color: var(--text-muted); font-weight: 400; font-family: var(--mono); }
.wf-body { padding: 12px 14px; }
.wf-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 10px 0 6px; }
.wf-section-label:first-child { margin-top: 0; }
.wf-nav { display: flex; flex-direction: column; gap: 4px; }
.wf-nav-item { border: 1px dashed var(--nav-tag); border-radius: 4px; padding: 4px 8px; font-size: 12px; color: var(--nav-tag); display: flex; justify-content: space-between; align-items: center; }
.wf-profile { background: var(--panel-2); border-radius: 6px; padding: 8px 10px; margin: 8px 0; }
.wf-link { border: 1px solid var(--highlight-border); border-radius: 4px; padding: 4px 8px; font-size: 12px; color: var(--text); display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.wf-self-link { border: 1px solid var(--self-tag); border-radius: 4px; padding: 4px 8px; font-size: 12px; color: var(--self-tag); display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.wf-placeholder { height: 8px; background: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 4px, transparent 4px, transparent 8px); border-radius: 2px; margin: 4px 0; }
.wf-link-row { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.wf-text-ph { height: 5px; background: var(--border); border-radius: 2px; margin: 3px 0; opacity: .4; }
.wf-img-rect { width: 100%; height: 32px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; margin: 6px 0; }
.wf-two-col { display: grid; grid-template-columns: 48px 1fr; gap: 8px; align-items: start; margin: 6px 0; }
.wf-img-circle { width: 44px; height: 44px; border-radius: 50%; background: var(--panel-2); border: 1px solid var(--border); }
.wf-meta-lines { display: flex; flex-direction: column; gap: 3px; }
.badge { display: inline-flex; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; align-items: center; justify-content: center; flex-shrink: 0; }
.wf-nav-item .badge { background: var(--nav-tag); color: #fff; }
.wf-link .badge { background: var(--highlight); color: #fff; }
.wf-self-link .badge { background: var(--self-tag); color: #fff; }

/* 3層配色 */
:root {
  --highlight: #D97B1A; --highlight-soft: rgba(217,123,26,0.12); --highlight-border: rgba(217,123,26,0.5);
  --nav-tag: #7B8BBF; --nav-tag-soft: #ECEEF6;
  --self-tag: #6B9B6B; --self-tag-soft: #E8F0E8;
}
@media (prefers-color-scheme: dark) {
  :root { --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5); --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15); --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15); }
}
:root[data-theme="dark"] { --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5); --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15); --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15); }
:root[data-theme="light"] { --highlight: #D97B1A; --highlight-soft: rgba(217,123,26,0.12); --highlight-border: rgba(217,123,26,0.5); --nav-tag: #7B8BBF; --nav-tag-soft: #ECEEF6; --self-tag: #6B9B6B; --self-tag-soft: #E8F0E8; }

/* 遷移先テーブル */
.table-panel { min-width: 0; }
.table-panel-header { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.table-panel-header .count { font-size: 12px; font-weight: 400; color: var(--text-muted); }
.trans-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); }
.trans-table th { text-align: left; font-size: 11.5px; font-weight: 700; color: var(--text-sub); background: var(--panel-2); padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.trans-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
.trans-table tr:last-child td { border-bottom: none; }
.row-badge { display: inline-flex; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; font-weight: 700; align-items: center; justify-content: center; color: #fff; }
.row-badge.specific { background: var(--highlight); }
.row-badge.common { background: var(--nav-tag); }
.row-badge.self { background: var(--self-tag); }

/* 選択コンポーネント詳細カード */
.detail-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  min-height: 60px;
}
.detail-card-empty {
  font-size: 13px;
  color: var(--text-muted);
  padding: 12px 0;
  text-align: center;
}
.detail-card-badge {
  display: inline-flex;
  width: 24px; height: 24px;
  border-radius: 50%;
  font-size: 12px; font-weight: 700;
  align-items: center; justify-content: center;
  color: #fff;
  margin-right: 8px;
  vertical-align: middle;
}
.detail-card-badge.specific { background: var(--highlight); }
.detail-card-badge.common { background: var(--nav-tag); }
.detail-card-badge.self { background: var(--self-tag); }
.detail-card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
}
.detail-card dl {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 12px;
  font-size: 13px;
}
.detail-card dt {
  color: var(--text-muted);
  font-weight: 600;
  font-size: 12px;
  white-space: nowrap;
}
.detail-card dd {
  margin: 0;
}
.detail-card dd code {
  font-family: var(--mono);
  font-size: 11.5px;
  background: var(--panel-2);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text-sub);
}

/* 種別タグ */
.tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 999px; }
.tag-specific { color: var(--highlight); background: var(--highlight-soft); border: 1px solid var(--highlight-border); }
.tag-nav { color: var(--nav-tag); background: var(--nav-tag-soft); border: 1px solid var(--nav-tag); }
.tag-self { color: var(--self-tag); background: var(--self-tag-soft); border: 1px solid var(--self-tag); }

/* 凡例スウォッチ */
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
.legend-swatch.page-specific { background: var(--highlight); }
.legend-swatch.common-nav { background: var(--nav-tag); }
.legend-swatch.self-loop { background: var(--self-tag); }

/* 画面選択ナビ */
.view-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.view-nav select { flex: 1; min-width: 200px; padding: 8px 12px; font-size: 13px; font-family: inherit; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); }
.nav-btn { background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit; }
.nav-btn:hover { background: var(--accent-soft); color: var(--accent); }

/* 折りたたみ(中央ナビゲーション画面/未接続画面一覧) */
.iso-group { margin-bottom: 8px; }
.iso-group summary { cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 0; }
.iso-group summary:hover { color: var(--accent); }

/* モード切り替えタブ(画面別/動線別/未接続) */
.mode-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.mode-tab { background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; padding: 10px 18px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: color .15s, border-color .15s; }
.mode-tab:hover { color: var(--text-sub); }
.mode-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* 動線別モード */
.flow-nav { margin-bottom: 16px; }
.flow-nav select { width: 100%; padding: 8px 12px; font-size: 13px; font-family: inherit; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); }

/* 動線カバレッジ要約 */
.flow-coverage {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 12px;
  font-size: 13px;
  line-height: 1.7;
}
.flow-coverage-headline { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.flow-coverage-row { color: var(--text-sub); padding-left: 4px; }
.flow-coverage-check { margin-top: 4px; color: var(--text-sub); }
.flow-coverage-check.flow-coverage-error { color: var(--danger, #c0392b); font-weight: 700; }

/* 動線未カバー一覧(details/summaryで折りたたみ) */
.flow-uncovered { margin-bottom: 20px; }
.flow-uncovered > summary { cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 0; }
.flow-uncovered > summary:hover { color: var(--accent); }
.flow-uncovered-body { font-size: 13px; padding: 4px 0 4px 4px; }

<script>
(function() {
  var data = JSON.parse(document.getElementById('page-data').textContent);
  var kind = data.pageKind === 'er' ? 'er' : 'transition';

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      if (k === 'html') node.innerHTML = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  var SVGNS = 'http://www.w3.org/2000/svg';
  function svgEl(tag, attrs) {
    var node = document.createElementNS(SVGNS, tag);
    if (attrs) Object.keys(attrs).forEach(function(k) { node.setAttribute(k, attrs[k]); });
    return node;
  }

  // --- 凡例(legend[]) ---
  var legendMount = document.getElementById('legend-mount');
  var legend = data.legend || [];
  if (legend.length === 0) {
    legendMount.appendChild(el('div', { class: 'diagram-empty' }, '凡例なし'));
  } else {
    legend.forEach(function(l) {
      legendMount.appendChild(el('div', { class: 'legend-item' }, [
        el('span', { class: 'legend-symbol' }, l.symbol || ''),
        el('span', null, l.meaning || '')
      ]));
    });
  }

  // --- ノード/エッジの取り出し(pageKindで分岐) ---
  var keyField = kind === 'transition' ? 'unitKey' : 'key';
  var nodesRaw = kind === 'transition' ? (data.nodes || []) : (data.entities || []);
  var edgesRaw = kind === 'transition' ? (data.edges || []) : (data.relations || []);
  var keys = nodesRaw.map(function(n) { return n[keyField]; });

  if (kind === 'er') {
  // --- ER: 既存のSVGグリッド配置 + 補足表描画(変更なし) ---
  var svg = document.getElementById('diagram-svg');
  var diagramWrap = svg.parentNode;

  if (keys.length === 0) {
    diagramWrap.replaceChild(el('div', { class: 'diagram-empty' }, '図示できるノードがありません'), svg);
  } else {
    // --- 箱サイズ(ラベル長から決定的に算出) ---
    var BOX_H = 44, MIN_W = 120, MAX_W = 220;
    var boxW = {};
    nodesRaw.forEach(function(n) {
      var label = n.label || n[keyField] || '';
      boxW[n[keyField]] = Math.max(MIN_W, Math.min(MAX_W, label.length * 9 + 28));
    });

    var COL_GAP = 260, ROW_GAP = 90, MARGIN = 40;
    var pos = {};

    if (kind === 'transition') {
      // 層状配置: 入次数0のノードを起点(level=0)とし、辺をたどってlevelを更新する
      var indeg = {}; keys.forEach(function(k) { indeg[k] = 0; });
      var adj = {}; keys.forEach(function(k) { adj[k] = []; });
      edgesRaw.forEach(function(e) {
        if (adj[e.from] !== undefined && indeg[e.to] !== undefined) {
          adj[e.from].push(e.to);
          indeg[e.to]++;
        }
      });
      var level = {};
      var queue = keys.filter(function(k) { return indeg[k] === 0; });
      var visited = {};
      queue.forEach(function(k) { level[k] = 0; visited[k] = true; });
      var qi = 0;
      while (qi < queue.length) {
        var cur = queue[qi++];
        (adj[cur] || []).forEach(function(n) {
          var newLevel = level[cur] + 1;
          if (level[n] === undefined || newLevel > level[n]) level[n] = newLevel;
          if (!visited[n]) { visited[n] = true; queue.push(n); }
        });
      }
      // 入次数0起点から到達できない孤立ノード(孤立サイクル等)はlevel 0扱いとする
      keys.forEach(function(k) { if (level[k] === undefined) level[k] = 0; });

      var byLevel = {};
      keys.forEach(function(k) {
        var lv = level[k];
        byLevel[lv] = byLevel[lv] || [];
        byLevel[lv].push(k);
      });
      Object.keys(byLevel).forEach(function(lv) {
        byLevel[lv].forEach(function(k, idx) {
          pos[k] = {
            cx: MARGIN + Number(lv) * COL_GAP + boxW[k] / 2,
            cy: MARGIN + idx * ROW_GAP + BOX_H / 2
          };
        });
      });
    } else {
      // グリッド配置
      var cols = Math.max(1, Math.ceil(Math.sqrt(keys.length)));
      keys.forEach(function(k, idx) {
        var col = idx % cols, row = Math.floor(idx / cols);
        pos[k] = {
          cx: MARGIN + col * COL_GAP + boxW[k] / 2,
          cy: MARGIN + row * ROW_GAP + BOX_H / 2
        };
      });
    }

    var maxX = 0, maxY = 0;
    keys.forEach(function(k) {
      var p = pos[k];
      maxX = Math.max(maxX, p.cx + boxW[k] / 2);
      maxY = Math.max(maxY, p.cy + BOX_H / 2);
    });
    var svgW = Math.max(600, maxX + MARGIN);
    var svgH = Math.max(220, maxY + MARGIN);
    svg.setAttribute('width', svgW);
    svg.setAttribute('height', svgH);
    svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

    // --- 矢印マーカー(遷移のみ) ---
    if (kind === 'transition') {
      var defs = svgEl('defs');
      var marker = svgEl('marker', {
        id: 'diagram-arrowhead', viewBox: '0 0 10 10', refX: '9', refY: '5',
        markerWidth: '7', markerHeight: '7', orient: 'auto-start-reverse'
      });
      marker.appendChild(svgEl('path', { d: 'M 0 0 L 10 5 L 0 10 z', class: 'diagram-arrow' }));
      defs.appendChild(marker);
      svg.appendChild(defs);
    }

    // 中心cx/cy・半幅hw/半高hhの矩形の境界上で、方向(dx,dy)にある点を返す
    function rectBorderPoint(cx, cy, hw, hh, dx, dy) {
      if (dx === 0 && dy === 0) return { x: cx, y: cy };
      var scaleX = dx !== 0 ? hw / Math.abs(dx) : Infinity;
      var scaleY = dy !== 0 ? hh / Math.abs(dy) : Infinity;
      var scale = Math.min(scaleX, scaleY);
      return { x: cx + dx * scale, y: cy + dy * scale };
    }

    // --- エッジ/リレーション描画(from/toの矩形境界を結ぶ線 + ラベル) ---
    var edgeGroup = svgEl('g', { class: 'diagram-edges' });
    edgesRaw.forEach(function(e) {
      var a = pos[e.from], b = pos[e.to];
      if (!a || !b) { return; } // 未解決参照(ノード不在)は描画をスキップする
      var dx = b.cx - a.cx, dy = b.cy - a.cy;
      var start = rectBorderPoint(a.cx, a.cy, boxW[e.from] / 2, BOX_H / 2, dx, dy);
      var end = rectBorderPoint(b.cx, b.cy, boxW[e.to] / 2, BOX_H / 2, -dx, -dy);
      var line = svgEl('line', { x1: start.x, y1: start.y, x2: end.x, y2: end.y, class: 'diagram-edge' });
      if (kind === 'transition') line.setAttribute('marker-end', 'url(#diagram-arrowhead)');
      edgeGroup.appendChild(line);

      var labelText = kind === 'transition' ? (e.trigger || '') : (e.cardinality || '');
      if (labelText) {
        var mx = (start.x + end.x) / 2, my = (start.y + end.y) / 2;
        var labelG = svgEl('g', { class: 'diagram-edge-label', transform: 'translate(' + mx + ',' + my + ')' });
        var textNode = svgEl('text', { 'text-anchor': 'middle', dy: '-4' });
        textNode.textContent = labelText;
        labelG.appendChild(textNode);
        edgeGroup.appendChild(labelG);
      }
    });
    svg.appendChild(edgeGroup);

    // --- ノード/エンティティ描画(角丸矩形 + ラベル) ---
    var nodeGroup = svgEl('g', { class: 'diagram-nodes' });
    nodesRaw.forEach(function(n) {
      var k = n[keyField];
      var p = pos[k];
      var w = boxW[k];
      var g = svgEl('g', {
        class: 'diagram-node',
        transform: 'translate(' + (p.cx - w / 2) + ',' + (p.cy - BOX_H / 2) + ')'
      });
      g.appendChild(svgEl('rect', { width: w, height: BOX_H, rx: 8, ry: 8, class: 'diagram-node-rect' }));

  } else {

  var nodeByKey = {};
  nodesRaw.forEach(function(n) { nodeByKey[n[keyField]] = n; });

  // 未解決参照(ノード不在)は集計・描画から除外する(ERパスと同じフェイルセーフ)
  var edgesResolved = edgesRaw.filter(function(e) {

  // --- 共通ナビゲーション判定(出現率 >= 30%) ---

  var toFromSet = {};
  edgesResolved.forEach(function(e) {

  });
  var commonNavSet = {};
  keys.forEach(function(k) {
    var distinctFrom = toFromSet[k] ? Object.keys(toFromSet[k]).length : 0;
    var rate = distinctFrom / Math.max(1, totalFromScreens);
    if (rate >= COMMON_NAV_RATE) commonNavSet[k] = true;
  });

  function classify(e) {
    if (e.from === e.to) return 'self';
    if (commonNavSet[e.to]) return 'common';

  function circleNum(n) { return CIRCLED_NUMS[n - 1] || ('(' + n + ')'); }
  function confRank(c) {

  // --- ノード分類(中央ナビゲーション画面/未接続画面/通常画面) ---
  var outEdges = {}, outDegree = {}, inDegree = {};
  keys.forEach(function(k) { outEdges[k] = []; outDegree[k] = 0; inDegree[k] = 0; });
  edgesResolved.forEach(function(e) {

    outDegree[e.from]++;

  });
  browserBackEdges.forEach(function(e) {

  var hubNodes = [], isolatedNodes = [], normalNodes = [];
  keys.forEach(function(k) {

  var sortedOutEdges = {};

  // --- split-view(1画面分)構築 ---
  function buildSplitView(key) {

          el('td', null, e.triggerType || 'リンク遷移'),

        ])),
        tbody2

    ]);

  }

  // --- ドロップダウン(画面選択UI)構築(グループ = unitKeyの最初のスラッシュまで) ---
  var groupOf = {};

  // グループ情報がないデータ(全ノードが自分自身だけのグループ)では画面名のフラットリストにする。
  var hasRealGroups = groupNames.some(function(g) { return groupMap[g].length > 1; });

  function setMode(mode) {

  modeScreen.appendChild(el('div', { class: 'sec-label' }, '中央ナビゲーション画面（' + hubNodes.length + '件）'));

  // --- 動線のカテゴリ判定(グループキーノードのcategoryフィールドを使う) ---
  // グループキー = パス中、最初に現れる非共通ナビノード(全て共通ナビなら null)。
  // categoryOfKey(null) は「共通遷移」という専用カテゴリに集約する。
  function categoryOfKey(k) {
    if (k === null) return '共通遷移';
    var n = nodeByKey[k];
    return (n && n.category) || 'その他';
  }
  function flowGroupKey(path) {
    for (var pi = 1; pi < path.length; pi++) {
      if (!commonNavSet[path[pi]]) return path[pi];
    }
    return null;
  }

  // --- 動線別モード(入次数0の起点から、分岐点ごとに複数の動線を自動生成) ---
  // 起点(入次数0のノード)からの最長パスを1本たどるだけでは、起点が1つしかない
  // 構成(例: ログイン起点のみ)で動線が1本しか出ない。分岐点(固有遷移が複数ある
  // ノード)ごとに未選択の候補へも動線を伸ばし、複数の動線グループを生成する。
  function computeFlows() {
    var MAX_DEPTH = 20;
    var MAX_FLOWS_PER_CATEGORY = 50;
    // 全体上限は撤廃(カテゴリごと上限に置換)。ただし無限ループ防止用の
    // 内部安全弁として十分大きい値を残す(業務上の上限とは別物)。
    var HARD_SAFETY_CAP = 5000;
    var origins = keys.filter(function(k) { return inDegree[k] === 0 && outDegree[k] > 0; });
    var flows = [];
    var categoryCounts = {};

    // cur から未訪問ノードへ、confidence最上位の候補を選びながら末端まで歩く。
    // path/visitedへ直接追記し、たどった辺の配列を返す。
    function greedyWalk(path, visited) {
      var edgesUsed = [];
      var cur = path[path.length - 1];
      for (var step = 0; step < MAX_DEPTH; step++) {
        var candidates = (outEdges[cur] || []).filter(function(e) {
          return e.from !== e.to && !visited[e.to];
        });
        if (candidates.length === 0) break;
        var best = candidates[0];
        candidates.forEach(function(e) {
          if (confRank(e.confidence) > confRank(best.confidence)) best = e;
        });
        edgesUsed.push(best);
        cur = best.to;
        path.push(cur);
        visited[cur] = true;
      }
      return edgesUsed;
    }

    // 生成済みの動線を分岐元キューへ積み、各動線の経路上の分岐点をさらに
    // 展開する(分岐から生まれた動線自身の分岐点も再帰的にたどる)。
    var seenPaths = {};
    var queue = [];

    function pushFlow(origin, path, edges) {
      if (path.length <= 1 || flows.length >= HARD_SAFETY_CAP) return;
      var sig = path.join('>');
      if (seenPaths[sig]) return;
      var cat = categoryOfKey(flowGroupKey(path));
      if ((categoryCounts[cat] || 0) >= MAX_FLOWS_PER_CATEGORY) return;
      seenPaths[sig] = true;
      categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
      var flow = { origin: origin, path: path, edges: edges, category: cat };
      flows.push(flow);
      queue.push(flow);
    }

    origins.forEach(function(origin) {
      if (flows.length >= HARD_SAFETY_CAP) return;
      var mainPath = [origin];
      var mainVisited = {};
      mainVisited[origin] = true;
      var mainEdges = greedyWalk(mainPath, mainVisited);
      pushFlow(origin, mainPath, mainEdges);
    });

    // 主経路・各分岐路それぞれの分岐点について、選ばれなかった候補ごとに
    // 別の動線を生成する。同一パス内では visited 集合で訪問済みノードへの
    // 再訪(ヘッダーのtop/search等への戻り)を除外済みのため、commonNavSet
    // (画面別モードの表分類用。cart/product-detail等の主要画面も「共通」
    // 扱いになりうる)はそのままでは使わない。共通ナビかつ遷移先を持たない
    // 行き止まり(ヘルプ等)だけを、動線として価値が薄いため除外する。
    var qi = 0;
    while (qi < queue.length && flows.length < HARD_SAFETY_CAP) {
      var base = queue[qi++];
      for (var i = 0; i < base.edges.length && flows.length < HARD_SAFETY_CAP; i++) {
        var node = base.path[i];
        var prefixVisited = {};
        for (var j = 0; j <= i; j++) prefixVisited[base.path[j]] = true;
        var candidates = (outEdges[node] || []).filter(function(e) {
          if (e.from === e.to || prefixVisited[e.to]) return false;
          if (classify(e) === 'common' && outDegree[e.to] === 0) return false;
          return true;
        });
        candidates.forEach(function(alt) {
          if (flows.length >= HARD_SAFETY_CAP) return;
          if (alt === base.edges[i]) return;
          // 分岐点(base.path[i])までの経路をそのまま引き継ぎ、そこから alt へ分岐する。
          var branchPath = base.path.slice(0, i + 1).concat([alt.to]);
          var branchEdges = base.edges.slice(0, i).concat([alt]);
          var branchVisited = {};
          for (var vk in prefixVisited) branchVisited[vk] = prefixVisited[vk];
          branchVisited[alt.to] = true;
          var restEdges = greedyWalk(branchPath, branchVisited);
          pushFlow(base.origin, branchPath, branchEdges.concat(restEdges));
        });
      }
    }
    return flows;
  }

  function switchToScreenMode(key) {
    select.value = key;
    renderView(select.value);
    setMode('screen');
  }

  // --- 動線グループの表示名(ユーザー操作シナリオ名)を導出 ---
  // グループへ到達する最初の固有(非共通ナビ)エッジのtriggerをそのままシナリオ名とし、
  // triggerが無い場合のみ終点ラベルから「〜への遷移」を組み立てる。
  function deriveScenarioName(flow, nodeMap) {
    var triggerEdge = null;
    for (var ei = 0; ei < flow.edges.length; ei++) {
      if (!commonNavSet[flow.edges[ei].to]) { triggerEdge = flow.edges[ei]; break; }
    }
    var trigger = triggerEdge ? (triggerEdge.trigger || '') : '';
    var endLabel = nodeMap[flow.path[flow.path.length - 1]] || '';
    if (trigger) return trigger;
    return endLabel + 'への遷移';
  }

  // --- 個別動線(flow-strip)のDOM構築 ---
  function buildFlowStrip(flow) {
    var terminalKey = flow.path[flow.path.length - 1];
    var strip = el('div', { class: 'flow-strip' });
    strip.appendChild(el('div', { class: 'flow-title' }, nodeLabel(flow.path[0]) + ' → ' + nodeLabel(terminalKey) + '（' + flow.path.length + 'ステップ）'));
    var steps = el('div', { class: 'flow-steps' });
    flow.path.forEach(function(k, idx) {
      if (idx > 0) steps.appendChild(el('span', { class: 'flow-arrow' }, '→'));
      var cardChildren = [el('div', { class: 'flow-step-name' }, nodeLabel(k))];
      if (idx < flow.edges.length) cardChildren.push(el('div', { class: 'flow-step-action' }, flow.edges[idx].trigger || ''));
      var card = el('div', { class: 'flow-step-card', 'data-key': k }, cardChildren);
      card.addEventListener('click', function() { switchToScreenMode(k); });
      steps.appendChild(card);
    });
    strip.appendChild(steps);
    return strip;
  }

  // --- 動線グループ化(カテゴリ階層 > 起点の次のノードをキーに集約。共通ナビへの分岐は「共通遷移」に集約) ---
  // カテゴリはグループキーノードのcategoryフィールドから決まる(categoryOfKey)。
  // カテゴリの<details>は開いた時に初めて内部の動線グループDOMを生成する(遅延レンダリング)。
  function renderFlowMode(flowList, nodeMap) {
    var container = document.getElementById('flow-content');
    var select = document.getElementById('flow-select');
    container.innerHTML = '';
    select.innerHTML = '';

    if (flowList.length === 0) {
      container.appendChild(el('div', { class: 'diagram-empty' }, '動線を生成できる画面がありません'));
      return;
    }

    // カテゴリ -> グループキー(node単位) -> flows[] の2階層に集約する。
    var categories = {};
    var categoryOrder = [];
    flowList.forEach(function(flow) {
      var key = flowGroupKey(flow.path);
      var groupKey = key === null ? '__common__' : key;
      var cat = flow.category || categoryOfKey(key);
      if (!categories[cat]) {
        categories[cat] = { order: [], groups: {}, titles: {} };
        categoryOrder.push(cat);
      }
      var bucket = categories[cat];
      if (!bucket.groups[groupKey]) {
        bucket.groups[groupKey] = [];
        bucket.order.push(groupKey);
        bucket.titles[groupKey] = key === null ? '共通遷移' : deriveScenarioName(flow, nodeMap);
      }
      bucket.groups[groupKey].push(flow);
    });
    // 同一グループ内はパスの長さ順にソート
    categoryOrder.forEach(function(cat) {
      var bucket = categories[cat];
      bucket.order.forEach(function(groupKey) {
        bucket.groups[groupKey].sort(function(a, b) { return a.path.length - b.path.length; });
      });
    });
    // カテゴリは50音/アルファベット順。「共通遷移」「その他」は末尾に固定する。
    categoryOrder.sort(function(a, b) {
      if (a === b) return 0;
      if (a === '共通遷移') return 1;
      if (b === '共通遷移') return -1;
      if (a === 'その他') return 1;
      if (b === 'その他') return -1;
      return a.localeCompare(b, 'ja');
    });

    function categoryTotal(cat) {
      var total = 0;
      categories[cat].order.forEach(function(gk) { total += categories[cat].groups[gk].length; });
      return total;
    }

    select.appendChild(el('option', { value: '' }, '全カテゴリ表示'));
    categoryOrder.forEach(function(cat) {
      select.appendChild(el('option', { value: cat }, cat + '（' + categoryTotal(cat) + '動線）'));
    });

    // カテゴリは<details>/<summary>で構築し、初期表示は折りたたんだ状態にする。
    // 内部の動線グループDOMは初めて開いた時にだけ生成する(遅延レンダリング)。
    var renderCategoryBodyMap = {};
    categoryOrder.forEach(function(cat) {
      var bucket = categories[cat];
      var catDetails = el('details', { class: 'flow-category', 'data-category': cat });
      var catSummary = el('summary', { class: 'flow-category-header' }, [
        el('span', { class: 'flow-category-title' }, cat),
        el('span', { class: 'flow-category-badge' }, categoryTotal(cat) + '動線')
      ]);
      catDetails.appendChild(catSummary);
      var rendered = false;
      function renderCategoryBody() {
        if (rendered) return;
        rendered = true;
        bucket.order.forEach(function(groupKey) {
          var details = el('details', { class: 'flow-group', 'data-group': groupKey });
          var summary = el('summary', { class: 'flow-group-header' }, [
            el('span', { class: 'flow-group-title' }, bucket.titles[groupKey]),
            el('span', { class: 'flow-group-badge' }, bucket.groups[groupKey].length + '動線')
          ]);
          details.appendChild(summary);
          bucket.groups[groupKey].forEach(function(flow) {
            details.appendChild(buildFlowStrip(flow));
          });
          catDetails.appendChild(details);
        });
      }
      renderCategoryBodyMap[cat] = renderCategoryBody;
      catDetails.addEventListener('toggle', function() {
        if (catDetails.open) renderCategoryBody();
      });
      container.appendChild(catDetails);
    });

    select.addEventListener('change', function() {
      var val = select.value;
      container.querySelectorAll('.flow-category').forEach(function(c) {
        var cat = c.getAttribute('data-category');
        var match = (!val || cat === val);
        c.style.display = match ? '' : 'none';
        if (val && match) {
          c.open = true;
          renderCategoryBodyMap[cat]();
        }
      });
    });
  }

  var flows = computeFlows();
  var nodeMap = {};
  keys.forEach(function(k) { nodeMap[k] = nodeLabel(k); });

  // --- 動線カバレッジ要約(全画面 = 動線カバー ∪ 未接続 ∪ 動線未カバー の完全分割検証) ---
  var coveredSet = {};
  flows.forEach(function(flow) { flow.path.forEach(function(k) { coveredSet[k] = true; }); });
  var coveredCount = Object.keys(coveredSet).length;
  var totalCount = keys.length;
  var unconnectedCount = isolatedNodes.length;
  var uncoveredKeys = keys.filter(function(k) {
    return !coveredSet[k] && (outDegree[k] + inDegree[k]) > 0;
  });
  var uncoveredCount = uncoveredKeys.length;
  var sumOk = (coveredCount + unconnectedCount + uncoveredCount) === totalCount;
  var coveragePct = totalCount > 0 ? Math.round((coveredCount / totalCount) * 1000) / 10 : 0;

  var coverageBox = el('div', { class: 'flow-coverage' });
  coverageBox.appendChild(el('div', { class: 'flow-coverage-headline' },
    '動線カバレッジ: ' + coveredCount + ' / ' + totalCount + ' 画面（' + coveragePct + '%）'));
  coverageBox.appendChild(el('div', { class: 'flow-coverage-row' }, '├ 動線でカバー: ' + coveredCount));
  coverageBox.appendChild(el('div', { class: 'flow-coverage-row' }, '├ 未接続画面: ' + unconnectedCount + '（未接続モードで確認）'));
  coverageBox.appendChild(el('div', { class: 'flow-coverage-row' }, '└ 動線未カバー: ' + uncoveredCount));
  coverageBox.appendChild(el('div', { class: 'flow-coverage-check' + (sumOk ? '' : ' flow-coverage-error') },
    sumOk
      ? '検証: ' + coveredCount + ' + ' + unconnectedCount + ' + ' + uncoveredCount + ' = ' + totalCount + ' ✓'
      : '⚠ 検証エラー: 分割が不完全です（' + coveredCount + ' + ' + unconnectedCount + ' + ' + uncoveredCount + ' ≠ ' + totalCount + '）'));

  var uncoveredBody = el('div', { class: 'flow-uncovered-body' });
  if (uncoveredCount === 0) {
    uncoveredBody.appendChild(el('div', { class: 'note-box' }, 'なし'));
  } else {
    uncoveredKeys.forEach(function(k) {
      uncoveredBody.appendChild(el('div', null, nodeLabel(k) + '（' + k + '）'));
    });
  }
  var uncoveredDetails = el('details', { class: 'flow-uncovered' }, [
    el('summary', null, '動線未カバー画面（' + uncoveredCount + '件）'),
    uncoveredBody
  ]);

  var flowSelect = el('select', { id: 'flow-select' });
  var flowContent = el('div', { id: 'flow-content' });
  var modeFlow = el('div', { id: 'mode-flow', class: 'hidden' }, [
    coverageBox,
    uncoveredDetails,
    el('div', { class: 'flow-nav' }, flowSelect),
    flowContent
  ]);

  // --- 未接続モード(入出次数0の画面一覧) ---
  var modeUnconnected = el('div', { id: 'mode-unconnected', class: 'hidden' });
  modeUnconnected.appendChild(el('div', { class: 'unconnected-summary' }, [
    el('span', { class: 'unconnected-count' }, isolatedNodes.length + '件'),
    el('span', { class: 'unconnected-label' }, '遷移が静的に検出されなかった画面')
  ]));
  var unconnectedContent = el('div', { id: 'unconnected-content' });
  if (isolatedNodes.length === 0) {
    unconnectedContent.appendChild(el('div', { class: 'unconnected-ok' }, '全画面の遷移が検出済みです'));
  } else {
    var isoGroupMap = {};
    isolatedNodes.forEach(function(k) {
      var g = groupName(k);
      isoGroupMap[g] = isoGroupMap[g] || [];
      isoGroupMap[g].push(k);
    });
    Object.keys(isoGroupMap).sort().forEach(function(g) {
      var list = isoGroupMap[g];
      var tbody5 = el('tbody');
      list.forEach(function(k) {
        tbody5.appendChild(el('tr', null, [el('td', null, el('code', null, k)), el('td', null, nodeLabel(k))]));
      });
      unconnectedContent.appendChild(el('details', { class: 'iso-group' }, [
        el('summary', null, g + '（' + list.length + '件）'),
        el('table', { class: 'data-table' }, [
          el('thead', null, el('tr', null, [el('th', null, 'unitKey'), el('th', null, 'ラベル')])),
          tbody5
        ])
      ]));
    });
  }
  modeUnconnected.appendChild(unconnectedContent);

  mount.appendChild(modeTabs);
  mount.appendChild(modeScreen);
  mount.appendChild(modeFlow);
  mount.appendChild(modeUnconnected);
  renderFlowMode(flows, nodeMap);
  }

  // --- 未解決節(unresolved[]) ---
  var unresolvedMount = document.getElementById('unresolved-mount');
  var unresolved = data.unresolved || [];
  if (unresolved.length > 0) {
    unresolvedMount.appendChild(el('div', { class: 'sec-label' }, '未解決'));
    var box = el('div', { class: 'note-box' });
    unresolved.forEach(function(u) {
      var line = (u.label || '') + '（' + (u.reason || '') + '）';
      box.appendChild(el('div', null, line));
    });
    unresolvedMount.appendChild(box);
  }

  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var r = document.documentElement;
    var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
    themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
    try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
  });
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
