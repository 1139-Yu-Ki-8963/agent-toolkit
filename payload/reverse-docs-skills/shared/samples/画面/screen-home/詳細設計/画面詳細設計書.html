## §1 画面概要

### 1.1 基本情報

| 項目 | 値 |
|---|---|
| 画面名 | ホーム |
| 目的 | ログイン後の利用者に業務全体の状況を提示し、各業務画面への入り口を提供する |
| ルート | / |
| 遷移元 | ログイン画面 |
| 遷移先 | サイドメニューで選択した各業務画面 |

### 1.2 業務上の位置づけ

ダッシュボードとしてログイン直後に必ず経由する画面であり、利用者は本画面から通知の確認や各業務画面への遷移を行う。

---

## §2 機能一覧

### 2.1 機能一覧表

| キー | 機能名 | 概要 | 優先度 |
|---|---|---|---|
| 表示-ダッシュボード集計 | ダッシュボード集計表示 | ログインユーザーに関連する業務集計値をカード形式で表示する | 必須 |
| ナビゲーション-サイドメニュー | サイドメニュー遷移 | サイドナビの項目クリックで各業務画面へ遷移する | 必須 |
| 通知-確認 | 通知確認 | 通知パネルを開き未読通知を一覧表示し既読にする | 必須 |

### 2.2 機能間の関係

通知確認によって既読化された件数は、サイドメニューに付随する通知バッジの表示件数に即時反映される。

---

## §3 画面構造

### 画面キャプチャ

![元コードの画面](./original.png)

### 部品構成（コンポーネント構造）

```
┌─ HomePage ──────────────────────────┐
│ ┌─ TopHeader ─────────────────────┐ │
│ │ UserMenu / NotificationBell     │ │
│ └──────────────────────────────────┘ │
│ ┌─ SideNav ─────┐ ┌─ MainArea ────┐ │
│ │ NavMenuItem    │ │ SummaryCard   │ │
│ └────────────────┘ └───────────────┘ │
└────────────────────────────────────────┘
```

### 3.1 コンポーネント配置

```
HomePage
├─ TopHeader
│   ├─ UserMenu
│   └─ NotificationBell
├─ SideNav
│   └─ NavMenuItem（繰り返し）
└─ MainArea
    └─ SummaryCard（繰り返し）
```

### 3.2 DOM 配置順序

1. TopHeader — 利用者情報と通知の表示
2. SideNav — 各業務画面への遷移メニュー
3. MainArea — ダッシュボード集計カードの表示

### 3.3 レイアウト制約

| 制約 | 値 |
|---|---|
| レイアウト方式 | Flex（横並び：サイドナビ＋メインエリア） |
| 最小幅 | 960px |
| 最大幅 | 1440px |

### 3.4 メニューバー設定（条件付き：メニューバーを持つ画面のみ）

該当なし（サイドナビ形式のため専用メニューバーは持たない）

### 3.5 設定オブジェクト構造（条件付き：設定オブジェクトを持つ場合のみ）

該当なし（設定オブジェクトを持たない画面のため）

### 3.6 スタイル適用パターン

| 領域 | 適用パターン | 参照先 |
|---|---|---|
| NavMenuItem（非活性項目） | disabled-nav-item | `DESIGN.md > colors.disabledNav` |
| NotificationBell（未読バッジ） | badge-count | `DESIGN.md > colors.badgeCount` |

### 3.7 ボタン一覧

| ボタン名 | 種別 | 位置 | 活性条件 |
|---|---|---|---|
| 通知ベル | 補助 | TopHeader 内 | 常時 |
| サイドメニュー項目 | 主要 | SideNav 内 | 対応する権限を利用者が持つとき |

---

## §4 業務ルール（条件付き：業務モード・権限制御がある画面のみ）

### 4.1 業務モードと切替条件

| モード | 切替条件 | UI の変化 |
|---|---|---|
| 通常表示 | 既定 | 権限に応じたメニュー項目のみ表示 |
| 管理者表示 | 利用者が管理者権限を持つ場合 | 管理系メニュー項目を追加表示 |

### 4.2 業務判断ポイント

利用者の権限区分（一般・管理者）によってサイドメニューに表示する項目が分岐する。

### 4.3 業務フロー内の前後画面との関係

ログイン画面から遷移してくる起点画面であり、以降のあらゆる業務画面への分岐点となる。

### 4.4 権限別の UI 制御

| ロール | 管理系メニュー | 通常業務メニュー |
|---|---|---|
| 管理者 | 表示 | 表示 |
| 一般利用者 | 非表示 | 表示 |

---

## §5 状態管理

### 5.1 URL パラメータ

該当なし（ホーム画面はURLパラメータを持たない）

### 5.2 セッション・ストレージ参照

| キー名 | 種別 | 用途 |
|---|---|---|
| home-notification-last-read | session | 直前に確認した通知の既読状態を復元する |

### 5.3 メイン画面の状態変数

| 変数名 | 型 | 初期値 | 役割 |
|---|---|---|---|
| summaryCards | 集計カードの配列 | 空配列 | ダッシュボード集計カードの表示内容を保持する |
| unreadCount | 数値 | 0 | 未読通知件数を保持する |
| isNotificationOpen | 真偽値 | 偽 | 通知パネルの開閉状態を保持する |
| isLoading | 真偽値 | 偽 | 集計データ取得中かどうかを保持する |

### 5.4 サブコンポーネントの状態変数

| コンポーネント | 変数名 | 型 | 役割 |
|---|---|---|---|
| NotificationBell | notifications | 通知レコードの配列 | 通知パネルに表示する通知一覧を保持する |

### 5.5 派生値（計算値）

| 派生値名 | 算出ロジック概要 | 依存する状態変数 |
|---|---|---|
| hasUnread | unreadCount が1以上かを判定する | unreadCount |
| visibleMenuItems | 利用者権限に基づきサイドメニュー項目を絞り込む | userRole |

### 5.6 画面専用ストア（永続化）

該当なし（画面固有の永続化なし）

### 5.7 共有ストア参照

| ストア / コンテキスト | 参照キー | 用途 |
|---|---|---|
| AuthContext | userRole | 管理系メニューの表示可否を判定する |
| AuthContext | userName | TopHeader の利用者名表示に使用する |

### 5.8 通知既読化関数

markNotificationAsRead(通知ID) — 指定した通知IDを既読状態へ更新し、unreadCount を1減算する。

### 5.9 初期値・デフォルト値一覧

| 変数名 | 初期値 | 根拠 |
|---|---|---|
| isNotificationOpen | 偽 | 初期表示では通知パネルを閉じた状態とする業務要件のため |
| unreadCount | 0 | API 取得完了まで暫定的に0件として扱う業務要件のため |

---

## §6 データフロー

### 6.1 初期表示シーケンス

1. ストア初期化（AuthContext から利用者権限・利用者名を取得）
2. API 呼び出し（§7 参照）
3. データ変換（§6.5 参照）
4. 画面状態を ready に更新

#### 6.1.1 起動時初期化（AuthContext → メニュー表示）

AuthContext から取得した userRole を用いて表示するサイドメニュー項目を決定する。

### 6.2 依存連鎖

unreadCount が変化すると NotificationBell のバッジ表示が更新される。

### 6.3 ユーザー操作確定時の処理フロー

1. バリデーション（該当なし）
2. 確認ダイアログ表示（該当なし）
3. API 呼び出し
4. 成功時: 通知一覧・未読件数を更新
5. 失敗時: エラー表示（§11 参照）

### 6.4 データ更新トリガーの分類

| トリガー | 種別 | 処理概要 |

<script>
(function () {
  var src = document.getElementById('doc-md').textContent;

  // frontmatter 除去
  src = src.replace(/^\s*---[\s\S]*?---\s*/, '');

  var lines = src.split('\n');
  var html = [];
  var inTable = false;
  var inList = false;
  var listType = '';
  var inBlockquote = false;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function inlineFormat(s) {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/!\[([^\]]*)\]\(([^()\s]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');
    s = s.replace(/\[([^\]]+)\]\(([^()\s]+)\)/g, '<a href="$2">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }

  function closeList() {
    if (inList) { html.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }
  }
  function closeBlockquote() {
    if (inBlockquote) { html.push('</blockquote>'); inBlockquote = false; }
  }
  function closeTable() {
    if (inTable) { html.push('</tbody></table>'); inTable = false; }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var trimmed = line.trim();

    // 空行
    if (!trimmed) { closeList(); closeBlockquote(); continue; }

    // 見出し
    var hm = trimmed.match(/^(#{1,6})\s+(.*)$/);
    if (hm) { closeList(); closeBlockquote(); closeTable(); var lv = hm[1].length; html.push('<h' + lv + '>' + inlineFormat(hm[2]) + '</h' + lv + '>'); continue; }

    // 水平線
    if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) { closeList(); closeBlockquote(); closeTable(); html.push('<hr>'); continue; }

    // テーブル
    if (trimmed.indexOf('|') !== -1 && trimmed.charAt(0) === '|') {
      closeList(); closeBlockquote();
      var cells = trimmed.split('|').filter(function(c,j,a){ return j > 0 && j < a.length - 1; });
      if (/^[\s|:-]+$/.test(trimmed)) continue; // separator 行
      if (!inTable) {
        html.push('<table><thead><tr>');
        cells.forEach(function(c) { html.push('<th>' + inlineFormat(c.trim()) + '</th>'); });
        html.push('</tr></thead><tbody>');
        inTable = true;
      } else {
        html.push('<tr>');
        cells.forEach(function(c) { html.push('<td>' + inlineFormat(c.trim()) + '</td>'); });
        html.push('</tr>');
      }
      continue;
    } else { closeTable(); }

    // 引用
    if (trimmed.charAt(0) === '>') {
      closeList(); closeTable();
      if (!inBlockquote) { html.push('<blockquote>'); inBlockquote = true; }
      html.push('<p>' + inlineFormat(trimmed.substring(1).trim()) + '</p>');
      continue;
    } else { closeBlockquote(); }

    // 番号付きリスト
    var olm = trimmed.match(/^(\d+)\.\s+(.*)$/);
    if (olm) {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ol') { closeList(); html.push('<ol>'); inList = true; listType = 'ol'; }
      html.push('<li>' + inlineFormat(olm[2]) + '</li>');
      continue;
    }

    // 箇条書き
    if (trimmed.charAt(0) === '-' && trimmed.charAt(1) === ' ') {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ul') { closeList(); html.push('<ul>'); inList = true; listType = 'ul'; }
      html.push('<li>' + inlineFormat(trimmed.substring(2)) + '</li>');
      continue;
    }

    // 通常段落
    closeList(); closeTable(); closeBlockquote();
    html.push('<p>' + inlineFormat(trimmed) + '</p>');
  }
  closeList(); closeTable(); closeBlockquote();

  document.getElementById('doc-content').innerHTML = html.join('\n');
})();
</script>

(function () {
  var themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      var r = document.documentElement;
      var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', next);
      themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
      try { localStorage.setItem('rd-portal-theme', next); } catch (e) {}
    });
  }
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch (e) {}
})();
</script>
