# 注文詳細 画面詳細設計書

## 関連資料（正の宣言）

| 正の種類 | ファイル | 本書との役割分担 |
|---|---|---|
| スタイル・数値（共通） | `../../プロジェクト共通/DESIGN.md` | 複数画面共通のデザイン値の正 |
| スタイル・数値（画面固有差分） | `./DESIGN.md` | 画面固有の差分の正。本書はキー名参照のみ |
| 共通仕様 | `../../プロジェクト共通/共通設計書.md` | システム共通仕様の正。本書は準拠状況と画面固有制約のみ |

## §1 画面概要

### 1.1 基本情報

| 項目 | 値 |
|---|---|
| 画面名 | 注文詳細 |
| 目的 | 個別注文の明細・配送先を確認し、ステータスを更新する |
| ルート | /orders/:id |
| 遷移元 | 注文一覧 |
| 遷移先 | 注文一覧（一覧へ戻る操作時） |

### 1.2 業務上の位置づけ

注文一覧から個別注文を選んだ後の確認・処理段階に位置し、ステータス更新によって後続の出荷業務や経理処理を進める役割を持つ。

---

## §2 機能一覧

### 2.1 機能一覧表

| キー | 機能名 | 概要 | 優先度 |
|---|---|---|---|
| 詳細-明細確認 | 注文明細確認 | 注文に含まれる商品・数量・単価を確認する | 必須 |
| 詳細-配送確認 | 配送先情報確認 | 配送先住所・配送方法を確認する | 必須 |
| 詳細-ステータス更新 | 注文ステータス更新 | 注文の進行状況を次の段階へ更新する | 必須 |

### 2.2 機能間の関係

ステータス更新は明細・配送先の確認が完了していることを前提として実行される想定であり、確認機能と更新機能は連続して利用される。

---

## §4 業務ルール（条件付き：業務モード・権限制御がある画面のみ）

### 4.1 業務モードと切替条件

| モード | 切替条件 | UI の変化 |
|---|---|---|
| 通常編集モード | ステータスが下書きまたは確定の場合 | ステータス更新操作を活性化する |
| 閲覧専用モード | ステータスが出荷済またはキャンセルの場合 | キャンセルへの更新操作を無効化する |

### 4.2 業務判断ポイント

現在のステータスによって次に選択できるステータス（確定・出荷済・キャンセル）が変化する。

### 4.3 業務フロー内の前後画面との関係

注文一覧から受注番号を受け取り表示する。更新完了後は一覧へ戻り、更新結果が反映された一覧を再表示する。

### 4.4 権限別の UI 制御

| ロール | ステータス更新実行ボタン | 配送先情報 |
|---|---|---|
| 出荷担当者 | 表示 | 表示 |
| 受注担当者 | 表示 | 表示 |

## §5 状態管理

### 5.1 URL パラメータ

| パラメータ名 | 型 | 必須 | 用途 |
|---|---|---|---|
| id | 文字列 | ○ | 表示対象の注文を受注番号で特定する |

### 5.2 セッション・ストレージ参照

| キー名 | 種別 | 用途 |
|---|---|---|
| order-list-last-search | session | 一覧へ戻る際に直前の検索条件を復元する |

### 5.3 メイン画面の状態変数

| 変数名 | 型 | 初期値 | 役割 |
|---|---|---|---|
| order | 注文詳細レコード | 空値 | 表示中の注文の全項目を保持する |
| selectedNextStatus | 文字列 | 空文字 | ステータス更新操作で選択された遷移先を保持する |
| updateComment | 文字列 | 空文字 | ステータス更新時の備考入力値を保持する |
| isSubmitting | 真偽値 | 偽 | ステータス更新API呼び出し中かどうかを保持する |
| statusHistory | ステータス変更履歴の配列 | 空配列 | ステータス変更履歴を保持する |

### 5.4 サブコンポーネントの状態変数

| コンポーネント | 変数名 | 型 | 役割 |
|---|---|---|---|
| StatusUpdatePanel | isConfirmDialogOpen | 真偽値 | 更新確認ダイアログの表示状態を保持する |

### 5.5 派生値（計算値）

| 派生値名 | 算出ロジック概要 | 依存する状態変数 |
|---|---|---|
| availableNextStatuses | order.status を起点に遷移可能な次ステータスの一覧を算出する | order |
| isEditable | order.status が下書きまたは確定かどうかを判定する | order |

### 5.6 画面専用ストア（永続化）

該当なし（画面固有の永続化なし）

### 5.7 共有ストア参照

| ストア / コンテキスト | 参照キー | 用途 |
|---|---|---|
| AuthContext | userRole | 出荷担当者・受注担当者の権限区分を判定する |

### 5.8 検索条件更新関数

該当なし

### 5.9 初期値・デフォルト値一覧

| 変数名 | 初期値 | 根拠 |
|---|---|---|
| selectedNextStatus | 空文字 | 更新操作前は未選択状態から開始する業務要件のため |
| isSubmitting | 偽 | 画面表示直後は更新処理中ではないため |

## §6 データフロー

### 6.1 初期表示シーケンス

1. URL パラメータ取得（受注番号）
2. ストア初期化（AuthContext から利用者権限を取得）
3. API 呼び出し（§7 参照）
4. データ変換（§6.5 参照）
5. 画面状態を ready に更新

#### 6.1.1 起動時初期化（URL パラメータ → ストア書き戻し）

id パラメータを受注番号として order 取得APIの呼び出し引数に用いる。ストアへの書き戻しは行わない。

### 6.2 依存連鎖

order.status が変化すると availableNextStatuses が再算出される。

## §16 要確認事項一覧

<script>
(function () {
  var src = document.getElementById('doc-md').textContent;

  // frontmatter 除去
  src = src.replace(/^\s*---[\s\S]*?---\s*/, '');

  var lines = src.split('\n');
  var html = [];
  var inTable = false;
  var inList = false;
  var listType = '';
  var inBlockquote = false;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function inlineFormat(s) {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/!\[([^\]]*)\]\(([^()\s]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');
    s = s.replace(/\[([^\]]+)\]\(([^()\s]+)\)/g, '<a href="$2">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }

  function closeList() {
    if (inList) { html.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }
  }
  function closeBlockquote() {
    if (inBlockquote) { html.push('</blockquote>'); inBlockquote = false; }
  }
  function closeTable() {
    if (inTable) { html.push('</tbody></table>'); inTable = false; }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var trimmed = line.trim();

    // 空行
    if (!trimmed) { closeList(); closeBlockquote(); continue; }

    // 見出し
    var hm = trimmed.match(/^(#{1,6})\s+(.*)$/);
    if (hm) { closeList(); closeBlockquote(); closeTable(); var lv = hm[1].length; html.push('<h' + lv + '>' + inlineFormat(hm[2]) + '</h' + lv + '>'); continue; }

    // 水平線
    if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) { closeList(); closeBlockquote(); closeTable(); html.push('<hr>'); continue; }

    // テーブル
    if (trimmed.indexOf('|') !== -1 && trimmed.charAt(0) === '|') {
      closeList(); closeBlockquote();
      var cells = trimmed.split('|').filter(function(c,j,a){ return j > 0 && j < a.length - 1; });
      if (/^[\s|:-]+$/.test(trimmed)) continue; // separator 行
      if (!inTable) {
        html.push('<table><thead><tr>');
        cells.forEach(function(c) { html.push('<th>' + inlineFormat(c.trim()) + '</th>'); });
        html.push('</tr></thead><tbody>');
        inTable = true;
      } else {
        html.push('<tr>');
        cells.forEach(function(c) { html.push('<td>' + inlineFormat(c.trim()) + '</td>'); });
        html.push('</tr>');
      }
      continue;
    } else { closeTable(); }

    // 引用
    if (trimmed.charAt(0) === '>') {
      closeList(); closeTable();
      if (!inBlockquote) { html.push('<blockquote>'); inBlockquote = true; }
      html.push('<p>' + inlineFormat(trimmed.substring(1).trim()) + '</p>');
      continue;
    } else { closeBlockquote(); }

    // 番号付きリスト
    var olm = trimmed.match(/^(\d+)\.\s+(.*)$/);
    if (olm) {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ol') { closeList(); html.push('<ol>'); inList = true; listType = 'ol'; }
      html.push('<li>' + inlineFormat(olm[2]) + '</li>');
      continue;
    }

    // 箇条書き
    if (trimmed.charAt(0) === '-' && trimmed.charAt(1) === ' ') {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ul') { closeList(); html.push('<ul>'); inList = true; listType = 'ul'; }
      html.push('<li>' + inlineFormat(trimmed.substring(2)) + '</li>');
      continue;
    }

    // 通常段落
    closeList(); closeTable(); closeBlockquote();
    html.push('<p>' + inlineFormat(trimmed) + '</p>');
  }
  closeList(); closeTable(); closeBlockquote();

  document.getElementById('doc-content').innerHTML = html.join('\n');
})();
</script>

(function () {
  var themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      var r = document.documentElement;
      var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', next);
      themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
      try { localStorage.setItem('rd-portal-theme', next); } catch (e) {}
    });
  }
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch (e) {}
})();
</script>
