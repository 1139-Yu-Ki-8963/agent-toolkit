  :root,
[data-theme="light"] {
  /* Windows フォント上書き防止 */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-synthesis: none;
  --bg: #FFFFFF;
  --panel: #FFFFFF;
  --panel-2: #F6F8FA;
  --border: #D1D9E0;
  --border-strong: #AFB8C1;
  --text: #1B1F26;
  --text-sub: #4A4F58;
  --text-muted: #767B85;
  --accent: #0969DA;
  --accent-2: #218BFF;
  --accent-soft: #DDF4FF;
  --accent-border: #54AEFF;
  --gold: #BC4C00;
  --gold-soft: #FFF1E5;
  --gold-border: #D18A5A;
  --success: #1A7F37;
  --success-soft: #DAFBE1;
  --warn: #BC4C00;
  --danger: #CF222E;
  --danger-soft: #FFEBE9;
  --highlight: #D97B1A;
  --highlight-soft: rgba(217,123,26,0.12);
  --highlight-border: rgba(217,123,26,0.5);
  --nav-tag: #7B8BBF;
  --nav-tag-soft: #ECEEF6;
  --self-tag: #6B9B6B;
  --self-tag-soft: #E8F0E8;
  --code-bg: #1B1F26;
  --code-fg: #E8E5DC;
  --cat-list: #2563eb;
  --cat-common: #059669;
  --cat-project: #7C3AED;
  --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
  --mono: "SFMono-Regular","Menlo","Cascadia Code","Consolas",monospace;
  --shadow-sm: 0 1px 3px rgba(27,31,38,.07), 0 2px 6px rgba(27,31,38,.05);
  --shadow-md: 0 2px 8px rgba(27,31,38,.09), 0 8px 24px rgba(27,31,38,.07);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
    --border: #30363D; --border-strong: #484F58;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
    --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
    --success: #3FB950; --success-soft: #0D2818;
    --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
    --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5);
    --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15);
    --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15);
    --code-bg: #0E1116; --code-fg: #E8E5DC;
    --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
  }
}
[data-theme="dark"] {
  --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
  --border: #30363D; --border-strong: #484F58;
  --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
  --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
  --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
  --success: #3FB950; --success-soft: #0D2818;
  --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
  --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5);
  --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15);
  --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15);
  --code-bg: #0E1116; --code-fg: #E8E5DC;
  --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
}


  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20; vertical-align: middle; }

  /* viewport-fit layout */
  .dp-page { display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }

  /* topbar */
  .topbar {
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 24px; padding: 12px 20px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); text-decoration: none; }
  .brand:hover { text-decoration: none; color: var(--accent); }
  .brand-icon { display: inline-flex; align-items: center; }
  .brand-title { font-weight: 700; font-size: 16px; }
  .brand-sub { font-size: 11px; color: var(--text-muted); }
  .header-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .top-actions { display: flex; align-items: center; gap: 8px; }
  .top-actions button {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }

  /* body: sidebar + main */
  .dp-body { display: flex; min-height: 0; overflow: hidden; }

  /* sidebar */
  .dp-sidebar {
    width: 220px; flex-shrink: 0;
    overflow-y: auto; padding: 16px 0 16px 16px;
    border-right: 1px solid var(--border);
    background: var(--panel);
  }
  .toc-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    color: var(--text-muted); padding: 0 10px; margin-bottom: 8px;
  }
  .toc-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 1px; }
  .toc-link {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: var(--radius-sm);
    text-decoration: none; color: var(--text-sub); font-size: 13px; font-weight: 450;
    transition: background .15s, color .15s;
  }
  .toc-link:hover { background: var(--panel-2); color: var(--text); text-decoration: none; }
  .toc-link.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .toc-link .material-symbols-outlined { font-size: 16px; }

  /* main content */
  .dp-main {
    flex: 1; min-width: 0;
    overflow-y: auto; min-height: 0;
    padding: 24px 32px 64px;
  }
  .dp-inner { max-width: 800px; }

  .doc-crumbs { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .doc-crumbs a { color: var(--text-sub); }
  .doc-crumbs a:hover { color: var(--accent); }

  /* screen doc タブナビ（基本設計 / 詳細設計 / シーケンス図） */
  .doc-nav {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    margin: 0 0 16px; border-bottom: 2px solid var(--border);
  }
  .doc-nav .back-link { margin-right: auto; font-size: 12px; color: var(--text-sub); text-decoration: none; }
  .doc-nav .back-link:hover { color: var(--accent); text-decoration: none; }
  .doc-tab {
    padding: 5px 16px; border: 1px solid var(--border); border-bottom: none;
    border-radius: 6px 6px 0 0; font-size: 13px; text-decoration: none; color: var(--text-sub);
    background: var(--panel);
  }
  .doc-tab:hover { text-decoration: none; color: var(--accent); }
  .doc-tab.active { color: var(--accent); font-weight: 700; border-color: var(--accent); background: var(--bg); }

  .dp-hero {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    padding: 4px 2px 14px; border-bottom: 1px solid var(--border); margin-bottom: 24px; flex-wrap: wrap;
  }
  .dp-hero h1 { font-size: 23px; margin: 0; }
  .dp-hero-desc { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 0; }
  .dp-updated {
    font-size: 12px; color: var(--text-sub); background: var(--accent-soft);
    border: 1px solid var(--accent-border); border-radius: 999px; padding: 3px 12px; white-space: nowrap;
  }

  /* section */
  .sec-block { margin-bottom: 28px; }
  .sec-label {
    font-size: 12px; font-weight: 700; letter-spacing: .04em; color: var(--text-sub);
    display: flex; align-items: center; gap: 8px; margin: 0 0 12px;
  }
  .sec-label::before { content: ""; width: 4px; height: 14px; border-radius: 2px; }
  .sec-label[data-color="accent"]::before { background: var(--accent); }
  .sec-label[data-color="success"]::before { background: var(--success); }
  .sec-label[data-color="gold"]::before { background: var(--gold); }
  .sec-label[data-color="danger"]::before { background: var(--danger); }
  .sec-label[data-color="highlight"]::before { background: var(--highlight); }

  /* baseline prose（セクション固有クラスの対象外になる見出し・段落・引用・区切り線） */
  #doc-content h3 { font-size: 1.05rem; margin: 20px 0 8px; color: var(--text); }
  #doc-content h4 { font-size: 0.95rem; margin: 16px 0 6px; color: var(--text-sub); }
  #doc-content p { margin: 8px 0; font-size: 13.5px; color: var(--text-sub); line-height: 1.65; }
  #doc-content ul, #doc-content ol { padding-left: 22px; margin: 8px 0; font-size: 13.5px; color: var(--text-sub); }
  #doc-content li { margin: 4px 0; }
  #doc-content img { max-width: 100%; border-radius: var(--radius-sm); }
  #doc-content code {
    background: var(--code-bg); color: var(--code-fg); padding: 1px 6px;
    border-radius: 4px; font-family: var(--mono); font-size: 0.85em;
  }
  #doc-content blockquote {
    border-left: 3px solid var(--accent-border); margin: 12px 0; padding: 8px 16px;
    background: var(--panel-2); color: var(--text-sub); font-size: 0.95rem; border-radius: var(--radius-sm);
  }
  #doc-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* rule items */
  .rule-list { display: flex; flex-direction: column; gap: 6px; list-style: none; padding-left: 0; }
  .rule-item {
    display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px;
    background: var(--panel-2); border-radius: var(--radius-sm); font-size: 13.5px; line-height: 1.6;
  }
  .rule-item .material-symbols-outlined { font-size: 18px; margin-top: 2px; flex-shrink: 0; }
  .rule-item code {
    background: var(--code-bg); color: var(--code-fg); padding: 1px 5px;
    border-radius: 3px; font-family: var(--mono); font-size: .85em;
  }

  /* tables */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); margin-bottom: 14px; }
  table.data-table {
    width: 100%; min-width: 400px; border-collapse: collapse; font-size: 13px;
    background: var(--panel); border: 1px solid var(--border);
  }
  table.data-table thead { position: sticky; top: 0; z-index: 1; }
  table.data-table th {
    text-align: left; font-size: 11.5px; font-weight: 700; color: var(--text-sub);
    background: var(--panel-2); padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  table.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.data-table tr:last-child td { border-bottom: none; }
  table.data-table code {
    background: var(--code-bg); color: var(--code-fg); padding: 1px 5px; border-radius: 3px;
    font-family: var(--mono); font-size: 11.5px;
  }

  /* code blocks（手動で span を書いた場合にのみ配色が効く。MD パーサーは自動適用しない） */
  .code-block { border-radius: var(--radius-sm); overflow: hidden; background: var(--code-bg); margin-bottom: 14px; }
  .code-block-head {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; font-size: 11px; font-weight: 600;
    color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,.06);
    letter-spacing: .03em;
  }
  .code-block pre {
    margin: 0; padding: 12px 14px; overflow-x: auto;
    font-family: var(--mono); font-size: 12.5px; line-height: 1.65; color: var(--code-fg);
  }
  .code-block .kw { color: #CBA6F7; }
  .code-block .fn { color: #89B4FA; }
  .code-block .str { color: #A6E3A1; }
  .code-block .num { color: #FAB387; }
  .code-block .cm { color: #6C7086; font-style: italic; }
  .code-block .op { color: #89DCEB; }
  .code-block .type { color: #F9E2AF; }

  /* callout */
  .callout {
    display: flex; gap: 8px; padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 12.5px; line-height: 1.6; margin-bottom: 14px;
  }
  .callout .material-symbols-outlined { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .callout strong { font-weight: 600; }
  .callout-tip { background: var(--success-soft); border: 1px solid var(--success); }
  .callout-tip .material-symbols-outlined { color: var(--success); }
  .callout-warn { background: var(--gold-soft); border: 1px solid var(--gold-border); }
  .callout-warn .material-symbols-outlined { color: var(--gold); }
  .callout-err { background: var(--danger-soft); border: 1px solid var(--danger); }
  .callout-err .material-symbols-outlined { color: var(--danger); }

  /* mobile toc toggle */
  .toc-toggle {
    display: none; position: fixed; bottom: 16px; right: 16px; z-index: 60;
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--panel); box-shadow: var(--shadow-md);
    cursor: pointer; color: var(--text); align-items: center; justify-content: center;
  }

  .footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
    display: flex; gap: 20px; justify-content: center;
  }

  @media (max-width: 760px) {
    .dp-sidebar { display: none; }
    .dp-sidebar.open {
      display: block; position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
      background: var(--panel); z-index: 55; border-right: 1px solid var(--border);
      box-shadow: var(--shadow-md); padding: 60px 16px 16px;
    }
    .toc-toggle { display: flex; }
    .dp-main { padding: 16px 14px 48px; }
    .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
  }
  @media (max-width: 480px) {
    .dp-hero h1 { font-size: 20px; }
  }
</style>
</head>

# 注文一覧 画面詳細設計書

## 関連資料（正の宣言）

| 正の種類 | ファイル | 本書との役割分担 |
|---|---|---|
| スタイル・数値（共通） | `../../プロジェクト共通/DESIGN.md` | 複数画面共通のデザイン値の正 |
| スタイル・数値（画面固有差分） | `./DESIGN.md` | 画面固有の差分の正。本書はキー名参照のみ |
| 共通仕様 | `../../プロジェクト共通/共通設計書.md` | システム共通仕様の正。本書は準拠状況と画面固有制約のみ |
| 文言 | `../../プロジェクト共通/メッセージ定義書.md` | 文言の正。本書はメッセージ ID で参照 |
| テスト観点 | `./単体テスト観点表.md` / `./結合テスト観点表.md` | テスト観点・受け入れ条件の正。本書に含めない |
| 単体テストケース | `../テスト項目書/単体テスト仕様書.md`（任意） | 具体的な入力値・アサーションの設計時契約。実装後はテストコードが正 |
| 結合テストケース | `../テスト項目書/結合テスト仕様書.md`（任意） | 具体的な操作手順・入力値・アサーションの設計時契約。実装後はテストコードが正 |

## 章マップ

| 役割キー | § | 章名 | 区分 | 正 | 実装後の扱い | 保守方式 |
|---|---|---|---|---|---|---|
| 画面概要 | §1 | 画面概要 | 必須 | 本書 | 維持 | 手 |
| 機能一覧 | §2 | 機能一覧 | 必須 | 本書 | 維持 | 手 |
| 画面構造 | §3 | 画面構造 | 必須 | 本書（§3.6 の数値は DESIGN.md） | 維持 | 生成 |
| 業務ルール | §4 | 業務ルール | 条件付き | 本書 | 維持 | 手 |
| 状態管理 | §5 | 状態管理 | 必須 | 本書 | 維持 | 生成 |
| データフロー | §6 | データフロー | 必須 | 本書 | 維持 | 生成 |
| API通信 | §7 | API 通信仕様 | 条件付き | API 定義書（本書は画面固有の使い方のみ） | 維持 | 生成 |
| イベント処理 | §8 | イベント処理 | 必須 | 本書 | 維持 | 生成 |
| 領域別仕様 | §9 | 領域別仕様 | 必須 | 本書 | 維持 | 混在 |
| 定数設定値 | §10 | 定数・設定値 | 条件付き | 設計時は本書 → 実装後は実装コード | 実装ファイルのパス参照に置換 | 混在 |
| エラーハンドリング | §11 | エラーハンドリング | 必須 | 本書 | 維持 | 混在 |

## §1 画面概要

### 1.1 基本情報

| 項目 | 値 |
|---|---|
| 画面名 | 注文一覧 |
| 目的 | 受注担当者が注文を検索・絞り込みし、詳細確認やCSV出力につなげる |
| ルート | /orders |
| 遷移元 | なし（起点画面） |
| 遷移先 | 注文詳細（行クリック時） |

### 1.2 業務上の位置づけ

受注業務フローの起点となる画面であり、受注担当者は本画面から日々の注文状況を把握し、個別の詳細確認や経理向けのCSV出力へ進む。

## §2 機能一覧

### 2.1 機能一覧表

| キー | 機能名 | 概要 | 優先度 |
|---|---|---|---|
| 検索-絞り込み | 注文検索 | 受注番号・顧客名・ステータス・期間で一覧を絞り込む | 必須 |
| 一覧-csv出力 | CSV出力 | 絞り込み結果をCSV形式でダウンロードする | 必須 |
| 一覧-詳細遷移 | 詳細画面遷移 | 行クリックで注文詳細画面へ遷移する | 必須 |

### 2.2 機能間の関係

CSV出力は検索・絞り込みの結果に対して実行されるため、検索条件が確定してから出力操作が有効になる。

## §5 状態管理

### 5.1 URL パラメータ

| パラメータ名 | 型 | 必須 | 用途 |
|---|---|---|---|
| status | 文字列 | △ | ステータス絞り込み条件を URL 経由で復元する |
| dateFrom | 文字列（日付） | △ | 注文期間の開始日を URL 経由で復元する |
| dateTo | 文字列（日付） | △ | 注文期間の終了日を URL 経由で復元する |

### 5.2 セッション・ストレージ参照

| キー名 | 種別 | 用途 |
|---|---|---|
| order-list-last-search | session | 直前の検索条件を一覧再訪時に復元する |

### 5.3 メイン画面の状態変数

| 変数名 | 型 | 初期値 | 役割 |
|---|---|---|---|
| searchKeyword | 文字列 | 空文字 | 受注番号・顧客名の検索キーワードを保持する |
| statusFilter | 文字列 | 空文字（全件） | 絞り込み対象のステータス区分を保持する |
| orders | 注文レコードの配列 | 空配列 | 検索結果の注文一覧を保持する |
| isLoading | 真偽値 | 偽 | 検索実行中かどうかを保持する |
| currentPage | 数値 | 1 | 表示中のページ番号を保持する |

### 5.4 サブコンポーネントの状態変数

| コンポーネント | 変数名 | 型 | 役割 |
|---|---|---|---|
| OrderSearchForm | dateRange | 開始日・終了日を持つ組 | 期間絞り込みの入力値を保持する |

### 5.5 派生値（計算値）

| 派生値名 | 算出ロジック概要 | 依存する状態変数 |
|---|---|---|
| totalCount | orders の件数を集計する | orders |
| hasCancelledRow | orders の中にキャンセル状態が含まれるか判定する | orders |

### 5.6 画面専用ストア（永続化）

該当なし（画面固有の永続化なし）

### 5.7 共有ストア参照

| ストア / コンテキスト | 参照キー | 用途 |
|---|---|---|
| AuthContext | userRole | 経理権限の有無を判定しCSV出力ボタンの表示可否を決める |

### 5.8 検索条件更新関数

updateSearchCondition(条件差分) — 引数に渡した項目のみ現在の検索条件へマージし、ページ番号を1に戻したうえで再検索を行う。

### 5.9 初期値・デフォルト値一覧

| 変数名 | 初期値 | 根拠 |
|---|---|---|
| currentPage | 1 | 一覧は常に1ページ目から開始する業務要件のため |
| statusFilter | 空文字（全件） | 初期表示では全ステータスを対象とする業務要件のため |

## §6 データフロー

### 6.1 初期表示シーケンス

1. URL パラメータ取得
2. ストア初期化（AuthContext から利用者権限を取得）
3. API 呼び出し（§7 参照）
4. データ変換（§6.5 参照）
5. 画面状態を ready に更新

#### 6.1.1 起動時初期化（URL パラメータ → ストア書き戻し）

status・dateFrom・dateTo の各 URL パラメータを searchKeyword 以外の検索条件ストアへ書き戻す。

### 6.2 依存連鎖

statusFilter が変化すると orders の再取得が発生する。

### 6.3 ユーザー操作確定時の処理フロー

1. バリデーション（§11 参照）
2. 確認ダイアログ表示（該当なし）
3. API 呼び出し
4. 成功時: 一覧を更新
5. 失敗時: エラー表示（§11 参照）

### 6.4 データ更新トリガーの分類

| トリガー | 種別 | 処理概要 |
|---|---|---|
| 検索実行ボタン押下 | ユーザー操作 | 現在の検索条件で注文一覧を再取得する |
| CSV出力ボタン押下 | ユーザー操作 | 現在の検索条件でCSV生成APIを呼び出す |

### 6.5 データ変換（API レスポンス → 画面表示用データ）

| 変換名 | 入力型 | 出力型 | 変換概要 |
|---|---|---|---|
| formatOrderRow | 注文APIレスポンス | 一覧表示用の注文行 | 金額を3桁区切り文字列へ、ステータスコードを表示ラベルへ変換する |

### 6.6 画面状態の遷移

| 状態 | 遷移条件 | UI の表示 |
|---|---|---|
| loading | 初期表示・再取得中 | ローディング表示 |
| empty | データ 0 件 | 空状態メッセージ |
| error | API エラー | エラーメッセージ（§11 参照） |
| ready | データ取得成功 | メインコンテンツ |

<script>
(function () {
  var src = document.getElementById('doc-md').textContent;

  // frontmatter 除去
  src = src.replace(/^\s*---[\s\S]*?---\s*/, '');

  var lines = src.split('\n');
  var html = [];
  var inTable = false;
  var inList = false;
  var listType = '';
  var inBlockquote = false;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function inlineFormat(s) {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/!\[([^\]]*)\]\(([^()\s]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');
    s = s.replace(/\[([^\]]+)\]\(([^()\s]+)\)/g, '<a href="$2">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }

  function closeList() {
    if (inList) { html.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }
  }
  function closeBlockquote() {
    if (inBlockquote) { html.push('</blockquote>'); inBlockquote = false; }
  }
  function closeTable() {
    if (inTable) { html.push('</tbody></table></div>'); inTable = false; }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var trimmed = line.trim();

    // 空行
    if (!trimmed) { closeList(); closeBlockquote(); continue; }

    // 見出し
    var hm = trimmed.match(/^(#{1,6})\s+(.*)$/);
    if (hm) { closeList(); closeBlockquote(); closeTable(); var lv = hm[1].length; html.push('<h' + lv + '>' + inlineFormat(hm[2]) + '</h' + lv + '>'); continue; }

    // 水平線
    if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) { closeList(); closeBlockquote(); closeTable(); html.push('<hr>'); continue; }

    // テーブル
    if (trimmed.indexOf('|') !== -1 && trimmed.charAt(0) === '|') {
      closeList(); closeBlockquote();
      var cells = trimmed.split('|').filter(function(c,j,a){ return j > 0 && j < a.length - 1; });
      if (/^[\s|:-]+$/.test(trimmed)) continue; // separator 行
      if (!inTable) {
        html.push('<div class="table-wrap"><table><thead><tr>');
        cells.forEach(function(c) { html.push('<th>' + inlineFormat(c.trim()) + '</th>'); });
        html.push('</tr></thead><tbody>');
        inTable = true;
      } else {
        html.push('<tr>');
        cells.forEach(function(c) { html.push('<td>' + inlineFormat(c.trim()) + '</td>'); });
        html.push('</tr>');
      }
      continue;
    } else { closeTable(); }

    // 引用
    if (trimmed.charAt(0) === '>') {
      closeList(); closeTable();
      if (!inBlockquote) { html.push('<blockquote>'); inBlockquote = true; }
      html.push('<p>' + inlineFormat(trimmed.substring(1).trim()) + '</p>');
      continue;
    } else { closeBlockquote(); }

    // 番号付きリスト
    var olm = trimmed.match(/^(\d+)\.\s+(.*)$/);
    if (olm) {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ol') { closeList(); html.push('<ol>'); inList = true; listType = 'ol'; }
      html.push('<li>' + inlineFormat(olm[2]) + '</li>');
      continue;
    }

    // 箇条書き
    if (trimmed.charAt(0) === '-' && trimmed.charAt(1) === ' ') {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ul') { closeList(); html.push('<ul>'); inList = true; listType = 'ul'; }
      html.push('<li>' + inlineFormat(trimmed.substring(2)) + '</li>');
      continue;
    }

    // 通常段落
    closeList(); closeTable(); closeBlockquote();
    html.push('<p>' + inlineFormat(trimmed) + '</p>');
  }
  closeList(); closeTable(); closeBlockquote();

  document.getElementById('doc-content').innerHTML = html.join('\n');

  // --- 拡張: h1 をヒーローへ、h2 をセクションブロック化 + 目次生成、テーブル/リストの装飾付与 ---
  (function enhance() {
    var container = document.getElementById('doc-content');
    var heroTitle = document.getElementById('dp-hero-title');
    var tocList = document.getElementById('toc-list');
    var colors = ['accent', 'success', 'gold', 'danger', 'highlight', 'accent'];

    // 最初の h1 はヒーローへ移し、本文からは除去する
    var h1 = container.querySelector('h1');
    if (h1) {
      heroTitle.textContent = h1.textContent;
      h1.parentNode.removeChild(h1);
    }

    // テーブルに data-table クラスを付与（sticky thead は CSS 側で対応済み）
    Array.prototype.forEach.call(container.querySelectorAll('table'), function (t) {
      t.classList.add('data-table');
    });

    // h2 ごとにセクションブロック化 + 目次エントリを生成
    var h2s = Array.prototype.slice.call(container.querySelectorAll('h2'));
    h2s.forEach(function (h2, idx) {
      var text = h2.textContent;
      var id = 'sec-' + text.trim();
      var color = colors[idx % colors.length];

      var section = document.createElement('section');
      section.className = 'sec-block';
      section.id = id;

      var label = document.createElement('div');
      label.className = 'sec-label';
      label.setAttribute('data-color', color);
      label.textContent = text;
      section.appendChild(label);

      h2.parentNode.insertBefore(section, h2);
      var node = h2.nextSibling;
      h2.parentNode.removeChild(h2);
      while (node && !(node.nodeType === 1 && node.tagName === 'H2')) {
        var next = node.nextSibling;
        section.appendChild(node);
        node = next;
      }

      // セクション直下（トップレベル）の ul のみをチェックリスト装飾する。入れ子リストは変換しない
      Array.prototype.forEach.call(section.children, function (child) {
        if (child.tagName === 'UL') {
          child.classList.add('rule-list');
          Array.prototype.forEach.call(child.children, function (li) {
            if (li.tagName !== 'LI') return;
            li.classList.add('rule-item');
            var icon = document.createElement('span');
            icon.className = 'material-symbols-outlined';
            icon.style.color = 'var(--' + color + ')';
            icon.textContent = 'check_circle';
            var content = document.createElement('div');
            while (li.firstChild) content.appendChild(li.firstChild);
            li.appendChild(icon);
            li.appendChild(content);
          });
        }
      });

      var li = document.createElement('li');
      var a = document.createElement('a');
      a.className = 'toc-link';
      a.href = '#' + id;
      a.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;color:var(--' + color + ')">article</span>' + text;
      li.appendChild(a);
      tocList.appendChild(li);
    });

    var firstLink = tocList.querySelector('.toc-link');
    if (firstLink) firstLink.classList.add('active');
  })();
})();
</script>

<script>
(function(){
  var links = document.querySelectorAll('.toc-link');
  var sections = document.querySelectorAll('.sec-block');
  var mainEl = document.getElementById('main-scroll');

  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        links.forEach(function(l){l.classList.remove('active')});
        var a = document.querySelector('.toc-link[href="#'+e.target.id+'"]');
        if(a) a.classList.add('active');
      }
    });
  },{root: mainEl, rootMargin:'-10% 0px -80% 0px'});
  sections.forEach(function(s){observer.observe(s)});

  links.forEach(function(l){
    l.addEventListener('click',function(e){
      e.preventDefault();
      var t = document.querySelector(this.getAttribute('href'));
      if(t) t.scrollIntoView({behavior:'smooth',block:'start'});
      var sb = document.getElementById('sidebar');
      if (sb) sb.classList.remove('open');
    });
  });

  var tocToggle = document.getElementById('tocToggle');
  if (tocToggle) {
    tocToggle.addEventListener('click',function(){
      var sb = document.getElementById('sidebar');
      if (sb) sb.classList.toggle('open');
    });
  }

  var themeBtn = document.getElementById('theme-toggle');
  var themeIcon = document.getElementById('theme-icon');
  var themeLabel = document.getElementById('theme-label');
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      var r = document.documentElement;
      var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', next);
      if (themeLabel) themeLabel.textContent = next === 'dark' ? 'ダーク' : 'ライト';
      if (themeIcon) themeIcon.textContent = next === 'dark' ? 'dark_mode' : 'light_mode';
      try { localStorage.setItem('rd-portal-theme', next); } catch (e) {}
    });
  }
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      if (themeLabel) themeLabel.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
      if (themeIcon) themeIcon.textContent = saved === 'dark' ? 'dark_mode' : 'light_mode';
    }
  } catch (e) {}
})();
</script>
