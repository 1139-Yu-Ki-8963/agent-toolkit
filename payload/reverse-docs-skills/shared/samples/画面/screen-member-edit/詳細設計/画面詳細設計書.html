## §1 画面概要

### 1.1 基本情報

| 項目 | 値 |
|---|---|
| 画面名 | 会員編集 |
| 目的 | 会員の登録情報を修正し、会員状態（有効・休会・退会）を切り替える |
| ルート | /members/:id/edit |
| 遷移元 | 会員一覧 |
| 遷移先 | 会員詳細（保存操作完了時）、会員一覧（削除完了時または戻る操作時） |

### 1.2 業務上の位置づけ

会員管理業務における会員情報の維持・更新工程の中核画面であり、会員からの申告内容の反映と会員状態の切り替えを一元的に担う。

---

## §2 機能一覧

### 2.1 機能一覧表

| キー | 機能名 | 概要 | 優先度 |
|---|---|---|---|
| 会員情報-編集保存 | 会員情報編集 | 氏名・連絡先・住所・会員区分を編集して保存する | 必須 |
| 会員状態-変更 | 会員状態変更 | 会員状態を有効・休会・退会の間で切り替える | 必須 |
| 会員-削除退会 | 会員削除 | 退会確定済みの会員情報を削除する | 必須 |
| 編集内容-下書き保持 | 編集内容の自動下書き保持 | 保存前の入力内容をブラウザに保持し、再訪時に復元する | 任意 |

### 2.2 機能間の関係

会員削除は会員状態が退会である場合にのみ活性化する。会員状態変更（退会への変更）が先行条件となる直列の依存関係を持つ。

## §4 業務ルール（条件付き：業務モード・権限制御がある画面のみ）

### 4.1 業務モードと切替条件

| モード | 切替条件 | UI の変化 |
|---|---|---|
| 通常編集モード | 会員状態が有効または休会 | 全入力欄が編集可能 |
| 退会済み閲覧モード | 会員状態が退会 | 連絡先入力欄が読み取り専用になり、削除ボタンが活性化する |

### 4.2 業務判断ポイント

会員状態を退会へ変更する操作は、出荷待ち注文の有無によって確認ダイアログの文言が分岐する。出荷待ち注文がある場合は注文キャンセルを促す警告を追加表示する。

### 4.3 業務フロー内の前後画面との関係

会員一覧から選択された会員番号を受け取り、保存完了後は更新済みの会員情報を伴って会員詳細へ引き継ぐ。

### 4.4 権限別の UI 制御

| ロール | 保存 | 削除 |
|---|---|---|
| 会員管理担当者 | 表示 | 非表示 |
| 会員管理責任者 | 表示 | 表示 |

## §5 状態管理

### 5.1 URL パラメータ

| パラメータ名 | 型 | 必須 | 用途 |
|---|---|---|---|
| id | string | ○ | 編集対象の会員番号を特定する |

### 5.2 セッション・ストレージ参照

| キー名 | 種別 | 用途 |
|---|---|---|
| member-edit-draft-{id} | local | 保存前の入力内容を下書きとして保持し、再訪時に復元する |

### 5.3 メイン画面の状態変数

| 変数名 | 型 | 初期値 | 役割 |
|---|---|---|---|
| memberForm | object | APIから取得した会員情報 | 氏名・連絡先・会員区分・会員状態の編集対象値を保持する |
| isSaving | boolean | false | 保存API呼び出し中のボタン多重押下を防止する |
| isDeleteConfirmOpen | boolean | false | 削除確認ダイアログの表示状態を保持する |
| validationErrors | object | 空オブジェクト | 入力チェックで検出したエラー内容を項目単位で保持する |
| pendingStatusChange | string または null | null | 会員状態変更の確認待ち値を一時保持する |

### 5.4 サブコンポーネントの状態変数

| コンポーネント | 変数名 | 型 | 役割 |
|---|---|---|---|
| DeleteConfirmDialog | isOutstandingOrderChecked | boolean | 出荷待ち注文の有無確認済みフラグを保持する |

### 5.5 派生値（計算値）

| 派生値名 | 算出ロジック概要 | 依存する状態変数 |
|---|---|---|
| isDeleteEnabled | 会員状態が退会かつ出荷待ち注文が0件のとき true | memberForm, pendingStatusChange |
| isSaveEnabled | 必須項目がすべて入力済みかつバリデーションエラーが0件のとき true | memberForm, validationErrors |

### 5.6 画面専用ストア（永続化）

該当なし（画面固有の永続化なし。下書き保持は §5.2 のローカルストレージ参照で完結する）

### 5.7 共有ストア参照

該当なし（他画面と共有するストア参照は使用しない）

### 5.8 検索条件更新関数

該当なし

### 5.9 初期値・デフォルト値一覧

| 変数名 | 初期値 | 根拠 |
|---|---|---|
| isSaving | false | 画面表示直後は保存操作が発生していないため |
| validationErrors | 空オブジェクト | 画面表示直後は未入力チェック未実施のため |

## §6 データフロー

### 6.1 初期表示シーケンス

1. URL パラメータ（会員番号）取得
2. ローカルストレージの下書き有無を確認
3. 会員情報取得APIを呼び出す（§7参照）
4. 取得結果を編集フォーム用データへ変換（§6.5参照）
5. 画面状態をreadyに更新

#### 6.1.1 起動時初期化（URL パラメータ → ストア書き戻し）

該当なし（URL 状態同期なし。会員番号は取得APIの引数としてのみ使用する）

### 6.2 依存連鎖

該当なし（独立したデータ取得のみ）

### 6.3 ユーザー操作確定時の処理フロー

1. バリデーション（§11参照）
2. 確認ダイアログ表示（会員状態を退会に変更する場合、または削除操作の場合）
3. 保存APIまたは削除APIを呼び出す
4. 成功時: 会員詳細または会員一覧へ遷移
5. 失敗時: エラー表示（§11参照）

### 6.4 データ更新トリガーの分類

| トリガー | 種別 | 処理概要 |
|---|---|---|
| 保存ボタン押下 | ユーザー操作 | 入力内容を会員更新APIへ送信する |
| 削除ボタン押下 | ユーザー操作 | 会員削除APIを呼び出す |
| 下書き自動保存 | 自動 | 入力欄の変更を検知しローカルストレージへ書き込む |

### 6.5 データ変換（API レスポンス → 画面表示用データ）

| 変換名 | 入力型 | 出力型 | 変換概要 |
|---|---|---|---|
| toMemberFormValues | MemberResponse | MemberFormValues | APIレスポンスの会員情報を編集フォーム用の項目値へマッピングする |

### 6.6 画面状態の遷移

| 状態 | 遷移条件 | UI の表示 |
|---|---|---|
| loading | 初期表示・再取得中 | ローディング表示 |
| empty | データ0件 | 空状態メッセージ（該当会員が存在しない旨） |
| error | APIエラー | エラーメッセージ（§11参照） |
| ready | データ取得成功 | メインコンテンツ（編集フォーム） |

## §8 イベント処理

### 8.1 メイン画面イベント

| イベント | 発火要素 | 処理概要 |
|---|---|---|
| onSave | 保存ボタン | バリデーション後、会員情報更新APIを呼び出す |
| onDeleteRequest | 削除ボタン | 削除確認ダイアログを表示する |
| onFieldChange | 各入力欄 | 状態変数を更新し、下書き自動保存をトリガーする |

### 8.2 サブコンポーネントイベント

| コンポーネント | イベント | 処理概要 |
|---|---|---|
| DeleteConfirmDialog | onConfirm | 会員削除APIを呼び出す |
| DeleteConfirmDialog | onCancel | ダイアログを閉じ、削除操作を取り消す |

### 8.3 複数ステップ処理の詳細

会員状態を退会へ変更する操作は、(1) 状態変更の一時保持、(2) 確認ダイアログでの承認、(3) 保存APIの呼び出し、の3ステップを踏む。承認前にキャンセルした場合は一時保持した値を破棄し元の状態に戻す。

### 8.4 キーボード操作

| キー | 発火条件 | 挙動 |
|---|---|---|
| Tab | フォーカス可能要素 | 氏名 → 連絡先 → 会員区分 → 会員状態 → 保存 → 削除 → 戻る の順で移動する |
| Enter | 入力欄フォーカス時 | フォームを送信せず次項目へフォーカスを移す |

<script>
(function () {
  var src = document.getElementById('doc-md').textContent;

  // frontmatter 除去
  src = src.replace(/^\s*---[\s\S]*?---\s*/, '');

  var lines = src.split('\n');
  var html = [];
  var inTable = false;
  var inList = false;
  var listType = '';
  var inBlockquote = false;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function inlineFormat(s) {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/!\[([^\]]*)\]\(([^()\s]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');
    s = s.replace(/\[([^\]]+)\]\(([^()\s]+)\)/g, '<a href="$2">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }

  function closeList() {
    if (inList) { html.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }
  }
  function closeBlockquote() {
    if (inBlockquote) { html.push('</blockquote>'); inBlockquote = false; }
  }
  function closeTable() {
    if (inTable) { html.push('</tbody></table>'); inTable = false; }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var trimmed = line.trim();

    // 空行
    if (!trimmed) { closeList(); closeBlockquote(); continue; }

    // 見出し
    var hm = trimmed.match(/^(#{1,6})\s+(.*)$/);
    if (hm) { closeList(); closeBlockquote(); closeTable(); var lv = hm[1].length; html.push('<h' + lv + '>' + inlineFormat(hm[2]) + '</h' + lv + '>'); continue; }

    // 水平線
    if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) { closeList(); closeBlockquote(); closeTable(); html.push('<hr>'); continue; }

    // テーブル
    if (trimmed.indexOf('|') !== -1 && trimmed.charAt(0) === '|') {
      closeList(); closeBlockquote();
      var cells = trimmed.split('|').filter(function(c,j,a){ return j > 0 && j < a.length - 1; });
      if (/^[\s|:-]+$/.test(trimmed)) continue; // separator 行
      if (!inTable) {
        html.push('<table><thead><tr>');
        cells.forEach(function(c) { html.push('<th>' + inlineFormat(c.trim()) + '</th>'); });
        html.push('</tr></thead><tbody>');
        inTable = true;
      } else {
        html.push('<tr>');
        cells.forEach(function(c) { html.push('<td>' + inlineFormat(c.trim()) + '</td>'); });
        html.push('</tr>');
      }
      continue;
    } else { closeTable(); }

    // 引用
    if (trimmed.charAt(0) === '>') {
      closeList(); closeTable();
      if (!inBlockquote) { html.push('<blockquote>'); inBlockquote = true; }
      html.push('<p>' + inlineFormat(trimmed.substring(1).trim()) + '</p>');
      continue;
    } else { closeBlockquote(); }

    // 番号付きリスト
    var olm = trimmed.match(/^(\d+)\.\s+(.*)$/);
    if (olm) {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ol') { closeList(); html.push('<ol>'); inList = true; listType = 'ol'; }
      html.push('<li>' + inlineFormat(olm[2]) + '</li>');
      continue;
    }

    // 箇条書き
    if (trimmed.charAt(0) === '-' && trimmed.charAt(1) === ' ') {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ul') { closeList(); html.push('<ul>'); inList = true; listType = 'ul'; }
      html.push('<li>' + inlineFormat(trimmed.substring(2)) + '</li>');
      continue;
    }

    // 通常段落
    closeList(); closeTable(); closeBlockquote();
    html.push('<p>' + inlineFormat(trimmed) + '</p>');
  }
  closeList(); closeTable(); closeBlockquote();

  document.getElementById('doc-content').innerHTML = html.join('\n');
})();
</script>

(function () {
  var themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      var r = document.documentElement;
      var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', next);
      themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
      try { localStorage.setItem('rd-portal-theme', next); } catch (e) {}
    });
  }
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch (e) {}
})();
</script>
