<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>環境構築手順 — リバース設計ポータル</title>
<!--
  detail-pages T5 手順型テンプレート — リバース設計スキル群
  生成: shared/scripts/detail-pages/build-detail-page.sh
  プレースホルダ置換は build-detail-page.sh の render_template() が行う。
  手作業によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/portal-template.html からの複製である。
  同テンプレートの当該部分を変更した場合は本ファイルも同時更新すること
  （T1一覧テンプレート群・T3テンプレートにも同種の複製あり。include化は別件）。

  プレースホルダ(build-detail-page.shが注入。実際のマーカー記法は
  scripts/detail-pages/build-detail-page.sh 冒頭コメントを正本とする。本コメントでは
  二重置換事故を避けるため意図的に波括弧を外して記載する):
    TITLE (ページ見出しマーカー)         : page-data.json の title
    DESCRIPTION (ページ概要マーカー)     : page-data.json の description
    GENERATED_AT (生成日時マーカー)      : page-data.json の generatedAt
    PAGE_DATA_JSON (page-data埋め込みマーカー) : page-data.json の内容全体(本ファイル物理末尾のscriptタグへ注入)
-->
<style>
:root,
[data-theme="light"] {
  --bg: #FFFFFF;
  --panel: #FFFFFF;
  --panel-2: #F6F8FA;
  --border: #D1D9E0;
  --border-strong: #AFB8C1;
  --text: #1B1F26;
  --text-sub: #4A4F58;
  --text-muted: #767B85;
  --accent: #0969DA;
  --accent-2: #218BFF;
  --accent-soft: #DDF4FF;
  --accent-border: #54AEFF;
  --gold: #BC4C00;
  --gold-soft: #FFF1E5;
  --gold-border: #D18A5A;
  --success: #1A7F37;
  --success-soft: #DAFBE1;
  --warn: #BC4C00;
  --danger: #CF222E;
  --danger-soft: #FFEBE9;
  --code-bg: #1B1F26;
  --code-fg: #E8E5DC;
  --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
  --mono: "SFMono-Regular","Menlo","Cascadia Code","Consolas",monospace;
  --shadow-sm: 0 1px 3px rgba(27,31,38,.07), 0 2px 6px rgba(27,31,38,.05);
  --shadow-md: 0 2px 8px rgba(27,31,38,.09), 0 8px 24px rgba(27,31,38,.07);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
    --border: #30363D; --border-strong: #484F58;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
    --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
    --success: #3FB950; --success-soft: #0D2818;
    --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
    --code-bg: #0E1116; --code-fg: #E8E5DC;
  }
}
[data-theme="dark"] {
  --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
  --border: #30363D; --border-strong: #484F58;
  --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
  --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
  --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
  --success: #3FB950; --success-soft: #0D2818;
  --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
  --code-bg: #0E1116; --code-fg: #E8E5DC;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.dp-page { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; overflow: hidden; }

.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); }
.brand:hover { text-decoration: none; }
.brand-icon { display: inline-flex; align-items: center; }
.brand-title { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: var(--text-muted, #6c757d); }
.header-meta { font-size: 12px; color: var(--text-muted, #6c757d); display: flex; align-items: center; gap: 8px; }
.top-actions { display: flex; align-items: center; gap: 8px; }
.top-actions button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }

/* グリッドアイテムが内容幅で親を押し広げないための対策(portal-template.htmlと同一措置) */
.dp-main { max-width: 1280px; width: 100%; min-width: 0; margin: 0 auto; padding: 24px 24px 64px; overflow-y: auto; min-height: 0; }

.doc-crumbs { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.doc-crumbs a { color: var(--text-sub); cursor: pointer; }
.doc-crumbs a:hover { color: var(--accent); }

.dp-hero {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  padding: 4px 2px 14px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap;
}
.dp-hero h1 { font-size: 23px; margin: 0; }
.dp-hero p { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 0; }
.dp-updated {
  font-size: 12px; color: var(--text-sub); background: var(--accent-soft);
  border: 1px solid var(--accent-border); border-radius: 999px; padding: 3px 12px; white-space: nowrap;
}

.sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-sub);
  display: flex; align-items: center; gap: 8px; margin: 26px 0 12px;
}
.sec-label:first-of-type { margin-top: 6px; }
.sec-label::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }

/* 3表共通。表本体だけを横スクロールさせ、ページ本体は横スクロールさせない */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table.data-table {
  width: 100%; min-width: 420px; border-collapse: collapse; font-size: 13px;
  background: var(--panel); border: 1px solid var(--border);
}
table.data-table th {
  text-align: left; font-size: 11.5px; font-weight: 700; color: var(--text-sub);
  background: var(--panel-2); padding: 8px 12px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
table.data-table tr:last-child td { border-bottom: none; }
table.data-table code {
  background: var(--panel-2); padding: 1px 6px; border-radius: 4px;
  font-family: var(--mono); font-size: 11.5px; color: var(--text-sub);
  border: 1px solid var(--border);
}
.step-order {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 999px;
  background: var(--accent-soft); color: var(--accent); font-size: 11px; font-weight: 700;
}

.note-box {
  font-size: 12px; color: var(--text-sub); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; margin: 14px 0 0;
}


@media (max-width: 760px) {
  .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
  .dp-main { padding: 14px; }
}
@media (max-width: 560px) {
  body { font-size: 14px; }
  .dp-hero h1 { font-size: 20px; }
  .dp-main { padding: 12px; }
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="dp-page">
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zM13 9V3.5L18.5 9H13z"/></svg></span>
      <span class="brand-title">サンプルプロジェクト</span>
      <span class="brand-sub">設計ポータル</span>
    </a>
    <div class="header-meta">
      <span class="pm-updated">更新: 2026-07-21 · コミット番号: 89178e6</span>
    </div>
    <div class="top-actions">
      <button id="theme-toggle" title="テーマ切替">ライト</button>
    </div>
  </header>

  <main class="dp-main">
    <div class="doc-crumbs"><a href="index.html">← ポータル TOP へ戻る</a></div>
    <div class="dp-hero">
      <div>
        <h1>環境構築手順</h1>
        <p>ローカル起動手順・必須ツール・ポート割当の整理</p>
      </div>
      <span class="dp-updated">生成: 2026-07-20</span>
    </div>

    <div class="sec-label">前提ツール</div>
    <div class="table-wrap">
      <table class="data-table" id="prereq-table">
        <thead><tr><th>ツール</th><th>備考</th></tr></thead>
        <tbody id="prereq-table-body"></tbody>
      </table>
    </div>

    <div class="sec-label">実行手順</div>
    <div class="table-wrap">
      <table class="data-table" id="steps-table">
        <thead><tr><th>番号</th><th>コマンド</th><th>備考</th></tr></thead>
        <tbody id="steps-table-body"></tbody>
      </table>
    </div>

    <div class="sec-label">割当</div>
    <div class="table-wrap">
      <table class="data-table" id="alloc-table">
        <thead><tr><th>対象</th><th>値</th><th>出所</th></tr></thead>
        <tbody id="alloc-table-body"></tbody>
      </table>
    </div>

    <div id="unresolved-mount"></div>
  </main>

  <footer class="footer">
    <span>リバース設計スキル群が自動生成</span>
  </footer>
</div>

<script type="application/json" id="page-data">
{
  "pageKind": "env",
  "title": "環境構築手順",
  "description": "ローカル起動手順・必須ツール・ポート割当の整理",
  "generatedAt": "2026-07-20",
  "portalRelative": "../index.html",
  "prerequisites": [
    {"name": "Node.js", "note": "v20 以上"},
    {"name": "Python", "note": "3.11 以上"},
    {"name": "PostgreSQL", "note": "17（Docker 経由でも可）"},
    {"name": "pnpm", "note": "v9 以上"}
  ],
  "steps": [
    {"order": 1, "command": "git clone <repo-url> && cd <project>", "note": "リポジトリのクローン"},
    {"order": 2, "command": "pnpm install", "note": "フロントエンド依存のインストール"},
    {"order": 3, "command": "cd backend && pip install -e '.[dev]'", "note": "バックエンド依存のインストール"},
    {"order": 4, "command": "docker compose up -d", "note": "PostgreSQL の起動"},
    {"order": 5, "command": "pnpm dev", "note": "フロントエンド開発サーバー起動（port 3000）"},
    {"order": 6, "command": "cd backend && uvicorn app.main:app --reload --port 8000", "note": "バックエンド開発サーバー起動"}
  ],
  "allocations": [
    {"target": "フロントエンド", "value": "3000", "sourceRef": "vite.config.ts"},
    {"target": "バックエンド", "value": "8000", "sourceRef": "pyproject.toml"},
    {"target": "PostgreSQL", "value": "5432", "sourceRef": "docker-compose.yml"}
  ],
  "unresolved": []
}
</script>

<script>
(function() {
  var data = JSON.parse(document.getElementById('page-data').textContent);

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      if (k === 'html') node.innerHTML = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  // --- 前提ツール表(prerequisites[]) ---
  var prereqBody = document.getElementById('prereq-table-body');
  var prerequisites = data.prerequisites || [];
  if (prerequisites.length === 0) {
    prereqBody.appendChild(el('tr', null, el('td', { colspan: '2' }, 'なし')));
  } else {
    prerequisites.forEach(function(p) {
      prereqBody.appendChild(el('tr', null, [
        el('td', null, p.name || ''),
        el('td', null, p.note || '')
      ]));
    });
  }

  // --- 手順表(steps[]。番号 = 実行順) ---
  var stepsBody = document.getElementById('steps-table-body');
  var steps = (data.steps || []).slice().sort(function(a, b) {
    return (a.order != null ? a.order : 0) - (b.order != null ? b.order : 0);
  });
  if (steps.length === 0) {
    stepsBody.appendChild(el('tr', null, el('td', { colspan: '3' }, 'なし')));
  } else {
    steps.forEach(function(s, idx) {
      stepsBody.appendChild(el('tr', null, [
        el('td', null, el('span', { class: 'step-order' }, String(idx + 1))),
        el('td', null, el('code', null, s.command || '')),
        el('td', null, s.note || '')
      ]));
    });
  }

  // --- 割当表(allocations[]) ---
  var allocBody = document.getElementById('alloc-table-body');
  var allocations = data.allocations || [];
  if (allocations.length === 0) {
    allocBody.appendChild(el('tr', null, el('td', { colspan: '3' }, 'なし')));
  } else {
    allocations.forEach(function(a) {
      allocBody.appendChild(el('tr', null, [
        el('td', null, a.target || ''),
        el('td', null, a.value || ''),
        el('td', null, el('code', null, a.sourceRef || ''))
      ]));
    });
  }

  // --- 未解決節(unresolved[]) ---
  var unresolvedMount = document.getElementById('unresolved-mount');
  var unresolved = data.unresolved || [];
  if (unresolved.length > 0) {
    unresolvedMount.appendChild(el('div', { class: 'sec-label' }, '未解決'));
    var box = el('div', { class: 'note-box' });
    unresolved.forEach(function(u) {
      var line = (u.label || '') + '（' + (u.reason || '') + '）';
      box.appendChild(el('div', null, line));
    });
    unresolvedMount.appendChild(box);
  }

  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var r = document.documentElement;
    var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
    themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
    try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
  });
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
