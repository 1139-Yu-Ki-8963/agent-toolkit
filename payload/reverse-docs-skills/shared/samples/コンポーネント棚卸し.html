<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>コンポーネント棚卸し — 設計ポータル</title>
<!--
  detail-pages T9 コンポーネント棚卸し型テンプレート — 設計スキル群
  生成: shared/scripts/detail-pages/build-detail-page.sh
  プレースホルダ置換は build-detail-page.sh の render_template() が行う。
  手作業によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/portal-template.html からの複製である。
  同テンプレートの当該部分を変更した場合は本ファイルも同時更新すること
  （T1一覧テンプレート群・T2〜T6テンプレートにも同種の複製あり。include化は別件）。

  プレースホルダ(build-detail-page.shが注入。実際のマーカー記法は
  scripts/detail-pages/build-detail-page.sh 冒頭コメントを定義とする。本コメントでは
  二重置換事故を避けるため意図的に波括弧を外して記載する):
    TITLE (ページ見出しマーカー)         : page-data.json の title
    DESCRIPTION (ページ概要マーカー)     : page-data.json の description
    GENERATED_AT (生成日時マーカー)      : page-data.json の generatedAt
    PAGE_DATA_JSON (page-data埋め込みマーカー) : page-data.json の内容全体(本ファイル物理末尾のscriptタグへ注入)

  pageKind: component-inventory
  page-data.json 想定構造(本テンプレートのJSが直接参照する型別スロット。
  定義スキーマへの追記は別件・page-data-schema.mdは本ファイルの変更対象外):
    components: [{ name: string, file: string, hasProps: boolean, importCount: number, category: string }]
    summary: [{ label: string, value: string, note?: string }]（任意。要約タイル）
  category(component/page/layout/other)でグルーピングしたテーブル。列: 名前 / ファイル / Props有無 / 被参照数。
  カテゴリフィルタチップ + 検索窓(名前・ファイルの部分一致) + importCount 降順ソートを行う。
-->
<style>
:root,
[data-theme="light"] {
  /* Windows フォント上書き防止 */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-synthesis: none;
  --bg: #FFFFFF;
  --panel: #FFFFFF;
  --panel-2: #F6F8FA;
  --border: #D1D9E0;
  --border-strong: #AFB8C1;
  --text: #1B1F26;
  --text-sub: #4A4F58;
  --text-muted: #767B85;
  --accent: #0969DA;
  --accent-2: #218BFF;
  --accent-soft: #DDF4FF;
  --accent-border: #54AEFF;
  --gold: #BC4C00;
  --gold-soft: #FFF1E5;
  --gold-border: #D18A5A;
  --success: #1A7F37;
  --success-soft: #DAFBE1;
  --warn: #BC4C00;
  --danger: #CF222E;
  --danger-soft: #FFEBE9;
  --highlight: #D97B1A;
  --highlight-soft: rgba(217,123,26,0.12);
  --highlight-border: rgba(217,123,26,0.5);
  --nav-tag: #7B8BBF;
  --nav-tag-soft: #ECEEF6;
  --self-tag: #6B9B6B;
  --self-tag-soft: #E8F0E8;
  --code-bg: #1B1F26;
  --code-fg: #E8E5DC;
  --cat-list: #2563eb;
  --cat-common: #059669;
  --cat-project: #7C3AED;
  --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
  --mono: "SFMono-Regular","Menlo","Cascadia Code","Consolas",monospace;
  --shadow-sm: 0 1px 3px rgba(27,31,38,.07), 0 2px 6px rgba(27,31,38,.05);
  --shadow-md: 0 2px 8px rgba(27,31,38,.09), 0 8px 24px rgba(27,31,38,.07);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
    --border: #30363D; --border-strong: #484F58;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
    --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
    --success: #3FB950; --success-soft: #0D2818;
    --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
    --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5);
    --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15);
    --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15);
    --code-bg: #0E1116; --code-fg: #E8E5DC;
    --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
  }
}
[data-theme="dark"] {
  --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
  --border: #30363D; --border-strong: #484F58;
  --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
  --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
  --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
  --success: #3FB950; --success-soft: #0D2818;
  --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
  --highlight: #E8943A; --highlight-soft: rgba(232,148,58,0.15); --highlight-border: rgba(232,148,58,0.5);
  --nav-tag: #8E9ED0; --nav-tag-soft: rgba(142,158,208,0.15);
  --self-tag: #7DB87D; --self-tag-soft: rgba(125,184,125,0.15);
  --code-bg: #0E1116; --code-fg: #E8E5DC;
  --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.dp-page { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; overflow: hidden; }

.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); }
.brand:hover { text-decoration: none; }
.brand-icon { display: inline-flex; align-items: center; }
.brand-title { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: var(--text-muted, #6c757d); }
.top-actions { display: flex; align-items: center; gap: 8px; }
.top-actions button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
.header-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }

.dp-main { max-width: 1280px; width: 100%; min-width: 0; margin: 0 auto; padding: 24px 24px 64px; overflow-y: auto; min-height: 0; }

.doc-crumbs { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.doc-crumbs a { color: var(--text-sub); cursor: pointer; }
.doc-crumbs a:hover { color: var(--accent); }

.dp-hero {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  padding: 4px 2px 14px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap;
}
.dp-hero h1 { font-size: 23px; margin: 0; }
.dp-hero p { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 0; }
.dp-updated {
  font-size: 12px; color: var(--text-sub); background: var(--accent-soft);
  border: 1px solid var(--accent-border); border-radius: 999px; padding: 3px 12px; white-space: nowrap;
}

.sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-sub);
  display: flex; align-items: center; gap: 8px; margin: 6px 0 12px;
}
.sec-label::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }

/* 要約タイル */
.tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 14px; margin-bottom: 24px; min-width: 0; }
.tile-card {
  background: var(--panel); border: 1px solid var(--border); min-width: 0;
  border-radius: var(--radius); padding: 14px 16px 13px; box-shadow: var(--shadow-sm);
}
.tile-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.02em; color: var(--text-sub); margin-bottom: 4px; }
.tile-value { font-size: 24px; font-weight: 800; line-height: 1.15; font-family: var(--mono); color: var(--text); overflow-wrap: break-word; }
.tile-note { font-size: 11.5px; color: var(--text-muted); margin-top: 5px; }

/* 検索ボックス + カテゴリチップ */
.toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; min-width: 0; }
.toolbar input[type="search"] {
  flex: 1; min-width: 200px; padding: 8px 12px; font-size: 13.5px;
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: inherit;
}
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip {
  font-size: 12.5px; color: var(--text-sub); background: var(--panel);
  border: 1px solid var(--border); border-radius: 999px; padding: 5px 14px;
  cursor: pointer; font-family: inherit;
}
.chip:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* 明細表。表本体だけを横スクロールさせ、ページ本体は横スクロールさせない */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table.data-table {
  width: 100%; min-width: 560px; border-collapse: collapse; font-size: 13px;
  background: var(--panel); border: 1px solid var(--border);
}
table.data-table th {
  text-align: left; font-size: 11.5px; font-weight: 700; color: var(--text-sub);
  background: var(--panel-2); padding: 8px 12px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
table.data-table tr:last-child td { border-bottom: none; }
table.data-table code {
  background: var(--panel-2); padding: 1px 6px; border-radius: 4px;
  font-family: var(--mono); font-size: 11.5px; color: var(--text-sub);
  border: 1px solid var(--border);
}
.props-flag { font-size: 11.5px; font-weight: 700; padding: 1px 8px; border-radius: 999px; }
.props-flag.yes { background: var(--success-soft); color: var(--success); }
.props-flag.no { background: var(--panel-2); color: var(--text-muted); }

.note-box {
  font-size: 12px; color: var(--text-sub); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; margin: 14px 0 0;
}

.footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
  display: flex; gap: 20px; justify-content: center;
}

@media (max-width: 760px) {
  .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
  .dp-main { padding: 14px; }
  .tile-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
@media (max-width: 560px) {
  body { font-size: 14px; }
  .dp-hero h1 { font-size: 20px; }
  .dp-main { padding: 12px; }
  .tile-grid { grid-template-columns: 1fr 1fr; }
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="dp-page">
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zM13 9V3.5L18.5 9H13z"/></svg></span>
      <span class="brand-title">サンプルプロジェクト</span>
      <span class="brand-sub">設計ポータル</span>
    </a>
    <div class="header-meta">
      <span class="pm-updated">更新: 2026-07-20</span>
    </div>
    <div class="top-actions">
      <button id="theme-toggle" title="テーマ切替">ライト</button>
    </div>
  </header>

  <main class="dp-main">
    <div class="doc-crumbs"><a href="index.html">← ポータル TOP へ戻る</a></div>
    <div class="dp-hero">
      <div>
        <h1>コンポーネント棚卸し</h1>
        <p>コンポーネントの一覧・Props・被参照数。</p>
      </div>
    </div>

    <div class="tile-grid" id="tiles-mount"></div>

    <div class="sec-label">検索・絞り込み</div>
    <div class="toolbar">
      <input type="search" id="component-search" placeholder="名前・ファイルで絞り込み">
    </div>
    <div class="chip-row" id="chips-mount"></div>

    <div class="sec-label">コンポーネント一覧</div>
    <div class="table-wrap">
      <table class="data-table" id="component-table">
        <thead>
          <tr>
            <th>名前</th>
            <th>ファイル</th>
            <th>Props有無</th>
            <th>被参照数</th>
          </tr>
        </thead>
        <tbody id="component-table-body"></tbody>
      </table>
    </div>

    <div id="unresolved-mount"></div>
  </main>

  <footer class="footer">
    <span></span>
  </footer>
</div>

<script type="application/json" id="page-data">
{
  "pageKind": "component-inventory",
  "projectName": "サンプルプロジェクト",
  "title": "コンポーネント棚卸し",
  "description": "コンポーネントの一覧・Props・被参照数。",
  "generatedAt": "2026-07-20",
  "summary": [
    {"label": "コンポーネント数", "value": "10", "note": "src/components 配下"},
    {"label": "Props あり", "value": "7", "note": "70%"},
    {"label": "最多被参照", "value": "18", "note": "Button"}
  ],
  "components": [
    {"name": "Button", "file": "src/components/Button.tsx", "hasProps": true, "importCount": 18, "category": "component"},
    {"name": "Input", "file": "src/components/Input.tsx", "hasProps": true, "importCount": 12, "category": "component"},
    {"name": "Card", "file": "src/components/Card.tsx", "hasProps": true, "importCount": 9, "category": "component"},
    {"name": "Badge", "file": "src/components/Badge.tsx", "hasProps": true, "importCount": 7, "category": "component"},
    {"name": "Modal", "file": "src/components/Modal.tsx", "hasProps": true, "importCount": 5, "category": "component"},
    {"name": "Toast", "file": "src/components/Toast.tsx", "hasProps": false, "importCount": 3, "category": "component"},
    {"name": "AppHeader", "file": "src/layouts/AppHeader.tsx", "hasProps": false, "importCount": 1, "category": "layout"},
    {"name": "SidebarNav", "file": "src/layouts/SidebarNav.tsx", "hasProps": true, "importCount": 1, "category": "layout"},
    {"name": "PostDetailPage", "file": "src/pages/PostDetailPage.tsx", "hasProps": false, "importCount": 1, "category": "page"},
    {"name": "formatDate", "file": "src/utils/formatDate.ts", "hasProps": false, "importCount": 14, "category": "other"}
  ],
  "unresolved": []
}
</script>

<script>
(function() {
  var data = JSON.parse(document.getElementById('page-data').textContent);

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      if (k === 'html') node.innerHTML = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  // --- 要約タイル(summary[]) ---
  var tilesMount = document.getElementById('tiles-mount');
  (data.summary || []).forEach(function(t) {
    var card = el('div', { class: 'tile-card' });
    card.appendChild(el('div', { class: 'tile-label' }, t.label || ''));
    card.appendChild(el('div', { class: 'tile-value' }, String(t.value != null ? t.value : '')));
    if (t.note) card.appendChild(el('div', { class: 'tile-note' }, t.note));
    tilesMount.appendChild(card);
  });

  // importCount 降順で固定ソート
  var components = (data.components || []).slice().sort(function(a, b) {
    return (b.importCount || 0) - (a.importCount || 0);
  });
  var activeCategory = 'all';
  var rowEls = [];

  // --- カテゴリチップ(components[].category から動的抽出) ---
  var KNOWN_CATEGORIES = ['component', 'page', 'layout', 'other'];
  var categories = [];
  components.forEach(function(c) {
    var cat = c.category || 'other';
    if (categories.indexOf(cat) === -1) categories.push(cat);
  });
  categories.sort(function(a, b) {
    var ai = KNOWN_CATEGORIES.indexOf(a); if (ai === -1) ai = KNOWN_CATEGORIES.length;
    var bi = KNOWN_CATEGORIES.indexOf(b); if (bi === -1) bi = KNOWN_CATEGORIES.length;
    return ai - bi;
  });

  var chipsMount = document.getElementById('chips-mount');
  function renderChips() {
    chipsMount.innerHTML = '';
    var chips = [{ key: 'all', label: 'すべて' }].concat(categories.map(function(c) {
      return { key: c, label: c };
    }));
    chips.forEach(function(c) {
      var btn = el('button', { class: 'chip' + (activeCategory === c.key ? ' active' : ''), type: 'button' }, c.label);
      btn.addEventListener('click', function() {
        activeCategory = c.key;
        renderChips();
        applyFilter();
      });
      chipsMount.appendChild(btn);
    });
  }

  // --- コンポーネント一覧(components[]) ---
  var tbody = document.getElementById('component-table-body');
  function renderRows() {
    tbody.innerHTML = '';
    rowEls = [];
    if (components.length === 0) {
      tbody.appendChild(el('tr', null, el('td', { colspan: '4' }, 'なし')));
      return;
    }
    components.forEach(function(c) {
      var hasProps = !!c.hasProps;
      var flag = el('span', { class: 'props-flag ' + (hasProps ? 'yes' : 'no') }, hasProps ? 'あり' : 'なし');
      var tr = el('tr', { 'data-category': c.category || 'other' }, [
        el('td', null, c.name || ''),
        el('td', null, el('code', null, c.file || '')),
        el('td', null, flag),
        el('td', null, String(c.importCount != null ? c.importCount : 0))
      ]);
      tbody.appendChild(tr);
      rowEls.push(tr);
    });
  }

  // --- 検索(部分一致) + カテゴリチップ絞り込み ---
  function applyFilter() {
    var q = (document.getElementById('component-search').value || '').trim().toLowerCase();
    rowEls.forEach(function(tr) {
      var catOk = activeCategory === 'all' || tr.getAttribute('data-category') === activeCategory;
      var textOk = q === '' || tr.textContent.toLowerCase().indexOf(q) !== -1;
      tr.style.display = (catOk && textOk) ? '' : 'none';
    });
  }

  renderChips();
  renderRows();
  applyFilter();
  document.getElementById('component-search').addEventListener('input', applyFilter);

  // --- 未解決節(unresolved[]) ---
  var unresolvedMount = document.getElementById('unresolved-mount');
  var unresolved = data.unresolved || [];
  if (unresolved.length > 0) {
    unresolvedMount.appendChild(el('div', { class: 'sec-label' }, '未解決'));
    var box = el('div', { class: 'note-box' });
    unresolved.forEach(function(u) {
      var line = (u.label || '') + '（' + (u.reason || '') + '）';
      box.appendChild(el('div', null, line));
    });
    unresolvedMount.appendChild(box);
  }

  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var r = document.documentElement;
    var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
    themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
    try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
  });
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
