        evidence: "ItemListPage.tsx:42-51"
      - key: handler-handleSearchSubmit-検索
        value: "const handleSearchSubmit = async (event: React.FormEvent<HTMLFormElement>) => {\n  event.preventDefault();\n  try {\n    setLoading(true);\n    const result = await fetchItemList({ keyword: form.keyword, limit: PAGE_SIZE, offset: 0 });\n    setItems(result.items);\n  } catch (err) {\n    window.alert(err instanceof Error ? err.message : '検索に失敗しました');\n  } finally {\n    setLoading(false);\n  }\n}"
        evidence: "ItemListPage.tsx:88-99"
