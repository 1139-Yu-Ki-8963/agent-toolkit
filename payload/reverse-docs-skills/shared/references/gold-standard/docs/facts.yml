      - key: handler-handleDeleteClick-削除
        value: "const handleDeleteClick = async (id: string) => {\n  try {\n    await deleteItem(id);\n    setItems((prev) => prev.filter((item) => item.id !== id));\n  } catch (err) {\n    window.alert(err instanceof Error ? err.message : '削除でエラーが発生しました');\n  }\n}"
        evidence: "ItemListPage.tsx:103-110"
      - key: handler-sortItemsByKey-ソート
        value: "export function sortItemsByKey<T extends SortableItem>(items: T[], key: string, direction: SortDirection): T[] {\n  const sorted = [...items].sort((a, b) => {\n    const left = a[key];\n    const right = b[key];\n    if (left === right) { return 0; }\n    return left > right ? 1 : -1;\n  });\n  return direction === SortDirection.Desc ? sorted.reverse() : sorted;\n}"
        evidence: "ItemListColumns.tsx:39-53"
