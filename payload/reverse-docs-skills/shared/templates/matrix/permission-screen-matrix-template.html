<!DOCTYPE html>
<!--
  権限×画面マトリクス.HTML の静的シェル(テンプレート)

  答える質問:
    「このロールはどの画面を見られるか」「権限設定に漏れはないか」

  使い方:
    プレースホルダ・注入マーカーは将来のビルドスクリプトが注入する。手作業置換禁止。
    ビルドスクリプトがマトリクスマニフェストJSONをパースし、以下のマーカーを
    機械的に置換して決定的にHTMLを生成する。

  プレースホルダ(二重置換事故を避けるため本コメントでは波括弧・HTMLコメント記法を
  意図的に外して記載する):
    GENERATED_AT (生成日時マーカー)   : ISO8601 生成日時
    DATA_SOURCE (データ源マーカー)    : 画面一覧マニフェスト・権限定義の取得元
    MATRIX_JSON (マトリクスJSON埋め込みマーカー) :
      script#matrix-manifest の中身として manifest JSON をそのまま埋め込む
      (二重管理・ドリフト禁止)。構造:
        roles: ロール名の配列(列順)
        screens: [{ screenId, screenName, route,
                    permissions: { <ロール名>: true|false } | null }]
        permissions が null の画面は「権限未設定」(? 表示・警告色)として扱う

  表構造:
    行 = 画面(画面名 + ルート表示) / 列 = ロール / セル = 閲覧可否
    ○ = 閲覧可(success色) / — = 不可(muted色) / ? = 権限未設定(警告色)
    列ヘッダ(ロール名)クリックでそのロールが閲覧可の行だけに絞り込み(再クリックで解除)

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/detail-pages/detail-t3-attributes.html(同portal-template.html)からの複製である。
  同ファイルの当該部分を変更した場合は本ファイルも同時更新すること
  (unit-list-template.html・feature-list-template.html・screen-list-template.htmlにも
  同種の複製あり。include化は別件)。

  制約:
    - 外部リソース(CDN・フォント・画像)は一切使わない。単一ファイル自己完結
    - <script id="matrix-manifest"> の中身は確定結果(manifest JSON)と完全に一致させる
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>権限×画面マトリクス</title>
<style>
  /* ここからトークンブロック:
     shared/templates/detail-pages/detail-t3-attributes.html(同portal-template.html)からの複製である。
     同ファイルの当該部分を変更した場合は本ファイルも同時更新すること */
  :root,
  [data-theme="light"] {
    /* Windows フォント上書き防止 */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-synthesis: none;
    --bg: #FFFFFF;
    --panel: #FFFFFF;
    --panel-2: #F0EDE3;
    --border: #DAD5C5;
    --border-strong: #BFB9A6;
    --text: #1B1F26;
    --text-sub: #4A4F58;
    --text-muted: #767B85;
    --accent: #3F4F8E;
    --accent-2: #5A6BAE;
    --accent-soft: #E6E9F3;
    --accent-border: #BAC2DC;
    --gold: #9B7A1F;
    --gold-soft: #F5EFD9;
    --gold-border: #DDC68A;
    --success: #3F4F8E;
    --success-soft: #E6E9F3;
    --warn: #9B7A1F;
    --danger: #9B3F2D;
    --danger-soft: #F5E2DC;
    --code-bg: #1B1F26;
    --code-fg: #E8E5DC;
    --cat-list: #2563eb;
    --cat-common: #059669;
    --cat-project: #7C3AED;
    --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
    --mono: "SFMono-Regular","Menlo","Cascadia Code","Consolas",monospace;
    --shadow-sm: 0 1px 3px rgba(27,31,38,.07), 0 2px 6px rgba(27,31,38,.05);
    --shadow-md: 0 2px 8px rgba(27,31,38,.09), 0 8px 24px rgba(27,31,38,.07);
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #15171C; --panel: #1C1F26; --panel-2: #232730;
      --border: #353944; --border-strong: #4A4F5C;
      --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
      --accent: #8FA3DB; --accent-2: #A8B8E5; --accent-soft: #2A2E47; --accent-border: #4C5680;
      --gold: #D4B45D; --gold-soft: #3D3520; --gold-border: #7A6633;
      --success: #8FA3DB; --success-soft: #2A2E47;
      --warn: #D4B45D; --danger: #D4836E; --danger-soft: #3F2620;
      --code-bg: #0E1116; --code-fg: #E8E5DC;
      --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
    }
  }
  [data-theme="dark"] {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #232730;
    --border: #353944; --border-strong: #4A4F5C;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #8FA3DB; --accent-2: #A8B8E5; --accent-soft: #2A2E47; --accent-border: #4C5680;
    --gold: #D4B45D; --gold-soft: #3D3520; --gold-border: #7A6633;
    --success: #8FA3DB; --success-soft: #2A2E47;
    --warn: #D4B45D; --danger: #D4836E; --danger-soft: #3F2620;
    --code-bg: #0E1116; --code-fg: #E8E5DC;
    --cat-list: #60A5FA; --cat-common: #34D399; --cat-project: #A78BFA;
  }
  /* ここまでトークンブロック(複製) */

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 24px 96px;
    font-family: var(--font-body);
    line-height: 1.7; color: var(--text); background: var(--bg);
    max-width: 1180px; margin-inline: auto;
  }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  header { padding: 40px 0 20px; border-bottom: 3px solid var(--border-strong); }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 1.7rem; margin: 0 0 10px; }
  .theme-toggle-btn {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-sub); cursor: pointer; padding: 5px 12px; font-size: 0.82rem; font-family: inherit;
  }
  .theme-toggle-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
  .meta-table { font-size: 0.88rem; color: var(--text-sub); border-collapse: collapse; }
  .meta-table td { padding: 2px 18px 2px 0; vertical-align: top; }
  .meta-table td:first-child { color: var(--text-muted); white-space: nowrap; }

  .summary-tiles { display: flex; gap: 14px; margin: 20px 0; flex-wrap: wrap; }
  .tile {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 18px; font-size: 0.85rem; color: var(--text-sub);
  }
  .tile strong { display: block; font-size: 1.3rem; color: var(--text); }
  .tile.tile-warn { border-color: var(--gold-border); background: var(--gold-soft); color: var(--gold); }
  .tile.tile-warn strong { color: var(--gold); }

  .toolbar { display: flex; gap: 10px; margin: 24px 0 10px; align-items: center; flex-wrap: wrap; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 220px; padding: 8px 12px; font-size: 0.92rem;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--panel); color: var(--text);
  }
  .toolbar .note { font-size: 0.82rem; color: var(--text-muted); }

  table.matrix {
    width: 100%; min-width: 640px; border-collapse: collapse; font-size: 0.88rem;
  }
  table.matrix th, table.matrix td {
    border-top: 1px solid var(--border); padding: 7px 10px; text-align: left; vertical-align: top;
  }
  table.matrix thead th {
    background: var(--panel-2); font-weight: 700; font-size: 0.8em;
  }
  table.matrix thead th.role-col {
    cursor: pointer; user-select: none; text-align: center; white-space: nowrap;
  }
  table.matrix thead th.role-col:hover { background: var(--accent-soft); }
  table.matrix thead th.role-col.filter-active {
    background: var(--accent-soft); color: var(--accent);
    box-shadow: inset 0 -3px 0 var(--accent);
  }
  table.matrix td.cell-perm { text-align: center; font-weight: 700; }
  table.matrix td .perm-yes { color: var(--success); }
  table.matrix td .perm-no { color: var(--text-muted); font-weight: 400; }
  table.matrix td .perm-unset {
    display: inline-block; min-width: 1.6em; border-radius: 3px;
    background: var(--gold-soft); color: var(--warn); border: 1px solid var(--gold-border);
  }
  table.matrix td .route {
    font-family: var(--mono); font-size: 0.8em; background: var(--panel-2);
    padding: 1px 5px; border-radius: 3px; overflow-wrap: break-word; word-break: break-all;
  }
  table.matrix td .screen-name { display: block; }
  table.matrix tbody tr:nth-child(even) {
    background: color-mix(in srgb, var(--panel-2) 40%, transparent);
  }
  table.matrix tbody tr:hover { background: var(--accent-soft); }

  .legend { font-size: 0.8rem; color: var(--text-muted); margin: 8px 0 0; }
  .legend .perm-yes { color: var(--success); font-weight: 700; }
  .legend .perm-unset { color: var(--warn); font-weight: 700; }

  footer { margin-top: 48px; font-size: 0.8rem; color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <nav class="back-link" style="margin: 16px 0 0; font-size: 0.85rem;">
    <a href="../../index.html" style="color: var(--text-sub); text-decoration: none; border-bottom: 1px dotted var(--text-muted);">← ポータルへ戻る</a>
  </nav>
  <div class="header-top">
    <h1>権限×画面マトリクス</h1>
    <button id="theme-toggle" class="theme-toggle-btn" type="button" title="テーマ切替">テーマ切替</button>
  </div>
  <table class="meta-table">
    <tr><td>生成日時</td><td>{{GENERATED_AT}}</td></tr>
    <tr><td>データ源</td><td>{{DATA_SOURCE}}</td></tr>
    <tr><td>種別</td><td>交差ビュー（権限×画面マトリクス）</td></tr>
  </table>

  <div class="summary-tiles" id="summary-tiles">
    <!-- JSがmatrix-manifestからロール別閲覧可能画面数・権限未設定数タイルを描画する -->
  </div>
</header>

<div class="toolbar">
  <input type="search" id="matrix-search" placeholder="画面名・ルートで絞り込み">
  <span class="note">ロール列見出しクリックでそのロールが閲覧可の画面だけに絞り込み（再クリックで解除）</span>
</div>

<div class="table-wrap">
  <table class="matrix" id="matrix-table">
    <thead>
      <tr id="matrix-head-row">
        <th>画面</th>
        <!-- JSがロール列ヘッダを描画する -->
      </tr>
    </thead>
    <tbody id="matrix-body">
      <!-- JSがmatrix-manifestから行を描画する -->
    </tbody>
  </table>
</div>
<p class="legend">凡例: <span class="perm-yes">○</span> = 閲覧可 / — = 閲覧不可 / <span class="perm-unset">?</span> = 権限未設定（権限情報を取得できなかった画面。要確認）</p>

<script type="application/json" id="matrix-manifest">
<!--MATRIX_JSON-->
</script>

<footer>交差ビュー生成スキルにより生成。手編集は次回再生成で上書きされる。</footer>

<script>
  (function () {
    var manifestEl = document.getElementById('matrix-manifest');
    var manifest = null;
    try { manifest = JSON.parse(manifestEl.textContent); } catch (e) { /* プレースホルダ未注入時は描画しない */ }
    if (!manifest || !manifest.roles || !manifest.screens) return;

    var roles = manifest.roles;
    var screens = manifest.screens;
    var headRow = document.getElementById('matrix-head-row');
    var tbody = document.getElementById('matrix-body');
    var tiles = document.getElementById('summary-tiles');
    var search = document.getElementById('matrix-search');
    var activeRole = null;

    function permOf(screen, role) {
      if (!screen.permissions) return null; /* 権限未設定 */
      return screen.permissions[role] === true;
    }

    /* 集計タイル: ロールごとの閲覧可能画面数 + 権限未設定数 */
    var unsetCount = 0;
    var roleCounts = {};
    roles.forEach(function (r) { roleCounts[r] = 0; });
    screens.forEach(function (s) {
      if (!s.permissions) { unsetCount++; return; }
      roles.forEach(function (r) { if (permOf(s, r)) roleCounts[r]++; });
    });
    roles.forEach(function (r) {
      var t = document.createElement('div');
      t.className = 'tile';
      var strong = document.createElement('strong');
      strong.textContent = String(roleCounts[r]);
      t.appendChild(strong);
      t.appendChild(document.createTextNode(r + 'の閲覧可能画面数'));
      tiles.appendChild(t);
    });
    var warnTile = document.createElement('div');
    warnTile.className = 'tile' + (unsetCount > 0 ? ' tile-warn' : '');
    var warnStrong = document.createElement('strong');
    warnStrong.textContent = String(unsetCount);
    warnTile.appendChild(warnStrong);
    warnTile.appendChild(document.createTextNode('権限未設定数'));
    tiles.appendChild(warnTile);

    /* 列ヘッダ(ロール) */
    roles.forEach(function (r) {
      var th = document.createElement('th');
      th.className = 'role-col';
      th.textContent = r;
      th.setAttribute('data-role', r);
      th.title = 'クリックで「' + r + 'が閲覧可」の画面だけに絞り込み';
      th.addEventListener('click', function () {
        activeRole = (activeRole === r) ? null : r;
        headRow.querySelectorAll('th.role-col').forEach(function (h) {
          h.classList.toggle('filter-active', h.getAttribute('data-role') === activeRole);
        });
        applyFilter();
      });
      headRow.appendChild(th);
    });

    /* 行(画面) */
    var rows = [];
    screens.forEach(function (s) {
      var tr = document.createElement('tr');
      var tdScreen = document.createElement('td');
      var name = document.createElement('span');
      name.className = 'screen-name';
      name.textContent = s.screenName;
      tdScreen.appendChild(name);
      var route = document.createElement('code');
      route.className = 'route';
      route.textContent = s.route || '—';
      tdScreen.appendChild(route);
      tr.appendChild(tdScreen);

      roles.forEach(function (r) {
        var td = document.createElement('td');
        td.className = 'cell-perm';
        var p = permOf(s, r);
        var span = document.createElement('span');
        if (p === null) { span.className = 'perm-unset'; span.textContent = '?'; span.title = '権限未設定'; }
        else if (p) { span.className = 'perm-yes'; span.textContent = '○'; }
        else { span.className = 'perm-no'; span.textContent = '—'; }
        td.appendChild(span);
        tr.appendChild(td);
      });
      rows.push({ tr: tr, screen: s });
      tbody.appendChild(tr);
    });

    function applyFilter() {
      var q = search ? search.value.trim().toLowerCase() : '';
      rows.forEach(function (row) {
        var textHit = !q || row.tr.textContent.toLowerCase().indexOf(q) !== -1;
        var roleHit = !activeRole || permOf(row.screen, activeRole) === true;
        row.tr.style.display = (textHit && roleHit) ? '' : 'none';
      });
    }

    if (search) search.addEventListener('input', applyFilter);
  })();
</script>

<!-- テーマ切替: shared/templates/detail-pages/detail-t3-attributes.html(同portal-template.html)からの複製である。
     同ファイルの当該部分を変更した場合は本ファイルも同時更新すること -->
<script>
  (function () {
    var themeBtn = document.getElementById('theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', function () {
        var r = document.documentElement;
        var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', next);
        try { localStorage.setItem('rd-portal-theme', next); } catch (e) {}
      });
    }
    try {
      var saved = localStorage.getItem('rd-portal-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    } catch (e) {}
  })();
</script>

</body>
</html>
