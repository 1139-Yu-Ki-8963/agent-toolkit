<!DOCTYPE html>
<!--
  CRUD図.HTML の静的シェル(テンプレート)

  使い方(マトリクス・対応表: 機能×テーブル):
    将来のビルドスクリプトが本テンプレートを土台に、機能一覧・テーブル一覧の
    マニフェストJSONを突合してプレースホルダ・注入マーカーを機械的に置換し、
    決定的にHTMLを生成する。
    Claude(手作業)によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/detail-pages/detail-t3-attributes.html(同portal-template.html)からの複製である。
  同ファイルの当該部分を変更した場合は本ファイルも同時更新すること
  (unit-list-template.html・feature-list-template.html・screen-list-template.htmlにも
  同種の複製あり。include化は別件)。

  プレースホルダ(将来のビルドスクリプトが注入する。手作業置換禁止。本コメントでは
  二重置換事故を避けるため意図的に波括弧・HTMLコメント記法を外して記載する):
    GENERATED_AT (生成日時マーカー)   : ISO8601 生成日時
    DATA_SOURCE (データ源マーカー)    : 突合元の機能一覧・テーブル一覧マニフェストのパス
    MATRIX_JSON (マトリクスJSON埋め込みマーカー・HTMLコメント形式) :
      script#matrix-manifest にマトリクス・対応表JSONをそのまま埋め込む(二重管理・ドリフト禁止)。
      形式: { "tables": [{"physicalName","logicalName"}...],
              "features": [{"featureId","featureName","cells":{"<物理名>":"CRUD文字列"}}...] }

  答える質問:
    - このテーブルに書き込むのはどの機能か
    - テーブル変更の影響範囲はどこまでか

  制約:
    - 外部リソース(CDN・フォント・画像)は一切使わない。単一ファイル自己完結
    - 行=機能 / 列=テーブル(縦書きヘッダ) / セル=C/R/U/D の組合せ文字列(空なら空欄)
    - 描画はJSが script#matrix-manifest のJSONから行う。HTML側に行を直書きしない
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD図</title>
<style>
  :root,
[data-theme="light"] {
  --bg: #FFFFFF;
  --panel: #FFFFFF;
  --panel-2: #F6F8FA;
  --border: #D1D9E0;
  --border-strong: #AFB8C1;
  --text: #1B1F26;
  --text-sub: #4A4F58;
  --text-muted: #767B85;
  --accent: #0969DA;
  --accent-2: #218BFF;
  --accent-soft: #DDF4FF;
  --accent-border: #54AEFF;
  --gold: #BC4C00;
  --gold-soft: #FFF1E5;
  --gold-border: #D18A5A;
  --success: #1A7F37;
  --success-soft: #DAFBE1;
  --warn: #BC4C00;
  --danger: #CF222E;
  --danger-soft: #FFEBE9;
  --code-bg: #1B1F26;
  --code-fg: #E8E5DC;
  --font-body: "Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","BIZ UDPGothic","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
  --mono: "SFMono-Regular","Menlo","Cascadia Code","Consolas",monospace;
  --shadow-sm: 0 1px 3px rgba(27,31,38,.07), 0 2px 6px rgba(27,31,38,.05);
  --shadow-md: 0 2px 8px rgba(27,31,38,.09), 0 8px 24px rgba(27,31,38,.07);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
    --border: #30363D; --border-strong: #484F58;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
    --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
    --success: #3FB950; --success-soft: #0D2818;
    --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
    --code-bg: #0E1116; --code-fg: #E8E5DC;
  }
}
[data-theme="dark"] {
  --bg: #15171C; --panel: #1C1F26; --panel-2: #21262D;
  --border: #30363D; --border-strong: #484F58;
  --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
  --accent: #58A6FF; --accent-2: #79C0FF; --accent-soft: #132D4B; --accent-border: #1F6FEB;
  --gold: #DB6D28; --gold-soft: #311D08; --gold-border: #7A3E0D;
  --success: #3FB950; --success-soft: #0D2818;
  --warn: #DB6D28; --danger: #F85149; --danger-soft: #3D1214;
  --code-bg: #0E1116; --code-fg: #E8E5DC;
}

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 24px 96px;
    font-family: var(--font-body);
    line-height: 1.7; color: var(--text); background: var(--bg);
    max-width: 1180px; margin-inline: auto;
  }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  header { padding: 40px 0 20px; border-bottom: 3px solid var(--border-strong); }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 1.7rem; margin: 0 0 10px; }
  .theme-toggle-btn {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-sub); cursor: pointer; padding: 5px 12px; font-size: 0.82rem; font-family: inherit;
  }
  .theme-toggle-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
  .meta-table { font-size: 0.88rem; color: var(--text-sub); border-collapse: collapse; }
  .meta-table td { padding: 2px 18px 2px 0; vertical-align: top; }
  .meta-table td:first-child { color: var(--text-muted); white-space: nowrap; }
  .purpose { font-size: 0.86rem; color: var(--text-sub); margin: 10px 0 0; }

  .summary-tiles { display: flex; gap: 14px; margin: 20px 0; flex-wrap: wrap; }
  .tile {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 18px; font-size: 0.85rem; color: var(--text-sub);
  }
  .tile strong { display: block; font-size: 1.3rem; color: var(--text); }

  .toolbar { display: flex; gap: 10px; margin: 24px 0 10px; align-items: center; flex-wrap: wrap; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 220px; padding: 8px 12px; font-size: 0.92rem;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--panel); color: var(--text);
  }
  .toolbar .note { font-size: 0.82rem; color: var(--text-muted); }

  .legend { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; margin: 0 0 10px; font-size: 0.82rem; color: var(--text-sub); }
  .legend .swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: -2px; margin-right: 5px; border: 1px solid var(--border); }
  .legend .swatch-c { background: var(--gold-soft); border-color: var(--gold-border); }
  .legend .swatch-d { background: var(--danger-soft); border-color: var(--danger); }

  table.crud {
    border-collapse: separate; border-spacing: 0; font-size: 0.85rem;
    min-width: 100%;
  }
  table.crud th, table.crud td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
  table.crud thead th { border-top: 1px solid var(--border); background: var(--panel-2); }

  /* 列ヘッダ: テーブル物理名を縦書きで省スペース化 */
  table.crud thead th.tbl-col {
    height: 150px; min-width: 36px; max-width: 44px;
    vertical-align: bottom; padding: 8px 4px; text-align: center;
  }
  table.crud thead th.tbl-col span {
    writing-mode: vertical-rl; text-orientation: mixed;
    font-family: var(--mono); font-size: 0.78rem; font-weight: 600;
    color: var(--text-sub); white-space: nowrap;
  }

  /* 1列目(機能名)は sticky で固定 */
  table.crud th.feature-col, table.crud td.feature-name {
    position: sticky; left: 0; z-index: 2;
    background: var(--panel);
    border-right: 2px solid var(--border-strong);
    text-align: left; padding: 6px 12px; white-space: nowrap;
  }
  table.crud thead th.feature-col {
    z-index: 3; background: var(--panel-2); vertical-align: bottom; font-size: 0.8rem;
  }
  table.crud td.feature-name { font-weight: 600; font-size: 0.85rem; }

  table.crud td.crud-cell {
    text-align: center; padding: 5px 4px; min-width: 36px;
    font-family: var(--mono); font-size: 0.82rem; letter-spacing: 1px;
    color: var(--text-sub); cursor: default;
  }
  /* C を含むセル(新規作成)は gold 系、D を含むセル(削除)は danger 系で強調 */
  table.crud td.crud-cell.has-c { background: var(--gold-soft); color: var(--gold); font-weight: 700; }
  table.crud td.crud-cell.has-d { background: var(--danger-soft); color: var(--danger); font-weight: 700; }

  /* hover で行・列を同時ハイライト(JSが .hl を付与) */
  table.crud td.hl, table.crud th.hl {
    box-shadow: inset 0 0 0 999px color-mix(in srgb, var(--accent) 16%, transparent);
  }

  /* ?q= 指定時の該当テーブル列ハイライト(JSが .q-hit を付与。has-c/has-d の強調色が優先) */
  table.crud td.q-hit, table.crud th.q-hit { background: var(--accent-soft); }

  /* 行ヘッダセルのコピーボタン(一覧ページと同じ inline SVG 方式) */
  .copy-btn { background: none; border: none; cursor: pointer; padding: 1px 3px; color: var(--text-muted); opacity: .35; vertical-align: middle; }
  tr:hover .copy-btn, .copy-btn:focus { opacity: 1; }
  .copy-btn:hover { color: var(--accent); }

  footer { margin-top: 48px; font-size: 0.8rem; color: var(--text-muted); }
/* ─── 統一ヘッダー ─── */
.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;
  background: linear-gradient(180deg, var(--panel, #fff) 0%, var(--panel-2, #f8f9fa) 100%);
  border-bottom: 1px solid var(--border, #dee2e6);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: baseline; gap: 8px; color: var(--text, #212529); text-decoration: none; }
.brand:hover { text-decoration: none; }
.brand-icon { display: inline-flex; align-items: center; }
.brand-title { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: var(--text-muted, #6c757d); }
.header-meta { font-size: 12px; color: var(--text-muted, #6c757d); display: flex; align-items: center; gap: 8px; }
.top-actions { display: flex; align-items: center; gap: 8px; }
.top-actions button {
  background: var(--panel-2, #f8f9fa); border: 1px solid var(--border, #dee2e6); border-radius: var(--radius-sm, 6px);
  color: var(--text-sub, #495057); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.top-actions button:hover { background: var(--accent-soft, #e8f4fd); color: var(--accent, #0969da); border-color: var(--accent-border, #0969da); }
</style>
</head>
<body>

<header class="topbar">
  <a class="brand" href="../../index.html">
    <span class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zM13 9V3.5L18.5 9H13z"/></svg></span>
    <span class="brand-title">{{PROJECT_NAME}}</span>
    <span class="brand-sub">設計ポータル</span>
  </a>
  <div class="header-meta">
    <span class="pm-updated">更新: {{GENERATED_AT}}</span>
  </div>
  <div class="top-actions">
    <button id="theme-toggle" title="テーマ切替">ライト</button>
  </div>
</header>
<section class="page-hero">
  <nav class="back-link" style="margin: 16px 0 0; font-size: 0.85rem;">
    <a href="../../index.html" style="color: var(--text-sub); text-decoration: none; border-bottom: 1px dotted var(--text-muted);">← ポータルへ戻る</a>
  </nav>
  <div class="header-top">
    <h1>CRUD図（機能×テーブル）</h1>
  </div>
  <table class="meta-table">
    <tr><td>データ源</td><td><code>{{DATA_SOURCE}}</code></td></tr>
    <tr><td>種別</td><td>マトリクス・対応表（機能×テーブル）</td></tr>
  </table>
  <p class="purpose">「このテーブルに書き込むのはどの機能か」「テーブル変更の影響範囲はどこまでか」に答えるマトリクス・対応表。</p>

  <div class="summary-tiles">
    <div class="tile"><strong id="tile-feature-count">0</strong>機能数</div>
    <div class="tile"><strong id="tile-table-count">0</strong>テーブル数</div>
    <div class="tile"><strong id="tile-write-table-count">0</strong>書き込み(C/U/D)を受けるテーブル数</div>
  </div>
</section>

<div class="toolbar">
  <input type="search" id="matrix-search" placeholder="機能名・テーブル物理名で絞り込み">
  <span class="note">セルにマウスを重ねると行・列を同時ハイライト</span>
</div>

<div class="legend">
  <span class="legend-item"><span class="swatch swatch-c"></span>C を含むセル（新規作成あり）</span>
  <span class="legend-item"><span class="swatch swatch-d"></span>D を含むセル（削除あり・C より優先表示）</span>
  <span class="legend-item">C/R/U/D = 作成/参照/更新/削除。空欄はアクセスなし</span>
</div>

<div class="table-wrap">
  <table class="crud" id="crud-matrix">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script type="application/json" id="matrix-manifest">
<!--MATRIX_JSON-->
</script>

<footer></footer>

<script>
  (function () {
    var data = { tables: [], features: [] };
    try {
      data = JSON.parse(document.getElementById('matrix-manifest').textContent);
    } catch (e) { /* テンプレート状態(未注入)では空のまま描画 */ }
    var tables = data.tables || [];
    var features = data.features || [];

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    var table = document.getElementById('crud-matrix');
    var thead = table.querySelector('thead');
    var tbody = table.querySelector('tbody');

    /* ヘッダ描画(1列目=機能名 sticky、以降=テーブル物理名 縦書き) */
    var headHtml = '<tr><th class="feature-col">機能＼テーブル</th>';
    tables.forEach(function (t) {
      headHtml += '<th class="tbl-col" title="' + esc(t.logicalName || '') + '"><span>' + esc(t.physicalName) + '</span></th>';
    });
    headHtml += '</tr>';
    thead.innerHTML = headHtml;

    /* 行描画(行=機能、セル=C/R/U/D の組合せ文字列) */
    var bodyHtml = '';
    features.forEach(function (f) {
      var cells = f.cells || {};
      var haystack = [f.featureId, f.featureName];
      var rowHtml = '<td class="feature-name" title="' + esc(f.featureId || '') + '">' + esc(f.featureName) + '</td>';
      tables.forEach(function (t) {
        var v = cells[t.physicalName] || '';
        var cls = 'crud-cell';
        if (v.indexOf('C') !== -1) cls += ' has-c';
        if (v.indexOf('D') !== -1) cls += ' has-d';
        if (v) haystack.push(t.physicalName);
        rowHtml += '<td class="' + cls + '">' + esc(v) + '</td>';
      });
      bodyHtml += '<tr data-search="' + esc(haystack.join(' ').toLowerCase()) + '">' + rowHtml + '</tr>';
    });
    tbody.innerHTML = bodyHtml;

    /* summary-tiles */
    document.getElementById('tile-feature-count').textContent = features.length;
    document.getElementById('tile-table-count').textContent = tables.length;
    var writeCount = tables.filter(function (t) {
      return features.some(function (f) {
        var v = (f.cells || {})[t.physicalName] || '';
        return /[CUD]/.test(v);
      });
    }).length;
    document.getElementById('tile-write-table-count').textContent = writeCount;

    /* 検索絞り込み(機能名・機能ID・アクセスのあるテーブル物理名) */
    var search = document.getElementById('matrix-search');
    if (search) {
      search.addEventListener('input', function () {
        var q = search.value.trim().toLowerCase();
        Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function (tr) {
          tr.style.display = (!q || (tr.getAttribute('data-search') || '').indexOf(q) !== -1) ? '' : 'none';
        });
      });
    }

    /* ?q= 受け口: テーブル一覧「CRUD図参照」リンクからの遷移。検索窓へ反映して絞り込みを発火し、
       q がテーブル物理名に一致する場合は該当列を .q-hit でハイライトする */
    var initialQ = (new URLSearchParams(location.search).get('q') || '').trim();
    if (initialQ && search) {
      search.value = initialQ;
      search.dispatchEvent(new Event('input'));
      var qLower = initialQ.toLowerCase();
      tables.forEach(function (t, i) {
        if (String(t.physicalName).toLowerCase() !== qLower) return;
        var colIdx = i + 1;
        var headRow = thead.querySelector('tr');
        if (headRow && headRow.children[colIdx]) headRow.children[colIdx].classList.add('q-hit');
        Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function (tr) {
          if (tr.children[colIdx]) tr.children[colIdx].classList.add('q-hit');
        });
      });
    }

    /* 行ヘッダ(機能名)セルのコピーボタン(一覧ページと同じ inline SVG 方式) */
    var COPY_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    var CHECK_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }
    function copyText(text, done) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function () { fallbackCopy(text); done(); });
      } else {
        fallbackCopy(text);
        done();
      }
    }
    Array.prototype.forEach.call(tbody.querySelectorAll('td.feature-name'), function (td) {
      var text = td.textContent.trim();
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'copy-btn';
      btn.setAttribute('aria-label', 'コピー');
      btn.innerHTML = COPY_ICON;
      btn.addEventListener('click', function () {
        copyText(text, function () {
          btn.innerHTML = CHECK_ICON;
          setTimeout(function () { btn.innerHTML = COPY_ICON; }, 1200);
        });
      });
      td.appendChild(btn);
    });

    /* hover で行・列を同時ハイライト(同列セルに class 付与) */
    function clearHl() {
      Array.prototype.forEach.call(table.querySelectorAll('.hl'), function (el) {
        el.classList.remove('hl');
      });
    }
    tbody.addEventListener('mouseover', function (ev) {
      var cell = ev.target.closest('td');
      if (!cell || !tbody.contains(cell)) return;
      clearHl();
      var colIdx = cell.cellIndex;
      Array.prototype.forEach.call(cell.parentNode.children, function (c) { c.classList.add('hl'); });
      Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function (tr) {
        if (tr.children[colIdx]) tr.children[colIdx].classList.add('hl');
      });
      var th = thead.querySelector('tr').children[colIdx];
      if (th) th.classList.add('hl');
    });
    tbody.addEventListener('mouseleave', clearHl);
  })();
</script>

<script>
  (function () {
    var themeBtn = document.getElementById('theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', function() {
        var r = document.documentElement;
        var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', next);
        themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
        try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
      });
    }
    try {
      var saved = localStorage.getItem('rd-portal-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        var tb = document.getElementById('theme-toggle');
        if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
      }
    } catch(e) {}
  })();
</script>

</body>
</html>
