<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — 設計ポータル</title>
<!--
  detail-pages T8 デザインシステム型テンプレート — 設計スキル群
  生成: shared/scripts/detail-pages/build-detail-page.sh
  プレースホルダ置換は build-detail-page.sh の render_template() が行う。
  手作業によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/portal-template.html からの複製である。
  同テンプレートの当該部分を変更した場合は本ファイルも同時更新すること
  （T1一覧テンプレート群・T2〜T6テンプレートにも同種の複製あり。include化は別件）。

  プレースホルダ(build-detail-page.shが注入。実際のマーカー記法は
  scripts/detail-pages/build-detail-page.sh 冒頭コメントを定義とする。本コメントでは
  二重置換事故を避けるため意図的に波括弧を外して記載する):
    TITLE (ページ見出しマーカー)         : page-data.json の title
    DESCRIPTION (ページ概要マーカー)     : page-data.json の description
    GENERATED_AT (生成日時マーカー)      : page-data.json の generatedAt
    PAGE_DATA_JSON (page-data埋め込みマーカー) : page-data.json の内容全体(本ファイル物理末尾のscriptタグへ注入)

  pageKind: design-system
  page-data.json 想定構造(本テンプレートのJSが直接参照する型別スロット。
  定義スキーマへの追記は別件・page-data-schema.mdは本ファイルの変更対象外):
    tokens: {
      colors: [{ name: string, hex: string, usage: string }],
      typography: [{ name: string, fontFamily: string, size?: string, weight?: string, description?: string }],
      spacing: [{ name: string, value: string }],
      components: [{ name: string, description: string }]
    }
    summary: [{ label: string, value: string, note?: string }]（任意。要約タイル）
  4セクション(Colors / Typography / Spacing / Components)を固定順で表示する。
  各配列が空の場合は該当セクションに「なし」を1行表示する。
-->
<style>
/* TOKENS_CSS */

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.dp-page { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; overflow: hidden; }

.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); }
.brand:hover { text-decoration: none; }
.brand-icon { display: inline-flex; align-items: center; }
.brand-title { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: var(--text-muted, #6c757d); }
.top-actions { display: flex; align-items: center; gap: 8px; }
.top-actions button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 8px 16px; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
.header-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }

.dp-main { max-width: 1280px; width: 100%; min-width: 0; margin: 0 auto; padding: 24px 24px 64px; overflow-y: auto; min-height: 0; }

.doc-crumbs { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.doc-crumbs a { color: var(--text-sub); cursor: pointer; }
.doc-crumbs a:hover { color: var(--accent); }

.dp-hero {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  padding: 4px 2px 14px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap;
}
.dp-hero h1 { font-size: 23px; margin: 0; }
.dp-hero p { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 0; }
.dp-updated {
  font-size: 12px; color: var(--text-sub); background: var(--accent-soft);
  border: 1px solid var(--accent-border); border-radius: 999px; padding: 3px 12px; white-space: nowrap;
}

.sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-sub);
  display: flex; align-items: center; gap: 8px; margin: 24px 0 12px;
}
.sec-label:first-of-type { margin-top: 6px; }
.sec-label::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }

/* 要約タイル */
.tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 14px; margin-bottom: 10px; min-width: 0; }
.tile-card {
  background: var(--panel); border: 1px solid var(--border); min-width: 0;
  border-radius: var(--radius); padding: 14px 16px 13px; box-shadow: var(--shadow-sm);
}
.tile-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.02em; color: var(--text-sub); margin-bottom: 4px; }
.tile-value { font-size: 24px; font-weight: 800; line-height: 1.15; font-family: var(--mono); color: var(--text); overflow-wrap: break-word; }
.tile-note { font-size: 11.5px; color: var(--text-muted); margin-top: 5px; }

/* Colors */
.color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; min-width: 0; }
.color-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; min-width: 0; }
.color-swatch { height: 64px; border-bottom: 1px solid var(--border); }
.color-info { padding: 10px 12px; }
.color-name { font-weight: 700; font-size: 13px; }
.color-hex { font-family: var(--mono); font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
.color-usage { font-size: 11.5px; color: var(--text-sub); margin-top: 6px; }

/* Typography */
.type-grid { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
.type-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.type-sample { font-size: 28px; line-height: 1; overflow-wrap: break-word; }
.type-meta { font-size: 12px; color: var(--text-muted); text-align: right; }
.type-meta .type-name { color: var(--text-sub); font-weight: 700; display: block; margin-bottom: 2px; }

/* Spacing */
.spacing-list { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.spacing-row { display: flex; align-items: center; gap: 12px; font-size: 12.5px; }
.spacing-label { width: 110px; flex-shrink: 0; color: var(--text-sub); overflow-wrap: break-word; }
.spacing-bar-wrap { flex: 1; background: var(--panel-2); border-radius: 4px; height: 14px; min-width: 40px; }
.spacing-bar { background: var(--accent); height: 100%; border-radius: 4px; }
.spacing-value { width: 64px; text-align: right; font-family: var(--mono); color: var(--text-muted); flex-shrink: 0; }

/* Components */
.component-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; min-width: 0; }
.component-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; min-width: 0; }
.component-name { font-weight: 700; font-size: 13.5px; margin-bottom: 4px; }
.component-desc { font-size: 12px; color: var(--text-sub); }

.empty-note {
  font-size: 12.5px; color: var(--text-muted); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px;
}

.note-box {
  font-size: 12px; color: var(--text-sub); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; margin: 14px 0 0;
}

.footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
  display: flex; gap: 20px; justify-content: center;
}

@media (max-width: 760px) {
  .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
  .dp-main { padding: 14px; }
  .tile-grid, .color-grid, .component-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
@media (max-width: 560px) {
  body { font-size: 14px; }
  .dp-hero h1 { font-size: 20px; }
  .dp-main { padding: 12px; }
  .tile-grid { grid-template-columns: 1fr 1fr; }
  .type-card { flex-direction: column; align-items: flex-start; }
  .type-meta { text-align: left; }
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="dp-page">
  <header class="topbar">
    <a class="brand" href="{{BACK_LINK}}">
      <span class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zM13 9V3.5L18.5 9H13z"/></svg></span>
      <span class="brand-title">{{PROJECT_NAME}}</span>
      <span class="brand-sub">設計ポータル</span>
    </a>
    <div class="header-meta">
      <span class="pm-updated">更新: {{GENERATED_AT}}{{COMMIT_SHORT}}</span>
    </div>
    <div class="top-actions">
      <button id="theme-toggle" title="テーマ切替">ライト</button>
    </div>
  </header>

  <main class="dp-main">
    <div class="doc-crumbs"><a href="{{BACK_LINK}}">← ポータル TOP へ戻る</a></div>
    <div class="dp-hero">
      <div>
        <h1>{{TITLE}}</h1>
        <p>{{DESCRIPTION}}</p>
      </div>
    </div>

    <div class="tile-grid" id="tiles-mount"></div>

    <div class="sec-label">Colors</div>
    <div class="color-grid" id="colors-mount"></div>

    <div class="sec-label">Typography</div>
    <div class="type-grid" id="typography-mount"></div>

    <div class="sec-label">Spacing</div>
    <div class="spacing-list" id="spacing-mount"></div>

    <div class="sec-label">Components</div>
    <div class="component-grid" id="components-mount"></div>

    <!--RELATED_ENTITIES--><div id="unresolved-mount"></div>
  </main>

  <footer class="footer">
    <span></span>
  </footer>
</div>

<script type="application/json" id="page-data">
{{PAGE_DATA_JSON}}
</script>

<script>
(function() {
  var data = JSON.parse(document.getElementById('page-data').textContent);
  var tokens = data.tokens || {};

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      if (k === 'html') node.innerHTML = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  // --- 要約タイル(summary[]) ---
  var tilesMount = document.getElementById('tiles-mount');
  (data.summary || []).forEach(function(t) {
    var card = el('div', { class: 'tile-card' });
    card.appendChild(el('div', { class: 'tile-label' }, t.label || ''));
    card.appendChild(el('div', { class: 'tile-value' }, String(t.value != null ? t.value : '')));
    if (t.note) card.appendChild(el('div', { class: 'tile-note' }, t.note));
    tilesMount.appendChild(card);
  });

  // --- Colors(tokens.colors[]) ---
  var colorsMount = document.getElementById('colors-mount');
  var colors = tokens.colors || [];
  if (colors.length === 0) {
    colorsMount.appendChild(el('div', { class: 'empty-note' }, 'なし'));
  } else {
    colors.forEach(function(c) {
      var swatch = el('div', { class: 'color-swatch' });
      swatch.style.background = c.hex || 'transparent';
      var info = el('div', { class: 'color-info' }, [
        el('div', { class: 'color-name' }, c.name || ''),
        el('div', { class: 'color-hex' }, c.hex || ''),
        el('div', { class: 'color-usage' }, c.usage || '')
      ]);
      colorsMount.appendChild(el('div', { class: 'color-card' }, [swatch, info]));
    });
  }

  // --- Typography(tokens.typography[]) ---
  var typographyMount = document.getElementById('typography-mount');
  var typography = tokens.typography || [];
  if (typography.length === 0) {
    typographyMount.appendChild(el('div', { class: 'empty-note' }, 'なし'));
  } else {
    typography.forEach(function(t) {
      var sample = el('div', { class: 'type-sample' }, 'Aa Bb Cc');
      if (t.fontFamily) sample.style.fontFamily = t.fontFamily;
      if (t.size) sample.style.fontSize = t.size;
      if (t.weight) sample.style.fontWeight = t.weight;
      var metaLines = [el('span', { class: 'type-name' }, t.name || '')];
      var metaParts = [];
      if (t.fontFamily) metaParts.push(t.fontFamily);
      if (t.size) metaParts.push(t.size);
      if (t.weight) metaParts.push(String(t.weight));
      metaLines.push(el('span', null, metaParts.join(' / ')));
      if (t.description) metaLines.push(el('span', null, t.description));
      var meta = el('div', { class: 'type-meta' }, metaLines);
      typographyMount.appendChild(el('div', { class: 'type-card' }, [sample, meta]));
    });
  }

  // --- Spacing(tokens.spacing[]) ---
  var spacingMount = document.getElementById('spacing-mount');
  var spacing = tokens.spacing || [];
  if (spacing.length === 0) {
    spacingMount.appendChild(el('div', { class: 'empty-note' }, 'なし'));
  } else {
    var maxVal = 0;
    var numVals = spacing.map(function(s) {
      var n = parseFloat(String(s.value != null ? s.value : '').replace(/[^0-9.]/g, ''));
      if (!isNaN(n) && n > maxVal) maxVal = n;
      return isNaN(n) ? 0 : n;
    });
    if (maxVal <= 0) maxVal = 1;
    spacing.forEach(function(s, i) {
      var pct = Math.min(100, Math.round((numVals[i] / maxVal) * 100));
      var barWrap = el('div', { class: 'spacing-bar-wrap' });
      var bar = el('div', { class: 'spacing-bar' });
      bar.style.width = pct + '%';
      barWrap.appendChild(bar);
      var row = el('div', { class: 'spacing-row' }, [
        el('div', { class: 'spacing-label' }, s.name || ''),
        barWrap,
        el('div', { class: 'spacing-value' }, String(s.value != null ? s.value : ''))
      ]);
      spacingMount.appendChild(row);
    });
  }

  // --- Components(tokens.components[]) ---
  var componentsMount = document.getElementById('components-mount');
  var components = tokens.components || [];
  if (components.length === 0) {
    componentsMount.appendChild(el('div', { class: 'empty-note' }, 'なし'));
  } else {
    components.forEach(function(c) {
      componentsMount.appendChild(el('div', { class: 'component-card' }, [
        el('div', { class: 'component-name' }, c.name || ''),
        el('div', { class: 'component-desc' }, c.description || '')
      ]));
    });
  }

  // --- 未解決節(unresolved[]) ---
  var unresolvedMount = document.getElementById('unresolved-mount');
  var unresolved = data.unresolved || [];
  if (unresolved.length > 0) {
    unresolvedMount.appendChild(el('div', { class: 'sec-label' }, '未解決'));
    var box = el('div', { class: 'note-box' });
    unresolved.forEach(function(u) {
      var line = (u.label || '') + '（' + (u.reason || '') + '）';
      box.appendChild(el('div', null, line));
    });
    unresolvedMount.appendChild(box);
  }

  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var r = document.documentElement;
    var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
    themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
    try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
  });
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
