<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{DOC_TITLE}}</title>
<style>
  /* TOKENS_CSS */

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: var(--font-body);
    line-height: 1.7; color: var(--text); background: var(--bg);
  }
  .topbar {
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 12px;
    padding: 10px 20px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 8px; color: var(--text); text-decoration: none; font-weight: 700; font-size: 0.95rem; }
  .brand:hover { color: var(--accent); }
  .brand-sub { font-size: 11px; font-weight: 400; color: var(--text-muted, #6c757d); }
  #theme-toggle {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-sub); cursor: pointer; padding: 4px 12px; font-family: inherit; font-size: 0.82rem;
  }
  #theme-toggle:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
  .header-meta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .doc-nav { max-width: 860px; margin: 0 auto; padding: 12px 24px 0; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; border-bottom: 2px solid var(--border); }
  .doc-nav .back-link { margin-right: auto; font-size: 12px; color: var(--text-sub); text-decoration: none; }
  .doc-nav .back-link:hover { color: var(--accent); }
  .doc-tab { padding: 5px 16px; border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; font-size: 13px; text-decoration: none; color: var(--text-sub); background: var(--panel); }
  .doc-tab.active { color: var(--accent); font-weight: 700; border-color: var(--accent); background: var(--bg); }
  .doc-main {
    max-width: 860px; margin: 0 auto; padding: 32px 24px 96px;
  }
  .doc-main h1 { font-size: 1.6rem; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border-strong); color: var(--text); }
  .doc-main h2 { font-size: 1.3rem; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); color: var(--text); }
  .doc-main h3 { font-size: 1.1rem; margin: 24px 0 8px; color: var(--text); }
  .doc-main h4 { font-size: 1rem; margin: 20px 0 6px; color: var(--text-sub); }
  .doc-main p { margin: 8px 0; }
  .doc-main ul, .doc-main ol { padding-left: 24px; margin: 8px 0; }
  .doc-main li { margin: 4px 0; }
  .doc-main code {
    background: var(--code-bg); color: var(--code-fg); padding: 1px 6px;
    border-radius: 4px; font-family: var(--mono); font-size: 0.85em;
  }
  .doc-main blockquote {
    border-left: 3px solid var(--accent-border); margin: 12px 0; padding: 8px 16px;
    background: var(--panel); color: var(--text-sub); font-size: 0.95rem;
  }
  .doc-main table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.9rem; }
  .doc-main th { background: var(--panel); font-weight: 700; text-align: left; }
  .doc-main th, .doc-main td { padding: 8px 12px; border: 1px solid var(--border); }
  .doc-main hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .doc-main pre { background: var(--code-bg); color: var(--code-fg); padding: 12px 16px; border-radius: var(--radius-sm); overflow-x: auto; font-family: var(--mono); font-size: 0.85em; line-height: 1.5; }
  .footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
    display: flex; gap: 20px; justify-content: center;
  }
  @media (max-width: 760px) {
    .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
    .doc-main { padding: 14px; }
  }
</style>
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{PORTAL_INDEX_HREF}}">
    <span class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zM13 9V3.5L18.5 9H13z"/></svg></span>
    <span class="brand-title">{{PROJECT_NAME}}</span>
    <span class="brand-sub">設計ポータル</span>
  </a>
  <div class="header-meta">
    <span class="pm-updated">更新: {{GENERATED_DATE}}{{COMMIT_SHORT}}</span>
  </div>
  <div class="top-actions">
    <button id="theme-toggle" title="テーマ切替">ライト</button>
  </div>
</header>
<nav class="doc-nav">{{DOC_NAV}}</nav>

<main class="doc-main" id="doc-content"></main>

<footer class="footer">画面設計書ビューア — build-portal.sh により自動生成</footer>

<script type="text/plain" id="doc-md">
{{DOC_MARKDOWN}}
</script>

<script>
(function () {
  var src = document.getElementById('doc-md').textContent;

  // frontmatter 除去
  src = src.replace(/^\s*---[\s\S]*?---\s*/, '');

  var lines = src.split('\n');
  var html = [];
  var inTable = false;
  var inList = false;
  var listType = '';
  var inBlockquote = false;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function inlineFormat(s) {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/!\[([^\]]*)\]\(([^()\s]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');
    s = s.replace(/\[([^\]]+)\]\(([^()\s]+)\)/g, '<a href="$2">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }

  function closeList() {
    if (inList) { html.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }
  }
  function closeBlockquote() {
    if (inBlockquote) { html.push('</blockquote>'); inBlockquote = false; }
  }
  function closeTable() {
    if (inTable) { html.push('</tbody></table>'); inTable = false; }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var trimmed = line.trim();

    // 空行
    if (!trimmed) { closeList(); closeBlockquote(); continue; }

    // 見出し
    var hm = trimmed.match(/^(#{1,6})\s+(.*)$/);
    if (hm) { closeList(); closeBlockquote(); closeTable(); var lv = hm[1].length; html.push('<h' + lv + '>' + inlineFormat(hm[2]) + '</h' + lv + '>'); continue; }

    // 水平線
    if (/^---+$/.test(trimmed) || /^\*\*\*+$/.test(trimmed)) { closeList(); closeBlockquote(); closeTable(); html.push('<hr>'); continue; }

    // テーブル
    if (trimmed.indexOf('|') !== -1 && trimmed.charAt(0) === '|') {
      closeList(); closeBlockquote();
      var cells = trimmed.split('|').filter(function(c,j,a){ return j > 0 && j < a.length - 1; });
      if (/^[\s|:-]+$/.test(trimmed)) continue; // separator 行
      if (!inTable) {
        html.push('<table><thead><tr>');
        cells.forEach(function(c) { html.push('<th>' + inlineFormat(c.trim()) + '</th>'); });
        html.push('</tr></thead><tbody>');
        inTable = true;
      } else {
        html.push('<tr>');
        cells.forEach(function(c) { html.push('<td>' + inlineFormat(c.trim()) + '</td>'); });
        html.push('</tr>');
      }
      continue;
    } else { closeTable(); }

    // 引用
    if (trimmed.charAt(0) === '>') {
      closeList(); closeTable();
      if (!inBlockquote) { html.push('<blockquote>'); inBlockquote = true; }
      html.push('<p>' + inlineFormat(trimmed.substring(1).trim()) + '</p>');
      continue;
    } else { closeBlockquote(); }

    // 番号付きリスト
    var olm = trimmed.match(/^(\d+)\.\s+(.*)$/);
    if (olm) {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ol') { closeList(); html.push('<ol>'); inList = true; listType = 'ol'; }
      html.push('<li>' + inlineFormat(olm[2]) + '</li>');
      continue;
    }

    // 箇条書き
    if (trimmed.charAt(0) === '-' && trimmed.charAt(1) === ' ') {
      closeTable(); closeBlockquote();
      if (!inList || listType !== 'ul') { closeList(); html.push('<ul>'); inList = true; listType = 'ul'; }
      html.push('<li>' + inlineFormat(trimmed.substring(2)) + '</li>');
      continue;
    }

    // 通常段落
    closeList(); closeTable(); closeBlockquote();
    html.push('<p>' + inlineFormat(trimmed) + '</p>');
  }
  closeList(); closeTable(); closeBlockquote();

  document.getElementById('doc-content').innerHTML = html.join('\n');
})();
</script>

<script>
(function () {
  var themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      var r = document.documentElement;
      var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', next);
      themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
      try { localStorage.setItem('rd-portal-theme', next); } catch (e) {}
    });
  }
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      var tb = document.getElementById('theme-toggle');
      if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
    }
  } catch (e) {}
})();
</script>
</body>
</html>
