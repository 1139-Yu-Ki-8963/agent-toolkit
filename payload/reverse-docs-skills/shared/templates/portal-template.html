<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>リバース設計ポータル — {{PROJECT_NAME}}</title>
<!-- Material Symbols Outlined（CDN）。オフライン時はアイコン名がテキスト表示される -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<!--
  ポータルテンプレート — リバース設計スキル群
  生成: shared/scripts/build-portal.sh
  プレースホルダ置換は build-portal.sh の render_template() が行う。
  手作業によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。

  プレースホルダ一覧:
    {{PROJECT_NAME}}     — プロジェクト名（basename target_repo_path）
    {{GENERATED_DATE}}   — 生成日（date +%Y-%m-%d）
    {{METRICS_JSON}}     — 解析サマリ JSON オブジェクト（scale/tests/freshness/previous の構造化データ）
    {{CATEGORIES_JSON}}  — カテゴリ・ツール JSON 配列
-->
<style>
:root,
[data-theme="light"] {
  --bg: #F7F5EE;
  --panel: #FFFFFF;
  --panel-2: #F0EDE3;
  --border: #DAD5C5;
  --border-strong: #BFB9A6;
  --text: #1B1F26;
  --text-sub: #4A4F58;
  --text-muted: #767B85;
  --accent: #3F4F8E;
  --accent-2: #5A6BAE;
  --accent-soft: #E6E9F3;
  --accent-border: #BAC2DC;
  --gold: #9B7A1F;
  --gold-soft: #F5EFD9;
  --gold-border: #DDC68A;
  --success: #3F4F8E;
  --success-soft: #E6E9F3;
  --warn: #9B7A1F;
  --danger: #9B3F2D;
  --danger-soft: #F5E2DC;
  --code-bg: #1B1F26;
  --code-fg: #E8E5DC;
  --mono: "SFMono-Regular","Menlo","Consolas",monospace;
  --shadow-sm: 0 1px 2px rgba(27,31,38,.05), 0 1px 4px rgba(27,31,38,.04);
  --shadow-md: 0 2px 6px rgba(27,31,38,.07), 0 8px 24px rgba(27,31,38,.06);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #15171C; --panel: #1C1F26; --panel-2: #232730;
    --border: #353944; --border-strong: #4A4F5C;
    --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
    --accent: #8FA3DB; --accent-2: #A8B8E5; --accent-soft: #2A2E47; --accent-border: #4C5680;
    --gold: #D4B45D; --gold-soft: #3D3520; --gold-border: #7A6633;
    --success: #8FA3DB; --success-soft: #2A2E47;
    --warn: #D4B45D; --danger: #D4836E; --danger-soft: #3F2620;
    --code-bg: #0E1116; --code-fg: #E8E5DC;
  }
}
[data-theme="dark"] {
  --bg: #15171C; --panel: #1C1F26; --panel-2: #232730;
  --border: #353944; --border-strong: #4A4F5C;
  --text: #E8E5DC; --text-sub: #B6B3AB; --text-muted: #888784;
  --accent: #8FA3DB; --accent-2: #A8B8E5; --accent-soft: #2A2E47; --accent-border: #4C5680;
  --gold: #D4B45D; --gold-soft: #3D3520; --gold-border: #7A6633;
  --success: #8FA3DB; --success-soft: #2A2E47;
  --warn: #D4B45D; --danger: #D4836E; --danger-soft: #3F2620;
  --code-bg: #0E1116; --code-fg: #E8E5DC;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* アイコンフォント読込ガード:
   フォント読込を document.fonts.check で確認できるまでアイコンを描画しない。
   未読込のままだと ligature 名（"stacks" 等）が生テキストで露出しレイアウトを壊すため。 */
.material-symbols-outlined { display: none; }
.icons-ready .material-symbols-outlined {
  display: inline-block;
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  vertical-align: middle;
  font-size: 20px;
}
/* フォントが来ないときはアイコン用の空き箱ごと畳む（空白のガタつき防止） */
html:not(.icons-ready) .card-icon,
html:not(.icons-ready) .brand-icon { display: none; }

.pm-page { display: grid; grid-template-rows: auto 1fr auto; min-height: 100vh; }

.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: baseline; gap: 8px; color: var(--text); }
.brand:hover { text-decoration: none; }
.brand-icon { display: inline-flex; align-items: center; }
.brand-icon .material-symbols-outlined { font-size: 22px; color: var(--accent); }
.brand-title { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; color: var(--text-muted); }
.topnav { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.topnav a { color: var(--text-sub); font-weight: 500; font-size: 13px; padding: 4px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
.topnav a:hover { background: var(--accent-soft); color: var(--accent); text-decoration: none; }
.topnav a .material-symbols-outlined { font-size: 14px; }
.top-actions { display: flex; align-items: center; gap: 8px; }
.top-actions button {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-sub); cursor: pointer; padding: 5px 10px; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 4px;
}
.top-actions button .material-symbols-outlined { font-size: 16px; }
.top-actions button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }

.pm-main { max-width: 1280px; width: 100%; min-width: 0; margin: 0 auto; padding: 24px 24px 64px; }

.pm-hero {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  padding: 4px 2px 14px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap;
}
.pm-hero h1 { font-size: 23px; margin: 0; }
.pm-hero p { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 0; }
.pm-updated {
  font-size: 12px; color: var(--text-sub); background: var(--accent-soft);
  border: 1px solid var(--accent-border); border-radius: 999px; padding: 3px 12px; white-space: nowrap;
}

.sec-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-sub);
  display: flex; align-items: center; gap: 8px; margin: 6px 0 12px;
}
.sec-label::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }

.metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 14px; margin-bottom: 30px; }
.metric-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px 13px; box-shadow: var(--shadow-sm);
}
.metric-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 700; letter-spacing: 0.02em; color: var(--text-sub); margin-bottom: 4px;
}
.metric-label .material-symbols-outlined { font-size: 14px; color: var(--accent); }
.metric-value { font-size: 28px; font-weight: 800; line-height: 1.15; font-family: var(--mono); color: var(--text); }
.metric-value .unit { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-left: 3px; }
.metric-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 5px; }
.metric-sub b { color: var(--text-sub); font-weight: 700; }
a.metric-card { display: block; color: var(--text); cursor: pointer; transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
a.metric-card:hover, a.metric-card:focus-visible { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--accent); text-decoration: none; outline: none; }

.count-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.count-tag {
  font-size: 11px; color: var(--text-sub); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: 999px; padding: 1px 9px; white-space: nowrap;
}
.count-tag b { font-family: var(--mono); font-weight: 800; color: var(--text); }

.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.card {
  display: block; background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; color: var(--text);
  transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  box-shadow: var(--shadow-sm);
}
.card:hover {
  transform: translateY(-2px); box-shadow: var(--shadow-md);
  border-color: var(--accent); text-decoration: none;
}
.card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.card-icon { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; flex-shrink: 0; }
.card-icon .material-symbols-outlined { font-size: 20px; color: var(--accent-2); }
.card-title { font-weight: 700; font-size: 14.5px; flex: 1; }
.card-desc { font-size: 12.5px; color: var(--text-sub); line-height: 1.6; }
.card-count { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

.card.is-category { border-left: 4px solid var(--accent); }
.card.group-list    { border-left-color: #2563eb; }
.card.group-common  { border-left-color: #059669; }
.card.group-project { border-left-color: #7C3AED; }
.card.is-tool { border-left: 4px solid var(--accent-2); }
.card.is-tool.group-list    { border-left-color: #2563eb; }
.card.is-tool.group-common  { border-left-color: #059669; }
.card.is-tool.group-project { border-left-color: #7C3AED; }

.section-header {
  display: flex; align-items: baseline; gap: 10px;
  margin: 0 0 12px; padding-bottom: 6px;
  border-bottom: 2px solid var(--accent-soft);
}
.section-title { font-size: 16px; font-weight: 700; margin: 0; color: var(--text); display: flex; align-items: center; gap: 6px; }
.section-title .material-symbols-outlined { font-size: 18px; }
.section-sub { font-size: 12px; color: var(--text-muted); }

.doc-crumbs { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.doc-crumbs a { color: var(--text-sub); cursor: pointer; }
.doc-crumbs a:hover { color: var(--accent); }

.back-link { margin-top: 24px; }
.back-link a { font-size: 13px; color: var(--text-sub); cursor: pointer; }
.back-link a:hover { color: var(--accent); text-decoration: none; }

.detail-search { margin-bottom: 14px; }
.search-box {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--panel); color: var(--text); font-size: 13px; width: 260px; outline: none;
  font-family: inherit;
}
.search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table.data-table {
  width: 100%; min-width: 640px; border-collapse: collapse; font-size: 13px;
  background: var(--panel); border: 1px solid var(--border);
}
table.data-table th {
  text-align: left; font-size: 11.5px; font-weight: 700; color: var(--text-sub);
  background: var(--panel-2); padding: 8px 12px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
table.data-table tr:last-child td { border-bottom: none; }
table.data-table code {
  background: var(--panel-2); padding: 1px 6px; border-radius: 4px;
  font-family: var(--mono); font-size: 11.5px; color: var(--text-sub);
  border: 1px solid var(--border);
}
.cell-main { font-weight: 700; }
.cell-sub { font-size: 11.5px; color: var(--text-muted); }
.val-cell { font-family: var(--mono); font-weight: 800; font-size: 14px; white-space: nowrap; }
.val-cell .unit { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-left: 2px; }

.note-box {
  font-size: 12px; color: var(--text-sub); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; margin: 14px 0 0;
}
.scale-fresh { font-size: 11.5px; color: var(--text-muted); margin-top: 10px; }

.footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
  display: flex; gap: 20px; justify-content: center;
}
.footer code { background: var(--panel-2); padding: 1px 6px; border-radius: 4px; font-family: var(--mono); font-size: 11px; }

@media (max-width: 900px) {
  .cards { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
}
@media (max-width: 760px) {
  .topbar { grid-template-columns: 1fr; gap: 8px; padding: 10px 14px; }
  .topnav { justify-content: flex-start; }
  .pm-main { padding: 14px; }
  .search-box { width: 100%; }
  .metric-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
@media (max-width: 560px) {
  body { font-size: 14px; }
  .cards { grid-template-columns: 1fr; gap: 10px; }
  .pm-hero h1 { font-size: 20px; }
  .pm-main { padding: 12px; }
  .card { padding: 12px 14px; }
  .topnav { gap: 8px; font-size: 12px; flex-wrap: wrap; }
  .metric-grid { grid-template-columns: 1fr 1fr; }
}

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="pm-page">
  <header class="topbar">
    <a class="brand" href="#">
      <span class="brand-icon"><span class="material-symbols-outlined">description</span></span>
      <span class="brand-title">{{PROJECT_NAME}}</span>
      <span class="brand-sub">リバース設計ポータル</span>
    </a>
    <nav class="topnav">
      <a href="#/summary"><span class="material-symbols-outlined">monitoring</span> 解析サマリ</a>
      <a href="アーキテクチャ調査書.html"><span class="material-symbols-outlined">domain</span> アーキテクチャ調査書</a>
    </nav>
    <div class="top-actions">
      <button id="theme-toggle" title="テーマ切替"><span class="material-symbols-outlined">dark_mode</span></button>
    </div>
  </header>

  <main class="pm-main">
    <div class="pm-hero">
      <div>
        <h1>{{PROJECT_NAME}}</h1>
        <p>コードから抽出した一覧系資料と共通文書の入口。</p>
      </div>
      <span class="pm-updated">生成: {{GENERATED_DATE}}</span>
    </div>

    <div class="sec-label">解析サマリ</div>
    <div class="metric-grid" id="metrics-mount"></div>

    <div class="sec-label">ドキュメント入口</div>
    <div id="app-main"></div>
  </main>

  <footer class="footer">
    <span>リバース設計スキル群が自動生成</span>
    <span>出力先: <code>project-portal/index.html</code></span>
  </footer>
</div>

<script type="application/json" id="portal-metrics">{{METRICS_JSON}}</script>
<script type="application/json" id="portal-categories">{{CATEGORIES_JSON}}</script>

<script>
(function() {
  var metrics = JSON.parse(document.getElementById('portal-metrics').textContent);
  var categories = JSON.parse(document.getElementById('portal-categories').textContent);

  function matIcon(name, size) {
    size = size || 20;
    return '<span class="material-symbols-outlined" style="font-size:' + size + 'px">' + name + '</span>';
  }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      if (k === 'html') node.innerHTML = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  function fmtNum(n) {
    return Number(n).toLocaleString('en-US');
  }

  function deltaText(curr, prev) {
    if (prev === null || prev === undefined) return '—';
    var d = curr - prev;
    return (d > 0 ? '+' : '') + d;
  }

  var metricsMount = document.getElementById('metrics-mount');
  (function renderDigestCards() {
    var scale = metrics.scale;
    var tests = metrics.tests;

    var scaleCard = el('a', { class: 'metric-card', href: '#/summary' });
    scaleCard.appendChild(el('div', { class: 'metric-label', html: matIcon('code', 14) + '<span>規模</span>' }));
    scaleCard.appendChild(el('div', { class: 'metric-value', html: fmtNum(scale.total) + '<span class="unit">行</span>' }));
    var scaleTags = el('div', { class: 'count-tags' });
    ['screen', 'feature', 'api', 'table'].forEach(function(kind) {
      var k = scale.kinds.filter(function(x) { return x.kind === kind; })[0];
      if (k) scaleTags.appendChild(el('span', { class: 'count-tag', html: k.label + ' <b>' + fmtNum(k.count) + '</b>' }));
    });
    scaleCard.appendChild(scaleTags);
    scaleCard.appendChild(el('div', { class: 'metric-sub' }, '全 ' + scale.kinds.length + ' 種別の内訳 → 明細へ'));
    metricsMount.appendChild(scaleCard);

    var testsCard = el('a', { class: 'metric-card', href: '#/summary' });
    testsCard.appendChild(el('div', { class: 'metric-label', html: matIcon('science', 14) + '<span>テスト</span>' }));
    if (tests) {
      testsCard.appendChild(el('div', { class: 'metric-value', html: fmtNum(tests.count) + '<span class="unit">件</span>' }));
      var testTags = el('div', { class: 'count-tags' });
      testTags.appendChild(el('span', { class: 'count-tag', html: 'FE <b>' + fmtNum(tests.fe) + '</b>' }));
      testTags.appendChild(el('span', { class: 'count-tag', html: 'BE <b>' + fmtNum(tests.be) + '</b>' }));
      testsCard.appendChild(testTags);
      testsCard.appendChild(el('div', { class: 'metric-sub' }, '密度・前回比は計算式付きで明細へ'));
    } else {
      testsCard.appendChild(el('div', { class: 'metric-value' }, '—'));
      testsCard.appendChild(el('div', { class: 'metric-sub' }, '未計測 — counting-code-lines の拡張後に表示'));
    }
    metricsMount.appendChild(testsCard);
  })();

  var root = document.getElementById('app-main');

  function renderTop() {
    root.innerHTML = '';
    var grid = el('div', { class: 'cards' });
    categories.forEach(function(cat) {
      var card = el('a', { class: 'card is-category group-' + cat.id, href: '#/category/' + cat.id });
      card.appendChild(el('div', { class: 'card-head', html:
        '<span class="card-icon">' + matIcon(cat.icon) + '</span>' +
        '<span class="card-title">' + cat.title + '</span>'
      }));
      card.appendChild(el('div', { class: 'card-desc' }, cat.sub));
      card.appendChild(el('div', { class: 'card-count' }, cat.tools.length + ' 資料 →'));
      grid.appendChild(card);
    });
    root.appendChild(grid);
  }

  function renderCategory(catId) {
    root.innerHTML = '';
    var cat = categories.filter(function(c) { return c.id === catId; })[0];
    if (!cat) { renderTop(); return; }

    root.appendChild(el('div', { class: 'doc-crumbs', html: '<a data-nav="#/">TOP</a> / ' + cat.title }));
    root.appendChild(el('div', { class: 'section-header' }, [
      el('h2', { class: 'section-title', html: matIcon(cat.icon, 18) + ' ' + cat.title }),
      el('span', { class: 'section-sub' }, cat.sub),
    ]));

    var searchWrap = el('div', { class: 'detail-search' });
    var searchInput = el('input', { class: 'search-box', type: 'text', placeholder: '検索…（/ でフォーカス）', id: 'detail-search' });
    searchWrap.appendChild(searchInput);
    root.appendChild(searchWrap);

    var grid = el('div', { class: 'cards', id: 'detail-grid' });
    cat.tools.forEach(function(tool) {
      var isInternal = tool.href.indexOf('#') === 0;
      var attrs = { class: 'card is-tool group-' + cat.id, href: tool.href };
      if (!isInternal) { attrs.target = '_blank'; attrs.rel = 'noopener'; }
      var card = el('a', attrs);
      card.appendChild(el('div', { class: 'card-head', html:
        '<span class="card-icon">' + matIcon(tool.icon) + '</span>' +
        '<span class="card-title">' + tool.title + '</span>'
      }));
      card.appendChild(el('div', { class: 'card-desc' }, tool.desc));
      card.appendChild(el('div', { class: 'card-count' }, tool.count));
      grid.appendChild(card);
    });
    root.appendChild(grid);
    root.appendChild(el('div', { class: 'back-link' }, el('a', { 'data-nav': '#/' }, '← カテゴリ一覧へ戻る')));

    searchInput.addEventListener('input', function() {
      var q = searchInput.value.toLowerCase();
      Array.from(grid.querySelectorAll('.card')).forEach(function(card) {
        card.classList.toggle('hidden', q && card.textContent.toLowerCase().indexOf(q) === -1);
      });
    });
  }

  function renderSummary() {
    root.innerHTML = '';
    var scale = metrics.scale;
    var tests = metrics.tests;
    var freshness = metrics.freshness;
    var previous = metrics.previous;
    var measuredText = freshness.measured_at + (freshness.note ? '・' + freshness.note : '');

    root.appendChild(el('div', { class: 'doc-crumbs', html: '<a data-nav="#/">TOP</a> / 解析サマリ' }));
    root.appendChild(el('div', { class: 'section-header' }, [
      el('h2', { class: 'section-title', html: matIcon('monitoring', 18) + ' 解析サマリ' }),
      el('span', { class: 'section-sub' }, '計測値と規模の明細。事実の記録のみで、数値の出所となる計算・条件を併記する。'),
    ]));

    root.appendChild(el('div', { class: 'sec-label' }, '計測値（テスト）'));
    if (tests) {
      var densityText = tests.density + '<span class="unit">件/千行</span>';
      var testsWrap = el('div', { class: 'table-wrap' });
      var testsTable = el('table', { class: 'data-table', html:
        '<thead><tr><th>指標</th><th>値</th><th>前回比</th><th>計算・条件</th><th>計測時点</th></tr></thead>' +
        '<tbody>' +
        '<tr><td class="cell-main">テスト件数</td>' +
          '<td class="val-cell">' + fmtNum(tests.count) + '<span class="unit">件</span></td>' +
          '<td class="cell-sub">' + deltaText(tests.count, previous ? previous.tests_count : null) + '</td>' +
          '<td>it / test ブロックと def test_ 関数を計数（FE ' + fmtNum(tests.fe) + ' ／ BE ' + fmtNum(tests.be) + '）</td>' +
          '<td class="cell-sub">' + measuredText + '</td></tr>' +
        '<tr><td class="cell-main">テストファイル数</td>' +
          '<td class="val-cell">' + fmtNum(tests.files) + '<span class="unit">件</span></td>' +
          '<td class="cell-sub">—</td>' +
          '<td>*.test.ts(x) / *.spec.ts(x) / test_*.py / *_test.py に一致するファイルを計数</td>' +
          '<td class="cell-sub">' + measuredText + '</td></tr>' +
        '<tr><td class="cell-main">テスト密度</td>' +
          '<td class="val-cell">' + densityText + '</td>' +
          '<td class="cell-sub">—</td>' +
          '<td>テスト ' + fmtNum(tests.count) + ' 件 ÷ コード ' + (scale.total / 1000).toFixed(1) + ' 千行</td>' +
          '<td class="cell-sub">' + measuredText + '</td></tr>' +
        '</tbody>'
      });
      testsWrap.appendChild(testsTable);
      root.appendChild(testsWrap);
    } else {
      root.appendChild(el('div', { class: 'note-box' }, '未計測 — counting-code-lines の拡張後に表示'));
    }

    root.appendChild(el('div', { class: 'sec-label' }, '規模'));
    var scaleRowsHtml =
      '<tr><td class="cell-main">コード行数</td>' +
        '<td class="val-cell">' + fmtNum(scale.total) + '<span class="unit">行</span></td>' +
        '<td>FE ' + fmtNum(scale.fe) + ' ／ BE ' + fmtNum(scale.be) + '・' + fmtNum(scale.files) + ' ファイル</td>' +
        '<td><code>code-metrics.json</code></td></tr>';
    scale.kinds.forEach(function(k) {
      var isInternal = k.href.indexOf('#') === 0;
      var linkAttr = isInternal ? '' : ' target="_blank" rel="noopener"';
      scaleRowsHtml += '<tr><td class="cell-main">' + k.label + '</td>' +
        '<td class="val-cell">' + fmtNum(k.count) + '</td>' +
        '<td>' + k.unit + '</td>' +
        '<td><a href="' + k.href + '"' + linkAttr + '>' + k.label + '一覧ページ →</a></td></tr>';
    });
    var scaleWrap = el('div', { class: 'table-wrap' });
    var scaleTable = el('table', { class: 'data-table', html:
      '<thead><tr><th>種別</th><th>件数</th><th>内訳・補足</th><th>一覧ページ</th></tr></thead>' +
      '<tbody>' + scaleRowsHtml + '</tbody>'
    });
    scaleWrap.appendChild(scaleTable);
    root.appendChild(scaleWrap);
    root.appendChild(el('div', { class: 'scale-fresh' }, '計測時点: ' + measuredText));

    root.appendChild(el('div', { class: 'back-link' }, el('a', { 'data-nav': '#/' }, '← TOP へ戻る')));
  }

  function route() {
    var path = location.hash.replace(/^#/, '') || '/';
    if (path === '/summary') { renderSummary(); window.scrollTo(0, 0); return; }
    var m = path.match(/^\/category\/(.+)$/);
    if (m) renderCategory(decodeURIComponent(m[1]));
    else renderTop();
    window.scrollTo(0, 0);
  }

  window.addEventListener('hashchange', route);
  route();

  document.addEventListener('click', function(e) {
    var nav = e.target.closest('[data-nav]');
    if (nav) { e.preventDefault(); location.hash = nav.getAttribute('data-nav'); }
  });

  var themeBtn = document.getElementById('theme-toggle');
  themeBtn.addEventListener('click', function() {
    var r = document.documentElement;
    var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
    try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
  });
  try {
    var saved = localStorage.getItem('rd-portal-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  } catch(e) {}

  document.addEventListener('keydown', function(e) {
    var si = document.getElementById('detail-search');
    if (e.key === '/' && si && document.activeElement !== si) { e.preventDefault(); si.focus(); }
    if (e.key === 'Escape' && si) { si.value = ''; si.blur(); si.dispatchEvent(new Event('input')); }
  });
})();
</script>

<script>
(function() {
  // アイコンフォント未読込フォールバック:
  // document.fonts.check で確認できるまでアイコンを非表示のままにし、
  // 確認できた時点でのみ <html> に icons-ready クラスを付与する。
  function checkIcons() {
    if (document.fonts && document.fonts.check && document.fonts.check('24px "Material Symbols Outlined"')) {
      document.documentElement.classList.add('icons-ready');
      return true;
    }
    return false;
  }
  if (!checkIcons()) {
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(function() { checkIcons(); });
    }
    var tries = 0;
    var timer = setInterval(function() {
      tries++;
      if (checkIcons() || tries >= 10) clearInterval(timer);
    }, 500);
  }
})();
</script>
</body>
</html>
