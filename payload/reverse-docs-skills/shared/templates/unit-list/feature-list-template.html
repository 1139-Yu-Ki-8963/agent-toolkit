<!DOCTYPE html>
<!--
  機能一覧.HTML の静的シェル(テンプレート)

  使い方(generating-feature-list-for-reverse-docs):
    scripts/build-feature-list.sh <manifest.json> <output-html-path> を実行する。
    build-feature-list.sh が本テンプレートを土台に、jqでマニフェストJSONをパースして
    プレースホルダ・注入マーカーを機械的に置換し、決定的にHTMLを生成する。
    Claude(手作業)によるプレースホルダ置換は禁止。生成は必ずスクリプト経由で行う。
    build-unit-list.sh から unit_kind=feature として本テンプレートに委譲される。

  保守注記: トークンブロック・テーマ切替(data-theme二重定義・rd-portal-theme)は
  shared/templates/detail-pages/detail-t3-attributes.html(同portal-template.html)からの複製である。
  同ファイルの当該部分を変更した場合は本ファイルも同時更新すること
  (unit-list-template.html・screen-list-template.htmlにも同種の複製あり。include化は別件)。

  プレースホルダ(build-feature-list.shが注入。実際のマーカー記法は
  scripts/build-feature-list.sh 冒頭コメントを正本とする。本コメントでは
  二重置換事故を避けるため意図的に波括弧・HTMLコメント記法を外して記載する):
    GENERATED_AT (生成日時マーカー)             : ISO8601 生成日時
    SOURCE_DIR (ソースディレクトリマーカー)     : 探索対象ソースディレクトリ(絶対パス)
    EXTRACTION_METHOD (抽出方式マーカー)        : strategy.extractionMethod
    CATEGORY_COUNT (大分類数タイルマーカー)     : 検出された大分類の数
    UNIT_COUNT (検出機能数タイルマーカー)       : detectionSummary.unitCount
    UNRESOLVED_COUNT (要確認数タイルマーカー)   : detectionSummary.unresolvedCount
    CATEGORY_SECTIONS (大分類セクションマーカー): 大分類ごとの details.module-group + table を丸ごと挿入
    UNRESOLVED_SECTION (要手動確認セクションマーカー) : kind=unresolved の一覧テーブル、0件なら「なし」の文言
    MANIFEST_JSON (マニフェストJSON埋め込みマーカー) : manifest.json の内容をそのまま埋め込み(二重管理・ドリフト禁止)

  テーブル列順(固定・全10列): 機能ID / 機能キー / 機能名 / 概要 / 関連画面 / 関連API / 関連テーブル / confidence / 検出方式 / 主ファイル

  制約:
    - 外部リソース(CDN・フォント・画像)は一切使わない。単一ファイル自己完結
    - <script id="unit-manifest"> の中身は確定結果(manifest.json)と完全に一致させる
    - 本テンプレートは機能一覧.HTMLの生成のみを対象とする。設計書の雛形展開・生成は本スキルの範囲外
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機能一覧</title>
<style>
  /* TOKENS_CSS */

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 24px 96px;
    font-family: var(--font-body);
    line-height: 1.7; color: var(--text); background: var(--bg);
    max-width: 1180px; margin-inline: auto;
  }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  header { padding: 40px 0 20px; border-bottom: 3px solid var(--border-strong); }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 1.7rem; margin: 0 0 10px; }
  .theme-toggle-btn {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-sub); cursor: pointer; padding: 5px 12px; font-size: 0.82rem; font-family: inherit;
  }
  .theme-toggle-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
  .meta-table { font-size: 0.88rem; color: var(--text-sub); border-collapse: collapse; }
  .meta-table td { padding: 2px 18px 2px 0; vertical-align: top; }
  .meta-table td:first-child { color: var(--text-muted); white-space: nowrap; }

  .summary-tiles { display: flex; gap: 14px; margin: 20px 0; flex-wrap: wrap; }
  .tile {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 18px; font-size: 0.85rem; color: var(--text-sub);
  }
  .tile strong { display: block; font-size: 1.3rem; color: var(--text); }

  .toolbar { display: flex; gap: 10px; margin: 24px 0 10px; align-items: center; flex-wrap: wrap; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 220px; padding: 8px 12px; font-size: 0.92rem;
    border: 1px solid var(--border); border-radius: 6px;
  }
  .toolbar .note { font-size: 0.82rem; color: var(--text-muted); }

  details.module-group { margin: 18px 0; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; min-width: 0; }
  details.module-group > summary {
    cursor: pointer; padding: 12px 16px; font-weight: 700; list-style: none;
  }
  details.module-group > summary::-webkit-details-marker { display: none; }
  details.module-group > summary::before { content: "▸ "; }
  details.module-group[open] > summary::before { content: "▾ "; }

  table.units {
    table-layout: fixed; width: 100%; min-width: 1000px; border-collapse: collapse; font-size: 0.88rem;
    overflow: hidden;
  }
  table.units th {
    border-top: 1px solid var(--border); padding: 8px 10px; text-align: left; vertical-align: top;
    white-space: normal; overflow: visible; font-size: 0.8em;
  }
  table.units td {
    border-top: 1px solid var(--border); padding: 6px 8px; text-align: left; vertical-align: top;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  table.units th {
    background: var(--panel-2); font-weight: 700; cursor: pointer; user-select: none;
  }
  table.units th:hover { background: var(--accent-soft); cursor: pointer; }
  table.units td code {
    font-family: var(--mono);
    font-size: 0.85em; background: var(--panel-2); padding: 1px 5px; border-radius: 3px;
  }

  /* 列幅の明示指定（feature-list: 10列） */
  table.units th:nth-child(1) { width: 5%; }   /* 機能ID */
  table.units th:nth-child(2) { width: 7%; }   /* 機能キー */
  table.units th:nth-child(3) { width: 8%; }   /* 機能名 */
  table.units th:nth-child(4) { width: 22%; }  /* 概要 */
  table.units th:nth-child(5) { width: 8%; }   /* 関連画面 */
  table.units th:nth-child(6) { width: 10%; }  /* 関連API */
  table.units th:nth-child(7) { width: 7%; }   /* 関連テーブル */
  table.units th:nth-child(8) { width: 5%; }   /* confidence */
  table.units th:nth-child(9) { width: 5%; }   /* 検出方式 */
  table.units th:nth-child(10) { width: 23%; } /* 主ファイル */

  /* 数値列は右揃え＋等幅数字 */
  table.units td:nth-child(8) {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* コード系列はモノスペース */
  table.units td:nth-child(2),
  table.units td:nth-child(10) {
    font-family: var(--mono);
    font-size: 0.8em;
  }

  /* ゼブラストライプ */
  table.units tbody tr:nth-child(even) {
    background: color-mix(in srgb, var(--panel-2) 40%, transparent);
  }
  /* 行ホバー */
  table.units tbody tr:hover {
    background: var(--accent-soft);
  }

  td code { overflow-wrap: break-word; word-break: break-all; }
  .badge { display: inline-block; font-size: 0.76rem; font-weight: 700; padding: 1px 8px; border-radius: 3px; }
  .badge.high   { background: var(--success-soft); color: var(--success); }
  .badge.medium { background: var(--gold-soft); color: var(--gold); }
  .badge.low    { background: var(--accent-soft); color: var(--accent); }

  section.unresolved {
    margin-top: 40px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; min-width: 0;
  }
  #category-sections { min-width: 0; }
  section.unresolved h2 { font-size: 1.05rem; margin: 0 0 10px; }

  footer { margin-top: 48px; font-size: 0.8rem; color: var(--text-muted); }

  .pagination { display: flex; gap: 8px; align-items: center; justify-content: center; margin: 16px 0; font-size: 0.85rem; }
  .pagination button { background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-sub); cursor: pointer; padding: 4px 10px; font-family: inherit; font-size: 0.82rem; }
  .pagination button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination .page-info { color: var(--text-muted); }

  /* 一覧UI拡張（コピーボタン・フィルタチップ・行クリック展開・CSVエクスポート） */
  .copy-btn { background: none; border: none; cursor: pointer; padding: 1px 3px; color: var(--text-muted); opacity: .35; vertical-align: middle; }
  tr:hover .copy-btn, .copy-btn:focus { opacity: 1; }
  .copy-btn:hover { color: var(--accent); }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 8px; align-items: center; }
  .chip { font-size: .78rem; padding: 2px 10px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel); color: var(--text-sub); cursor: pointer; font-family: inherit; }
  .chip[aria-pressed="true"] { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); font-weight: 700; }
  .chip-group-label { font-size: .72rem; color: var(--text-muted); }
  a.opt-tag { display: inline-block; font-size: .72rem; padding: 1px 6px; border-radius: 4px; background: var(--panel-2); margin: 1px 3px 1px 0; color: inherit; text-decoration: none; }
  a.opt-tag:hover { text-decoration: underline; color: var(--accent); }
  tr.row-detail > td { background: var(--panel-2); font-size: .82rem; white-space: normal; }
  .row-detail dl { display: grid; grid-template-columns: max-content 1fr; gap: 2px 12px; margin: 4px 0; }
  .row-detail dt { color: var(--text-muted); }
  .row-detail dd { margin: 0; word-break: break-all; }
  .csv-btn {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-sub); cursor: pointer; padding: 5px 12px; font-size: 0.82rem; font-family: inherit;
  }
  .csv-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }
/* ─── 統一ヘッダー ─── */
.topbar {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 24px; padding: 12px 20px;

</style>
</head>

<script type="application/json" id="unit-manifest">
{{MANIFEST_JSON}}

<footer>generating-feature-list-for-reverse-docsにより生成。手編集は次回再生成で上書きされる。</footer>

<script>
  /* 任意列描画（マニフェストスキーマ拡張。仕様定義: shared/references/manifest-schema-extensions.md）
     一覧制御スクリプトより前に実行し、copy/chips/CSV 初期化前に追加セルを存在させる。
     マニフェストに対象フィールドが 1 件も無ければ何も追加しない（後方互換）。 */
  (function () {
    var manifestEl = document.getElementById('unit-manifest');
    var manifest = {};
    try { manifest = JSON.parse(manifestEl.textContent); } catch (e) { return; }
    var units = manifest.units || manifest.screens || [];
    if (!units.length) return;

    /* 対象フィールド定義（feature: operationClass のみ） */
    var OPTIONAL_FIELDS = [
      { key: 'operationClass', label: '操作区分' }
    ];
    /* 文字列値 → バッジ色クラスの対応（該当しない文字列はそのまま表示） */
    var ENUM_BADGES = {
      operationClass: { '参照系': 'accent', '更新系': 'gold', '削除系': 'danger' },
      designDocStatus: { '未着手': 'danger', '着手済': 'success' }
    };

    function hasValue(v) {
      if (v === null || v === undefined || v === '') return false;
      if (Array.isArray(v)) return v.length > 0;
      return true;
    }
    /* 配列内で 1 件でも値を持つフィールドだけ列を追加する */
    var active = OPTIONAL_FIELDS.filter(function (f) {
      return units.some(function (u) { return hasValue(u[f.key]); });
    });
    if (!active.length) return;

    var style = document.createElement('style');
    style.textContent =
      '.opt-tag { display: inline-block; font-size: .72rem; padding: 1px 6px; border-radius: 4px; background: var(--panel-2); margin: 1px 3px 1px 0; }' +
      '.opt-badge { display: inline-block; font-size: .76rem; font-weight: 700; padding: 1px 8px; border-radius: 3px; }' +
      '.opt-badge.accent { background: var(--accent-soft); color: var(--accent); }' +
      '.opt-badge.gold { background: var(--gold-soft); color: var(--gold); }' +
      '.opt-badge.success { background: var(--success-soft); color: var(--success); }' +
      '.opt-badge.danger { background: var(--danger-soft); color: var(--danger); }' +
      '.opt-muted { color: var(--text-muted); }';
    document.head.appendChild(style);

    /* 行照合: 1列目テキスト = unitId/screenId。null の要素は 2列目 = unitKey/screenKey で照合 */
    var byId = {}, byKey = {};
    units.forEach(function (u) {
      var id = (u.unitId !== undefined) ? u.unitId : u.screenId;
      var key = (u.unitKey !== undefined) ? u.unitKey : u.screenKey;
      if (id !== null && id !== undefined && id !== '') byId[String(id)] = u;
      else if (key !== null && key !== undefined && key !== '') byKey[String(key)] = u;
    });

    function renderValue(td, field, value) {
      if (!hasValue(value)) return;
      var badgeMap = ENUM_BADGES[field.key];
      if (badgeMap && typeof value === 'string' && badgeMap[value]) {
        var b = document.createElement('span');
        b.className = 'opt-badge ' + badgeMap[value];
        b.textContent = value;
        td.appendChild(b);
        return;
      }
      if (Array.isArray(value)) {
        value.forEach(function (v) {
          var t = document.createElement('span');
          t.className = 'opt-tag';
          t.textContent = String(v);
          td.appendChild(t);
        });
        return;
      }
      if (typeof value === 'boolean') {
        var span = document.createElement('span');
        span.className = value ? 'opt-badge gold' : 'opt-muted';
        span.textContent = value ? '要' : '不要';
        td.appendChild(span);
        return;
      }
      if (typeof value === 'object') {
        var s = document.createElement('span');
        s.textContent = (value.readable !== undefined) ? String(value.readable) : JSON.stringify(value);
        if (value.cron) s.title = value.cron;
        td.appendChild(s);
        return;
      }
      td.textContent = String(value);
    }

    /* 全テーブルを走査（カテゴリごとの複数テーブル対応）。thead 末尾に th、各行末尾に td を追加。
       既存列のインデックスは変えない。照合できない行は空セルで列数だけ揃える */
    document.querySelectorAll('table.units, table.data-table').forEach(function (table) {
      var headRow = table.querySelector('thead tr');
      var tbody = table.querySelector('tbody');
      if (!headRow || !tbody) return;
      active.forEach(function (field) {
        var th = document.createElement('th');
        th.textContent = field.label;
        headRow.appendChild(th);
      });
      Array.prototype.slice.call(tbody.querySelectorAll('tr')).forEach(function (tr) {
        var idText = tr.children[0] ? tr.children[0].textContent.trim() : '';
        var keyText = tr.children[1] ? tr.children[1].textContent.trim() : '';
        var unit = byId[idText] || byKey[keyText] || null;
        active.forEach(function (field) {
          var td = document.createElement('td');
          if (unit) renderValue(td, field, unit[field.key]);
          tr.appendChild(td);
        });
      });
    });
  })();
</script>

<script>
  /* 相互参照リンク化: 関連画面・関連API・関連テーブル列の値を対応する一覧ページへの ?q= リンクに変換する。
     カンマ区切りの複数値は分割して個別リンクにする。値が「—」・空のセルはリンク化しない。
     一覧制御スクリプトより前に実行し、コピーボタン・CSV 初期化前にリンクを存在させる。 */
  (function () {
    var LINK_COLUMNS = {
      '関連画面': '../画面一覧/画面一覧.html',
      '関連API': '../API一覧/API一覧.html',
      '関連テーブル': '../テーブル一覧/テーブル一覧.html'
    };
    document.querySelectorAll('table.units, table.data-table').forEach(function (table) {
      var headRow = table.querySelector('thead tr');
      var tbody = table.querySelector('tbody');
      if (!headRow || !tbody) return;
      var targets = [];
      Array.prototype.slice.call(headRow.children).forEach(function (th, i) {
        var name = th.textContent.trim();
        if (LINK_COLUMNS[name]) targets.push({ index: i, page: LINK_COLUMNS[name] });
      });
      if (!targets.length) return;
      tbody.querySelectorAll('tr').forEach(function (tr) {
        targets.forEach(function (t) {
          var td = tr.children[t.index];
          if (!td) return;
          var text = td.textContent.trim();
          if (text === '' || text === '—') return;
          var values = text.split(/[,、]\s*/).filter(function (v) { return v !== '' && v !== '—'; });
          if (!values.length) return;
          td.textContent = '';
          values.forEach(function (v) {
            var a = document.createElement('a');
            a.className = 'opt-tag';
            a.href = t.page + '?q=' + encodeURIComponent(v);
            a.textContent = v;
            td.appendChild(a);
          });
        });
      });
    });
  })();
</script>

<script>
  (function () {
    var manifestEl = document.getElementById('unit-manifest');
    var manifest = {};
    try { manifest = JSON.parse(manifestEl.textContent); } catch (e) { /* ignore */ }

    var search = document.getElementById('unit-search');
    var PAGE_SIZE = 50;
    var tableStates = [];

    /* ===== 一覧UI拡張（コピーボタン・フィルタチップ・行クリック展開・CSVエクスポート） ===== */
    /* チップ対象の列見出し名（任意列スクリプトが追加した列も指定できる） */
    var CHIP_COLUMNS = ['confidence', '操作区分'];
    var chipSelected = { category: {} };
    CHIP_COLUMNS.forEach(function (c) { chipSelected[c] = {}; });
    var chipBar = null, chipClearBtn = null;

    var COPY_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    var CHECK_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6L9 17l-5-5"></path></svg>';

    function legacyCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) { /* ignore */ }
      document.body.removeChild(ta);
    }
    function copyText(text, done) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function () { legacyCopy(text); done(); });
      } else {
        legacyCopy(text);
        done();
      }
    }
    /* セルの表示テキスト取得（.opt-tag リンク/タグはカンマ区切りで連結。コピー・CSV・展開行で共用） */
    function cellText(el) {
      var tags = el.querySelectorAll('a.opt-tag, span.opt-tag');
      if (tags.length) {
        return Array.prototype.slice.call(tags).map(function (t) { return t.textContent.trim(); }).join(', ');
      }
      return el.textContent.trim();
    }
    function copyableValue(el) {
      var t = el.textContent.trim();
      return t !== '' && t !== '—';
    }
    function makeCopyBtn(target) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'copy-btn';
      btn.setAttribute('aria-label', 'コピー');
      btn.innerHTML = COPY_SVG;
      btn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        ev.preventDefault();
        copyText(cellText(target), function () {
          btn.innerHTML = CHECK_SVG;
          setTimeout(function () { btn.innerHTML = COPY_SVG; }, 1200);
        });
      });
      return btn;
    }
    /* 全セルコピー: 空・「—」以外のすべての td にコピーボタンを付ける */
    function addCopyButtons(row) {
      Array.prototype.slice.call(row.children).forEach(function (td) {
        if (td.querySelector('.copy-btn') || !copyableValue(td)) return;
        td.appendChild(makeCopyBtn(td));
      });
    }

    function selectedKeys(map) {
      return Object.keys(map).filter(function (k) { return map[k]; });
    }
    function rowMatchesChips(tr, state) {
      for (var i = 0; i < CHIP_COLUMNS.length; i++) {
        var col = CHIP_COLUMNS[i];
        var sel = selectedKeys(chipSelected[col]);
        if (!sel.length) continue;
        var idx = state ? state.colIndex[col] : undefined;
        var cell = (idx !== undefined) ? tr.children[idx] : null;
        var v = cell ? cell.textContent.trim() : '';
        if (sel.indexOf(v) === -1) return false;
      }
      return true;
    }
    function categoryOf(table) {
      var det = table.closest ? table.closest('details') : null;
      if (!det) return '';
      var nameEl = det.querySelector('summary .cat-name');
      return nameEl ? nameEl.textContent.trim() : '';
    }
    function applyCategoryFilter() {
      var cats = selectedKeys(chipSelected.category);
      Array.prototype.slice.call(document.querySelectorAll('#category-sections details')).forEach(function (det) {
        var nameEl = det.querySelector('summary .cat-name');
        var name = nameEl ? nameEl.textContent.trim() : '';
        det.style.display = (cats.length && cats.indexOf(name) === -1) ? 'none' : '';
      });
    }
    function updateChipClearBtn() {
      if (!chipClearBtn) return;
      var any = selectedKeys(chipSelected.category).length;
      CHIP_COLUMNS.forEach(function (c) { if (selectedKeys(chipSelected[c]).length) any = 1; });
      chipClearBtn.style.display = any ? '' : 'none';
    }
    function rerenderAll() {
      applyCategoryFilter();
      tableStates.forEach(function (state) { state.currentPage = 0; renderPage(state); });
      updateChipClearBtn();
    }
    function makeChip(group, value) {
      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip';
      chip.textContent = value;
      chip.setAttribute('aria-pressed', 'false');
      chip.addEventListener('click', function () {
        var on = chip.getAttribute('aria-pressed') === 'true';
        chip.setAttribute('aria-pressed', on ? 'false' : 'true');
        chipSelected[group][value] = !on;
        rerenderAll();
      });
      return chip;
    }
    function buildChipBar() {
      var toolbar = document.querySelector('.toolbar');
      if (!toolbar) return;
      var groups = [];
      var cats = [];
      Array.prototype.slice.call(document.querySelectorAll('#category-sections details summary .cat-name')).forEach(function (el) {
        var v = el.textContent.trim();
        if (v && cats.indexOf(v) === -1) cats.push(v);
      });
      if (cats.length) groups.push({ label: 'カテゴリ', group: 'category', values: cats });
      /* 列見出し名指定のチップ（任意列スクリプトが追加した列も対象になる） */
      CHIP_COLUMNS.forEach(function (col) {
        var vals = [];
        tableStates.forEach(function (state) {
          var idx = state.colIndex[col];
          if (idx === undefined) return;
          state.allRows.forEach(function (tr) {
            var cell = tr.children[idx];
            var v = cell ? cell.textContent.trim() : '';
            if (v && v !== '—' && vals.indexOf(v) === -1) vals.push(v);
          });
        });
        if (vals.length) groups.push({ label: col, group: col, values: vals });
      });
      if (!groups.length) return;
      chipBar = document.createElement('div');
      chipBar.className = 'filter-chips';
      groups.forEach(function (g) {
        var lab = document.createElement('span');
        lab.className = 'chip-group-label';
        lab.textContent = g.label;
        chipBar.appendChild(lab);
        g.values.forEach(function (v) { chipBar.appendChild(makeChip(g.group, v)); });
      });
      chipClearBtn = document.createElement('button');
      chipClearBtn.type = 'button';
      chipClearBtn.className = 'chip chip-clear';
      chipClearBtn.textContent = 'クリア';
      chipClearBtn.style.marginLeft = 'auto';
      chipClearBtn.style.display = 'none';
      chipClearBtn.addEventListener('click', function () {
        chipSelected = { category: {} };
        CHIP_COLUMNS.forEach(function (c) { chipSelected[c] = {}; });
        Array.prototype.slice.call(chipBar.querySelectorAll('.chip[aria-pressed]')).forEach(function (c) { c.setAttribute('aria-pressed', 'false'); });
        rerenderAll();
      });
      chipBar.appendChild(chipClearBtn);
      toolbar.parentNode.insertBefore(chipBar, toolbar.nextSibling);
    }

    function removeDetailRows(tbody) {
      Array.prototype.slice.call(tbody.querySelectorAll('tr.row-detail')).forEach(function (tr) {
        tr.parentNode.removeChild(tr);
      });
    }
    function bindRowExpansion(state) {
      var headers = Array.prototype.slice.call(state.table.querySelectorAll('thead th')).map(function (th) {
        return th.textContent.trim();
      });
      state.tbody.addEventListener('click', function (ev) {
        if (ev.target.closest && ev.target.closest('.copy-btn,a,button')) return;
        var tr = ev.target.closest ? ev.target.closest('tr') : null;
        if (!tr || tr.classList.contains('row-detail') || tr.parentNode !== state.tbody) return;
        var next = tr.nextElementSibling;
        if (next && next.classList.contains('row-detail')) {
          next.parentNode.removeChild(next);
          return;
        }
        var detail = document.createElement('tr');
        detail.className = 'row-detail';
        var td = document.createElement('td');
        td.colSpan = headers.length || tr.children.length;
        var dl = document.createElement('dl');
        Array.prototype.slice.call(tr.children).forEach(function (cell, i) {
          var dt = document.createElement('dt');
          dt.textContent = headers[i] || ('列' + (i + 1));
          var dd = document.createElement('dd');
          dd.textContent = cellText(cell);
          if (copyableValue(cell)) dd.appendChild(makeCopyBtn(dd));
          dl.appendChild(dt);
          dl.appendChild(dd);
        });
        td.appendChild(dl);
        detail.appendChild(td);
        tr.parentNode.insertBefore(detail, tr.nextSibling);
      });
    }

    function csvEscape(v) {
      if (/[",\n\r]/.test(v)) return '"' + v.replace(/"/g, '""') + '"';
      return v;
    }
    function exportCsv() {
      var q = search ? search.value.trim().toLowerCase() : '';
      var cats = selectedKeys(chipSelected.category);
      var lines = [];
      var headerDone = false;
      tableStates.forEach(function (state) {
        var catName = categoryOf(state.table);
        if (cats.length && catName !== '' && cats.indexOf(catName) === -1) return;
        if (!headerDone) {
          var heads = Array.prototype.slice.call(state.table.querySelectorAll('thead th')).map(function (th) { return th.textContent.trim(); });
          lines.push(['カテゴリ'].concat(heads).map(csvEscape).join(','));
          headerDone = true;
        }
        state.allRows.forEach(function (tr) {
          if (!rowMatchesChips(tr, state)) return;
          if (q && tr.textContent.toLowerCase().indexOf(q) === -1) return;
          /* リンク化後もテキスト値のみを出力する（アンカーの textContent を使う） */
          var cells = Array.prototype.slice.call(tr.children).map(function (td) { return cellText(td); });
          lines.push([catName].concat(cells).map(csvEscape).join(','));
        });
      });
      var blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = document.title + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
    }
    function buildCsvButton() {
      var toolbar = document.querySelector('.toolbar');
      if (!toolbar) return;
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'csv-btn';
      btn.textContent = 'CSV';
      btn.title = 'CSVエクスポート（フィルタ・検索適用後の全行）';
      btn.addEventListener('click', exportCsv);
      toolbar.appendChild(btn);
    }
    /* ===== 一覧UI拡張ここまで ===== */

    function renderPage(state) {
      removeDetailRows(state.tbody);
      var q = search ? search.value.trim().toLowerCase() : '';
      var visible = state.allRows.filter(function (tr) {
        if (!rowMatchesChips(tr, state)) return false;
        return !q || tr.textContent.toLowerCase().indexOf(q) !== -1;
      });

      if (state.sortCol >= 0) {
        visible.sort(function (a, b) {
          var av = a.children[state.sortCol].textContent.trim();
          var bv = b.children[state.sortCol].textContent.trim();
          var an = parseFloat(av), bn = parseFloat(bv);
          var cmp = (!isNaN(an) && !isNaN(bn)) ? (an - bn) : av.localeCompare(bv, 'ja');
          return state.sortAsc ? cmp : -cmp;
        });
      }

      var totalPages = Math.max(1, Math.ceil(visible.length / PAGE_SIZE));
      if (state.currentPage >= totalPages) state.currentPage = totalPages - 1;
      if (state.currentPage < 0) state.currentPage = 0;
      var start = state.currentPage * PAGE_SIZE;
      var end = start + PAGE_SIZE;

      state.allRows.forEach(function (tr) { tr.style.display = 'none'; });
      visible.forEach(function (tr, i) {
        tr.style.display = (i >= start && i < end) ? '' : 'none';
        state.tbody.appendChild(tr);
      });

      state.pagEl.style.display = visible.length <= PAGE_SIZE ? 'none' : '';
      state.pageInfo.textContent = (state.currentPage + 1) + ' / ' + totalPages + '（' + visible.length + '件）';
      state.btnFirst.disabled = state.currentPage === 0;
      state.btnPrev.disabled = state.currentPage === 0;
      state.btnNext.disabled = state.currentPage >= totalPages - 1;
      state.btnLast.disabled = state.currentPage >= totalPages - 1;
    }

    document.querySelectorAll('table.units, table.data-table').forEach(function (table) {
      var tbody = table.querySelector('tbody');
      if (!tbody) return;
      var allRows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
      /* 列見出し名 → 列インデックス（任意列スクリプト適用後の thead を参照） */
      var colIndex = {};
      Array.prototype.slice.call(table.querySelectorAll('thead th')).forEach(function (th, i) {
        var name = th.textContent.trim();
        if (colIndex[name] === undefined) colIndex[name] = i;
      });

      var pagEl = document.createElement('div');
      pagEl.className = 'pagination';
      pagEl.innerHTML =
        '<button type="button" class="page-first" title="先頭">≪</button>' +
        '<button type="button" class="page-prev" title="前">＜</button>' +
        '<span class="page-info"></span>' +
        '<button type="button" class="page-next" title="次">＞</button>' +
        '<button type="button" class="page-last" title="最後">≫</button>';
      table.parentNode.insertBefore(pagEl, table.nextSibling);

      var state = {
        table: table,
        tbody: tbody,
        allRows: allRows,
        colIndex: colIndex,
        currentPage: 0,
        sortCol: -1,
        sortAsc: true,
        pagEl: pagEl,
        pageInfo: pagEl.querySelector('.page-info'),
        btnFirst: pagEl.querySelector('.page-first'),
        btnPrev: pagEl.querySelector('.page-prev'),
        btnNext: pagEl.querySelector('.page-next'),
        btnLast: pagEl.querySelector('.page-last')
      };
      tableStates.push(state);

      allRows.forEach(addCopyButtons);
      bindRowExpansion(state);

      state.btnFirst.addEventListener('click', function () { state.currentPage = 0; renderPage(state); });
      state.btnPrev.addEventListener('click', function () { state.currentPage--; renderPage(state); });
      state.btnNext.addEventListener('click', function () { state.currentPage++; renderPage(state); });
      state.btnLast.addEventListener('click', function () {
        var q = search ? search.value.trim().toLowerCase() : '';
        var cnt = state.allRows.filter(function (tr) { return rowMatchesChips(tr, state) && (!q || tr.textContent.toLowerCase().indexOf(q) !== -1); }).length;
        state.currentPage = Math.max(0, Math.ceil(cnt / PAGE_SIZE) - 1);
        renderPage(state);
      });

      table.querySelectorAll('th[data-key]').forEach(function (th, colIndex) {
        th.addEventListener('click', function () {
          if (state.sortCol === colIndex) { state.sortAsc = !state.sortAsc; } else { state.sortCol = colIndex; state.sortAsc = true; }
          table.querySelectorAll('th[data-key]').forEach(function (t) { t.removeAttribute('data-asc'); });
          th.setAttribute('data-asc', state.sortAsc);
          state.currentPage = 0;
          renderPage(state);
        });
      });
    });

    if (search) {
      search.addEventListener('input', function () {
        tableStates.forEach(function (state) { state.currentPage = 0; renderPage(state); });
      });
    }

    buildChipBar();
    buildCsvButton();
    /* URL クエリ ?q= を検索窓に反映して絞り込みを発火する（他一覧ページからの相互参照リンクの受け口） */
    try {
      var initialQ = new URLSearchParams(location.search).get('q');
      if (initialQ && search) search.value = initialQ;
    } catch (e) { /* ignore */ }
    tableStates.forEach(function (state) { renderPage(state); });
  })();
</script>

<script>
  (function () {
    var themeBtn = document.getElementById('theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', function() {
        var r = document.documentElement;
        var next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', next);
        themeBtn.textContent = next === 'dark' ? 'ダーク' : 'ライト';
        try { localStorage.setItem('rd-portal-theme', next); } catch(e) {}
      });
    }
    try {
      var saved = localStorage.getItem('rd-portal-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        var tb = document.getElementById('theme-toggle');
        if (tb) tb.textContent = saved === 'dark' ? 'ダーク' : 'ライト';
      }
    } catch(e) {}
  })();
</script>

</body>
</html>
